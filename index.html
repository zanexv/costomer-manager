<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互联网小贷公司管理台系统</title>
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <style>
        /* ========================================
           Design System Variables
           Based on Ant Design Pro + Material Design
           ======================================== */
        :root {
            /* Sidebar */
            --sidebar-width: 208px;
            --sidebar-collapsed-width: 64px;
            --sidebar-bg: #001529;
            --sidebar-item-hover: rgba(255, 255, 255, 0.06);
            --sidebar-item-active-bg: rgba(99, 102, 241, 0.15);
            --sidebar-item-active-text: #818cf8;
            --sidebar-text: rgba(255, 255, 255, 0.65);
            --sidebar-text-active: #ffffff;
            --sidebar-icon-size: 18px;
            --sidebar-divider: rgba(255, 255, 255, 0.06);
            --sidebar-transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);

            /* Header */
            --header-height: 56px;
            --header-bg: #ffffff;
            --header-shadow: 0 1px 4px rgba(0, 21, 41, 0.08);

            /* Brand Colors */
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;

            /* Neutral */
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --page-bg: #f1f5f9;
            --danger: #ef4444;
        }

        /* ========================================
           Reset & Base
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-primary);
            background: var(--page-bg);
            -webkit-font-smoothing: antialiased;
        }

        /* ========================================
           Layout Shell
           ======================================== */
        .app-container {
            display: flex;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
        }

        /* ========================================
           Sidebar
           ======================================== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
            transition: width var(--sidebar-transition);
            overflow: hidden;
        }

        /* Logo Area */
        .sidebar-logo {
            height: var(--header-height);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--sidebar-divider);
            flex-shrink: 0;
            overflow: hidden;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            min-width: 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .logo-text {
            margin-left: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            opacity: 1;
            transition: opacity 0.15s ease, margin-left 0.15s ease;
        }

        /* Navigation */
        .nav-menu {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 0;
        }

        .nav-menu::-webkit-scrollbar {
            width: 4px;
        }

        .nav-menu::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .nav-menu ul {
            list-style: none;
        }

        /* Section Label */
        .nav-section-label {
            padding: 16px 20px 8px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.3);
            white-space: nowrap;
            overflow: hidden;
            transition: opacity 0.15s ease;
        }

        /* Nav Items */
        .nav-item {
            position: relative;
            margin: 2px 8px;
        }

        .nav-item-link {
            display: flex;
            align-items: center;
            padding: 0 12px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: var(--sidebar-text);
            position: relative;
            overflow: hidden;
        }

        .nav-item-link:hover {
            background: var(--sidebar-item-hover);
            color: rgba(255, 255, 255, 0.85);
        }

        .nav-item.active > .nav-item-link {
            background: var(--sidebar-item-active-bg);
            color: var(--sidebar-item-active-text);
        }

        .nav-item.active > .nav-item-link::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 3px;
            background: var(--primary);
            border-radius: 0 3px 3px 0;
        }

        .nav-icon {
            width: var(--sidebar-icon-size);
            height: var(--sidebar-icon-size);
            min-width: var(--sidebar-icon-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            line-height: 1;
        }

        .nav-label {
            margin-left: 12px;
            font-size: 14px;
            font-weight: 400;
            white-space: nowrap;
            opacity: 1;
            transition: opacity 0.15s ease, margin-left 0.15s ease;
        }

        /* Submenu Arrow */
        .nav-arrow {
            margin-left: auto;
            font-size: 10px;
            opacity: 0.5;
            transition: transform 0.25s ease, opacity 0.15s ease;
        }

        .nav-item.open > .nav-item-link .nav-arrow {
            transform: rotate(90deg);
        }

        /* Submenu */
        .nav-submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .nav-item.open > .nav-submenu {
            max-height: 300px;
        }

        .nav-submenu .nav-item-link {
            padding-left: 44px;
            height: 36px;
            font-size: 13px;
        }

        .nav-submenu .nav-item.active > .nav-item-link::before {
            display: none;
        }

        .nav-submenu .nav-item.active > .nav-item-link {
            color: var(--sidebar-item-active-text);
            background: transparent;
            font-weight: 500;
        }

        /* Sidebar Footer */
        .sidebar-footer {
            flex-shrink: 0;
            padding: 12px 8px;
            border-top: 1px solid var(--sidebar-divider);
        }

        .sidebar-collapse-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 36px;
            background: none;
            border: 1px solid var(--sidebar-divider);
            border-radius: 8px;
            color: var(--sidebar-text);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }

        .sidebar-collapse-btn:hover {
            background: var(--sidebar-item-hover);
            color: rgba(255, 255, 255, 0.85);
        }

        .collapse-icon {
            transition: transform var(--sidebar-transition);
        }

        /* ========================================
           Collapsed State
           ======================================== */
        .sidebar-collapsed .sidebar {
            width: var(--sidebar-collapsed-width);
        }

        .sidebar-collapsed .logo-text,
        .sidebar-collapsed .nav-label,
        .sidebar-collapsed .nav-arrow,
        .sidebar-collapsed .nav-section-label {
            opacity: 0;
            pointer-events: none;
            width: 0;
            margin-left: 0;
            overflow: hidden;
        }

        .sidebar-collapsed .sidebar-logo {
            padding: 0;
            justify-content: center;
        }

        .sidebar-collapsed .nav-item {
            margin: 2px 8px;
        }

        .sidebar-collapsed .nav-item-link {
            justify-content: center;
            padding: 0;
        }

        .sidebar-collapsed .nav-submenu {
            max-height: 0 !important;
        }

        .sidebar-collapsed .collapse-icon {
            transform: rotate(180deg);
        }

        .sidebar-collapsed .main-content {
            margin-left: var(--sidebar-collapsed-width);
        }

        /* Tooltip on hover in collapsed state */
        .sidebar-collapsed .nav-item > .nav-item-link {
            position: relative;
        }

        .sidebar-collapsed .nav-item > .nav-item-link::after {
            content: attr(data-tooltip);
            position: absolute;
            left: calc(var(--sidebar-collapsed-width) - 8px);
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 13px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
            z-index: 1000;
        }

        .sidebar-collapsed .nav-item > .nav-item-link:hover::after {
            opacity: 1;
        }

        /* ========================================
           Main Content Area
           ======================================== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-left: var(--sidebar-width);
            height: 100vh;
            overflow: hidden;
            transition: margin-left var(--sidebar-transition);
        }

        /* Top Header */
        .top-header {
            height: var(--header-height);
            background: var(--header-bg);
            box-shadow: var(--header-shadow);
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 50;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-toggle {
            display: none; /* Hidden, using sidebar footer button instead */
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .breadcrumb-sep {
            color: var(--text-muted);
            font-size: 11px;
        }

        .breadcrumb-current {
            color: var(--text-primary);
            font-weight: 500;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .header-icon-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: none;
            background: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 18px;
            transition: all 0.15s;
            position: relative;
        }

        .header-icon-btn:hover {
            background: #f1f5f9;
            color: var(--text-primary);
        }

        .badge {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            border: 2px solid var(--header-bg);
        }

        .user-block {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px 4px 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            margin-left: 8px;
        }

        .user-block:hover {
            background: #f1f5f9;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }

        .user-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .user-role {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* iframe */
        .content-iframe {
            width: 100%;
            flex: 1;
            border: none;
            background: var(--page-bg);
        }

        /* ========================================
           Responsive
           ======================================== */
        @media (max-width: 768px) {
            .sidebar {
                width: var(--sidebar-collapsed-width);
            }

            .logo-text,
            .nav-label,
            .nav-arrow,
            .nav-section-label {
                opacity: 0;
                pointer-events: none;
                width: 0;
                margin-left: 0;
            }

            .sidebar-logo {
                padding: 0;
                justify-content: center;
            }

            .nav-item-link {
                justify-content: center;
                padding: 0;
            }

            .nav-submenu {
                max-height: 0 !important;
            }

            .main-content {
                margin-left: var(--sidebar-collapsed-width);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon"><i class="ph ph-chart-pie-slice"></i></div>
                <span class="logo-text">小贷管理台</span>
            </div>

            <nav class="nav-menu">
                <ul>
                    <div class="nav-section-label">概览</div>

                    <li class="nav-item active" data-page="dashboard">
                        <div class="nav-item-link" data-tooltip="驾驶舱">
                            <span class="nav-icon"><i class="ph ph-gauge"></i></span>
                            <span class="nav-label">驾驶舱</span>
                        </div>
                    </li>

                    <div class="nav-section-label">业务</div>

                    <li class="nav-item has-submenu" data-page="customer">
                        <div class="nav-item-link" data-tooltip="客户管理">
                            <span class="nav-icon"><i class="ph ph-users-three"></i></span>
                            <span class="nav-label">客户管理</span>
                            <span class="nav-arrow"><i class="ph ph-caret-right"></i></span>
                        </div>
                        <ul class="nav-submenu">
                            <li class="nav-item" data-page="customer-list">
                                <div class="nav-item-link">
                                    <span class="nav-label">客户列表</span>
                                </div>
                            </li>
                            <li class="nav-item" data-page="corporate-relationship-graph">
                                <div class="nav-item-link">
                                    <span class="nav-label">企业关系图谱</span>
                                </div>
                            </li>
                            <li class="nav-item" data-page="user-profile">
                                <div class="nav-item-link">
                                    <span class="nav-label">用户画像</span>
                                </div>
                            </li>
                        </ul>
                    </li>

                    <li class="nav-item has-submenu" data-page="finance">
                        <div class="nav-item-link" data-tooltip="财务管理">
                            <span class="nav-icon"><i class="ph ph-wallet"></i></span>
                            <span class="nav-label">财务管理</span>
                            <span class="nav-arrow"><i class="ph ph-caret-right"></i></span>
                        </div>
                        <ul class="nav-submenu">
                            <li class="nav-item" data-page="finance-dashboard">
                                <div class="nav-item-link">
                                    <span class="nav-label">财务驾驶舱</span>
                                </div>
                            </li>
                            <li class="nav-item" data-page="asset-distribution">
                                <div class="nav-item-link">
                                    <span class="nav-label">资产分布</span>
                                </div>
                            </li>
                            <li class="nav-item" data-page="income-statistics">
                                <div class="nav-item-link">
                                    <span class="nav-label">收入统计</span>
                                </div>
                            </li>
                            <li class="nav-item" data-page="financial-statements">
                                <div class="nav-item-link">
                                    <span class="nav-label">财务报表</span>
                                </div>
                            </li>
                        </ul>
                    </li>

                    <li class="nav-item has-submenu" data-page="marketing">
                        <div class="nav-item-link" data-tooltip="营销管理">
                            <span class="nav-icon"><i class="ph ph-megaphone"></i></span>
                            <span class="nav-label">营销管理</span>
                            <span class="nav-arrow"><i class="ph ph-caret-right"></i></span>
                        </div>
                        <ul class="nav-submenu">
                            <li class="nav-item" data-page="marketing-activity">
                                <div class="nav-item-link">
                                    <span class="nav-label">营销活动</span>
                                </div>
                            </li>
                            <li class="nav-item" data-page="customer-maintenance">
                                <div class="nav-item-link">
                                    <span class="nav-label">客户维护</span>
                                </div>
                            </li>
                        </ul>
                    </li>

                    <div class="nav-section-label">效率</div>

                    <li class="nav-item" data-page="task">
                        <div class="nav-item-link" data-tooltip="任务管理">
                            <span class="nav-icon"><i class="ph ph-clipboard-text"></i></span>
                            <span class="nav-label">任务管理</span>
                        </div>
                    </li>

                    <li class="nav-item" data-page="schedule">
                        <div class="nav-item-link" data-tooltip="日程管理">
                            <span class="nav-icon"><i class="ph ph-calendar-dots"></i></span>
                            <span class="nav-label">日程管理</span>
                        </div>
                    </li>

                    <li class="nav-item" data-page="report">
                        <div class="nav-item-link" data-tooltip="数据报表">
                            <span class="nav-icon"><i class="ph ph-chart-line-up"></i></span>
                            <span class="nav-label">数据报表</span>
                        </div>
                    </li>

                    <li class="nav-item" data-page="message">
                        <div class="nav-item-link" data-tooltip="消息中心">
                            <span class="nav-icon"><i class="ph ph-chat-circle-dots"></i></span>
                            <span class="nav-label">消息中心</span>
                        </div>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <button class="sidebar-collapse-btn" id="collapseToggle" title="收起/展开菜单">
                    <span class="collapse-icon"><i class="ph ph-caret-double-left"></i></span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <div class="breadcrumb">
                        <span>首页</span>
                        <span class="breadcrumb-sep">/</span>
                        <span class="breadcrumb-current" id="breadcrumbCurrent">驾驶舱</span>
                    </div>
                </div>
                <div class="header-right">
                    <button class="header-icon-btn" title="搜索">
                        <i class="ph ph-magnifying-glass"></i>
                    </button>
                    <button class="header-icon-btn" title="通知">
                        <i class="ph ph-bell"></i>
                        <span class="badge"></span>
                    </button>
                    <button class="header-icon-btn" title="设置">
                        <i class="ph ph-gear-six"></i>
                    </button>
                    <div class="user-block">
                        <div class="user-avatar">管</div>
                        <div>
                            <div class="user-name">管理员</div>
                            <div class="user-role">超级管理员</div>
                        </div>
                    </div>
                </div>
            </header>

            <iframe id="contentFrame" class="content-iframe" src="dashboard.html" frameborder="0"></iframe>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const appContainer = document.querySelector('.app-container');
            const contentFrame = document.getElementById('contentFrame');
            const breadcrumbCurrent = document.getElementById('breadcrumbCurrent');
            const collapseToggle = document.getElementById('collapseToggle');

            // Page mapping
            const pageMapping = {
                'dashboard': { url: 'dashboard.html', title: '驾驶舱' },
                'customer': { url: 'customer.html', title: '客户管理' },
                'customer-list': { url: 'customer.html', title: '客户列表' },
                'corporate-relationship-graph': { url: 'corporate-relationship-graph.html', title: '企业关系图谱' },
                'user-profile': { url: 'user-profile.html', title: '用户画像' },
                'task': { url: 'task.html', title: '任务管理' },
                'schedule': { url: 'schedule.html', title: '日程管理' },
                'report': { url: 'report.html', title: '数据报表' },
                'message': { url: 'message.html', title: '消息中心' },
                'marketing-activity': { url: 'marketing.html', title: '营销活动' },
                'customer-maintenance': { url: 'customer-maintenance.html', title: '客户维护' },
                'asset-distribution': { url: 'assetStatistics-all-in-one.html', title: '资产分布' },
                'finance-dashboard': { url: 'finance-all-in-one.html', title: '财务驾驶舱' },
                'income-statistics': { url: 'income-all-in-one.html', title: '收入统计' },
                'financial-statements': { url: 'financialStatements-dashboard.html', title: '财务报表' }
            };

            // Get all top-level nav items
            const allNavItems = document.querySelectorAll('.nav-menu .nav-item');

            allNavItems.forEach(item => {
                const link = item.querySelector(':scope > .nav-item-link');
                if (!link) return;

                link.addEventListener('click', function (e) {
                    e.stopPropagation();
                    const page = item.getAttribute('data-page');

                    // If it's a submenu parent, toggle open/close
                    if (item.classList.contains('has-submenu')) {
                        item.classList.toggle('open');
                        return;
                    }

                    // Clear all active states
                    allNavItems.forEach(n => n.classList.remove('active'));

                    // Set this item active
                    item.classList.add('active');

                    // Navigate
                    const mapping = pageMapping[page];
                    if (mapping) {
                        contentFrame.src = mapping.url;
                        breadcrumbCurrent.textContent = mapping.title;
                        document.title = mapping.title + ' - 小贷管理台';
                    } else {
                        alert('该功能正在开发中...');
                    }
                });
            });

            // Collapse / Expand toggle
            collapseToggle.addEventListener('click', function () {
                appContainer.classList.toggle('sidebar-collapsed');
            });
        });
    </script>
</body>
</html>
