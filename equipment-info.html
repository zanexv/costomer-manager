<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#35774;&#22791;&#20449;&#24687;</title>
    <style>
        :root { --page-bg:#f8fafc; --card-bg:#fff; --shadow:0 2px 4px rgba(15,23,42,.08),0 10px 24px rgba(15,23,42,.04); --text:#1e293b; --sub:#64748b; --muted:#94a3b8; --border:#e2e8f0; --soft:#edf2f7; --purple:#8b5cf6; --purple-soft:#f5efff; --orange:#f97316; --orange-soft:#fff7ed; --green:#22c55e; --green-soft:#f0fdf4; --blue:#60a5fa; --blue-soft:#eff6ff; --row:#faf7ff; --radius:12px; --radius-sm:6px; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:"PingFang SC","Microsoft YaHei",sans-serif; font-size:14px; line-height:1.5; color:var(--text); background:var(--page-bg); }
        .page { max-width:1160px; margin:0 auto; padding:20px; }
        .stats-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:16px; margin-bottom:20px; }
        .stat-card { min-height:104px; padding:20px; border-radius:var(--radius); box-shadow:var(--shadow); background:var(--card-bg); border-top:4px solid transparent; text-align:center; display:flex; flex-direction:column; justify-content:center; }
        .stat-card.purple { border-top-color:var(--purple); background:linear-gradient(180deg,var(--purple-soft),#fff); }
        .stat-card.orange { border-top-color:var(--orange); background:linear-gradient(180deg,var(--orange-soft),#fff); }
        .stat-card.green { border-top-color:var(--green); background:linear-gradient(180deg,var(--green-soft),#fff); }
        .stat-card.blue { border-top-color:var(--blue); background:linear-gradient(180deg,var(--blue-soft),#fff); }
        .stat-value { font-family:"Inter","PingFang SC",sans-serif; font-size:30px; line-height:1.2; font-weight:600; letter-spacing:.02em; }
        .stat-label { margin-top:8px; color:var(--sub); font-size:14px; }
        .section-card { margin-bottom:20px; padding:20px; border-radius:var(--radius); box-shadow:var(--shadow); background:var(--card-bg); }
        .section-header { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:16px; padding-left:8px; }
        .section-title { display:inline-flex; align-items:center; gap:10px; font-size:18px; font-weight:500; color:#111827; }
        .section-title::before { content:""; width:4px; height:18px; border-radius:999px; background:var(--purple); }
        .section-actions { display:flex; align-items:center; gap:12px; }
        .btn { appearance:none; border:1px solid transparent; min-width:70px; height:38px; padding:0 20px; border-radius:var(--radius-sm); font-size:14px; font-weight:500; cursor:pointer; transition:transform .16s ease, box-shadow .16s ease, background-color .16s ease, border-color .16s ease; }
        .btn:hover { transform:translateY(-1px); }
        .btn-primary { background:var(--purple); color:#fff; box-shadow:0 8px 20px rgba(139,92,246,.18); }
        .btn-secondary { background:#fff; color:var(--purple); border-color:#c4b5fd; }
        .table-shell { border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; background:#fff; }
        .table-scroll { overflow-x:auto; }
        table { width:100%; min-width:1040px; border-collapse:collapse; }
        thead th { padding:14px 16px; background:#f8fafc; border-bottom:1px solid var(--border); text-align:left; white-space:nowrap; font-size:13px; font-weight:600; color:rgba(0,0,0,.88); }
        tbody td { padding:13px 16px; border-bottom:1px solid var(--soft); white-space:nowrap; vertical-align:middle; color:#111827; }
        tbody tr:last-child td { border-bottom:none; }
        tbody tr.view-row:hover { background:#fcfcff; }
        tbody tr.edit-row { background:var(--row); }
        .row-index { width:58px; color:#4b5563; }
        .input-cell input, .input-cell select { width:100%; height:30px; padding:0 10px; border:1px solid #d1d5db; border-radius:4px; outline:none; background:#fff; color:#111827; font-size:13px; }
        .input-cell input:focus, .input-cell select:focus { border-color:#c4b5fd; box-shadow:0 0 0 3px rgba(139,92,246,.12); }
        .input-cell input::placeholder { color:#c0c4cc; }
        .action-col { width:84px; }
        .delete-btn { width:18px; height:18px; border:none; border-radius:50%; background:#9ca3af; color:#fff; font-size:12px; line-height:18px; text-align:center; cursor:pointer; }
        .delete-btn:hover { background:#7c8594; }
        .add-row-wrap { padding:8px 12px 12px; border-top:1px solid var(--soft); background:#fff; }
        .add-row-btn { width:100%; height:32px; border:1px dashed #d5d9e2; border-radius:var(--radius-sm); background:#fff; color:#8b8b8b; font-size:13px; cursor:pointer; }
        .add-row-btn:hover { border-color:#c4b5fd; color:var(--purple); background:#fcfaff; }
        .empty-tip { padding:24px 16px; text-align:center; color:var(--muted); }
        @media (max-width:1024px) { .stats-grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
        @media (max-width:640px) { .page { padding:16px; } .stats-grid { grid-template-columns:1fr; } .section-header { flex-direction:column; align-items:flex-start; } .section-actions { width:100%; justify-content:flex-end; } .btn { padding:0 16px; } }
    </style>
</head>
<body>
    <div class="page">
        <section class="stats-grid">
            <div class="stat-card purple"><div class="stat-value" id="totalEquipment">0</div><div class="stat-label">&#35774;&#22791;&#24635;&#25968;&#37327;</div></div>
            <div class="stat-card orange"><div class="stat-value" id="totalMonthlyRent">0.00</div><div class="stat-label">&#35774;&#22791;&#24635;&#39069;&#65288;&#19975;&#20803;&#65289;</div></div>
            <div class="stat-card green"><div class="stat-value" id="totalValue">0.00</div><div class="stat-label">&#35774;&#22791;&#24635;&#20215;&#20540;&#65288;&#19975;&#20803;&#65289;</div></div>
            <div class="stat-card blue"><div class="stat-value" id="totalFinancing">0.00</div><div class="stat-label">&#34701;&#36164;&#24635;&#20313;&#39069;&#65288;&#19975;&#20803;&#65289;</div></div>
        </section>

        <section class="section-card">
            <div class="section-header">
                <h2 class="section-title">&#31199;&#36161;&#35774;&#22791;</h2>
                <div class="section-actions" id="rentalActions"></div>
            </div>
            <div class="table-shell">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th class="row-index">&#24207;&#21495;</th>
                                <th>&#36215;&#31199;&#24180;&#20221;</th>
                                <th>&#21697;&#29260;</th>
                                <th>&#35268;&#26684;</th>
                                <th>&#25968;&#37327;</th>
                                <th>&#20215;&#26684;&#65288;&#19975;&#20803;&#65289;</th>
                                <th>&#20998;&#25315;&#25928;&#29575;&#65288;&#31080;/H&#65289;</th>
                                <th>&#34701;&#36164;&#20313;&#39069;&#65288;&#19975;&#20803;&#65289;</th>
                                <th class="action-col">&#25805;&#20316;</th>
                            </tr>
                        </thead>
                        <tbody id="rentalTableBody"></tbody>
                    </table>
                </div>
                <div class="add-row-wrap" id="rentalAddRowWrap" hidden><button class="add-row-btn" type="button" id="addRentalRowBtn">&#65291; &#28155;&#21152;&#19968;&#34892;&#25968;&#25454;</button></div>
            </div>
        </section>

        <section class="section-card">
            <div class="section-header">
                <h2 class="section-title">&#33258;&#36141;&#35774;&#22791;</h2>
                <div class="section-actions" id="ownedActions"></div>
            </div>
            <div class="table-shell">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th class="row-index">&#24207;&#21495;</th>
                                <th>&#36141;&#20080;&#24180;&#20221;</th>
                                <th>&#21697;&#29260;</th>
                                <th>&#35268;&#26684;</th>
                                <th>&#25968;&#37327;</th>
                                <th>&#20215;&#26684;&#65288;&#19975;&#20803;&#65289;</th>
                                <th>&#20998;&#25315;&#25928;&#29575;&#65288;&#31080;/H&#65289;</th>
                                <th>&#34701;&#36164;&#20313;&#39069;&#65288;&#19975;&#20803;&#65289;</th>
                                <th class="action-col">&#25805;&#20316;</th>
                            </tr>
                        </thead>
                        <tbody id="ownedTableBody"></tbody>
                    </table>
                </div>
                <div class="add-row-wrap" id="ownedAddRowWrap" hidden><button class="add-row-btn" type="button" id="addOwnedRowBtn">&#65291; &#28155;&#21152;&#19968;&#34892;&#25968;&#25454;</button></div>
            </div>
        </section>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const text = {
                edit: "\u7f16\u8f91", save: "\u4fdd\u5b58", cancel: "\u53d6\u6d88",
                emptyRental: "\u6682\u65e0\u79df\u8d41\u8bbe\u5907\u6570\u636e", emptyOwned: "\u6682\u65e0\u81ea\u8d2d\u8bbe\u5907\u6570\u636e"
            };

            const rentalItems = [
                { id: 1, startYear: "2018", brand: "\u5bcc\u58eb\u901a", spec: "\u5c0f\u578b", quantity: "4", price: "58.69", efficiency: "1949", financingBalance: "3" },
                { id: 2, startYear: "2018", brand: "\u5bcc\u58eb\u901a", spec: "\u5c0f\u578b", quantity: "4", price: "58.69", efficiency: "1949", financingBalance: "3" },
                { id: 3, startYear: "2018", brand: "\u5bcc\u58eb\u901a", spec: "\u5c0f\u578b", quantity: "4", price: "58.69", efficiency: "1949", financingBalance: "3" },
                { id: 4, startYear: "2018", brand: "\u5bcc\u58eb\u901a", spec: "\u5c0f\u578b", quantity: "4", price: "58.69", efficiency: "1949", financingBalance: "3" }
            ];

            const ownedItems = [
                { id: 1, purchaseYear: "2018", brand: "\u5bcc\u58eb\u901a", spec: "\u5c0f\u578b", quantity: "4", price: "58.69", efficiency: "1949", financingBalance: "3" },
                { id: 2, purchaseYear: "2018", brand: "\u5bcc\u58eb\u901a", spec: "\u5c0f\u578b", quantity: "4", price: "58.69", efficiency: "1949", financingBalance: "3" },
                { id: 3, purchaseYear: "2018", brand: "\u5bcc\u58eb\u901a", spec: "\u5c0f\u578b", quantity: "4", price: "58.69", efficiency: "1949", financingBalance: "3" },
                { id: 4, purchaseYear: "2018", brand: "\u5bcc\u58eb\u901a", spec: "\u5c0f\u578b", quantity: "4", price: "58.69", efficiency: "1949", financingBalance: "3" }
            ];

            const state = { rental: { items: clone(rentalItems), editing: false, snapshot: null }, owned: { items: clone(ownedItems), editing: false, snapshot: null } };
            const rentalTableBody = document.getElementById("rentalTableBody");
            const ownedTableBody = document.getElementById("ownedTableBody");
            const rentalActions = document.getElementById("rentalActions");
            const ownedActions = document.getElementById("ownedActions");
            const rentalAddRowWrap = document.getElementById("rentalAddRowWrap");
            const ownedAddRowWrap = document.getElementById("ownedAddRowWrap");

            document.getElementById("addRentalRowBtn").addEventListener("click", addRentalRow);
            document.getElementById("addOwnedRowBtn").addEventListener("click", addOwnedRow);
            rentalActions.addEventListener("click", handleAction("rental"));
            ownedActions.addEventListener("click", handleAction("owned"));
            rentalTableBody.addEventListener("click", function (event) { const btn = event.target.closest("[data-delete-rental]"); if (btn) deleteRentalRow(Number(btn.dataset.deleteRental)); });
            ownedTableBody.addEventListener("click", function (event) { const btn = event.target.closest("[data-delete-owned]"); if (btn) deleteOwnedRow(Number(btn.dataset.deleteOwned)); });

            function handleAction(sectionName) {
                return function (event) {
                    const action = event.target.dataset.action;
                    if (action === "edit") enterSectionEdit(sectionName);
                    if (action === "cancel") cancelSectionEdit(sectionName);
                    if (action === "save") saveSectionEdit(sectionName);
                };
            }

            function clone(data) { return JSON.parse(JSON.stringify(data)); }
            function escapeHtml(value) { return String(value == null ? "" : value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
            function renumber(items) { items.forEach(function (item, index) { item.id = index + 1; }); }
            function formatMoney(value) { return Number(value || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
            function syncSection(sectionName) { document.querySelectorAll("[data-section=\"" + sectionName + "\"]").forEach(function (el) { const idx = Number(el.dataset.index); const field = el.dataset.field; if (state[sectionName].items[idx]) state[sectionName].items[idx][field] = el.value.trim(); }); }
            function syncEditing() { if (state.rental.editing) syncSection("rental"); if (state.owned.editing) syncSection("owned"); }
            function buildSelect(field, index, sectionName, options, selected) { return "<select data-field=\"" + field + "\" data-index=\"" + index + "\" data-section=\"" + sectionName + "\">" + options.map(function (option) { return "<option value=\"" + escapeHtml(option) + "\"" + (option === selected ? " selected" : "") + ">" + escapeHtml(option) + "</option>"; }).join("") + "</select>"; }

            function updateStats() {
                const totalEquipment = state.rental.items.reduce(function (sum, item) { return sum + Number(item.quantity || 0); }, 0) + state.owned.items.reduce(function (sum, item) { return sum + Number(item.quantity || 0); }, 0);
                const totalAmount = state.rental.items.reduce(function (sum, item) { return sum + Number(item.price || 0) * Number(item.quantity || 0); }, 0) + state.owned.items.reduce(function (sum, item) { return sum + Number(item.price || 0) * Number(item.quantity || 0); }, 0);
                const totalValue = state.owned.items.reduce(function (sum, item) { return sum + Number(item.price || 0) * Number(item.quantity || 0); }, 0);
                const totalFinancing = state.rental.items.reduce(function (sum, item) { return sum + Number(item.financingBalance || 0); }, 0) + state.owned.items.reduce(function (sum, item) { return sum + Number(item.financingBalance || 0); }, 0);
                document.getElementById("totalEquipment").textContent = String(totalEquipment);
                document.getElementById("totalMonthlyRent").textContent = formatMoney(totalAmount);
                document.getElementById("totalValue").textContent = formatMoney(totalValue);
                document.getElementById("totalFinancing").textContent = formatMoney(totalFinancing);
            }

            function renderActions(sectionName) {
                const target = sectionName === "rental" ? rentalActions : ownedActions;
                target.innerHTML = state[sectionName].editing
                    ? "<button class=\"btn btn-secondary\" type=\"button\" data-action=\"cancel\">" + text.cancel + "</button><button class=\"btn btn-primary\" type=\"button\" data-action=\"save\">" + text.save + "</button>"
                    : "<button class=\"btn btn-primary\" type=\"button\" data-action=\"edit\">" + text.edit + "</button>";
            }

            function renderRentalTable() {
                renderActions("rental");
                rentalAddRowWrap.hidden = !state.rental.editing;
                rentalTableBody.innerHTML = "";
                if (!state.rental.items.length) { rentalTableBody.innerHTML = "<tr><td colspan=\"9\" class=\"empty-tip\">" + text.emptyRental + "</td></tr>"; return; }
                state.rental.items.forEach(function (item, index) {
                    const row = document.createElement("tr");
                    row.className = state.rental.editing ? "edit-row" : "view-row";
                    row.innerHTML = state.rental.editing ? [
                        "<td class=\"row-index\">" + item.id + "</td>",
                        "<td class=\"input-cell\"><input data-section=\"rental\" data-index=\"" + index + "\" data-field=\"startYear\" value=\"" + escapeHtml(item.startYear) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"rental\" data-index=\"" + index + "\" data-field=\"brand\" value=\"" + escapeHtml(item.brand) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"rental\" data-index=\"" + index + "\" data-field=\"spec\" value=\"" + escapeHtml(item.spec) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"rental\" data-index=\"" + index + "\" data-field=\"quantity\" value=\"" + escapeHtml(item.quantity) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"rental\" data-index=\"" + index + "\" data-field=\"price\" value=\"" + escapeHtml(item.price) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"rental\" data-index=\"" + index + "\" data-field=\"efficiency\" value=\"" + escapeHtml(item.efficiency) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"rental\" data-index=\"" + index + "\" data-field=\"financingBalance\" value=\"" + escapeHtml(item.financingBalance) + "\"></td>",
                        "<td class=\"action-col\"><button class=\"delete-btn\" type=\"button\" data-delete-rental=\"" + index + "\">&times;</button></td>"
                    ].join("") : [
                        "<td class=\"row-index\">" + item.id + "</td>",
                        "<td>" + escapeHtml(item.startYear) + "</td><td>" + escapeHtml(item.brand) + "</td><td>" + escapeHtml(item.spec) + "</td><td>" + escapeHtml(item.quantity) + "</td><td>" + escapeHtml(item.price) + "</td><td>" + escapeHtml(item.efficiency) + "</td><td>" + escapeHtml(item.financingBalance) + "</td><td class=\"action-col\"></td>"
                    ].join("");
                    rentalTableBody.appendChild(row);
                });
            }

            function renderOwnedTable() {
                renderActions("owned");
                ownedAddRowWrap.hidden = !state.owned.editing;
                ownedTableBody.innerHTML = "";
                if (!state.owned.items.length) { ownedTableBody.innerHTML = "<tr><td colspan=\"9\" class=\"empty-tip\">" + text.emptyOwned + "</td></tr>"; return; }
                state.owned.items.forEach(function (item, index) {
                    const row = document.createElement("tr");
                    row.className = state.owned.editing ? "edit-row" : "view-row";
                    row.innerHTML = state.owned.editing ? [
                        "<td class=\"row-index\">" + item.id + "</td>",
                        "<td class=\"input-cell\"><input data-section=\"owned\" data-index=\"" + index + "\" data-field=\"purchaseYear\" value=\"" + escapeHtml(item.purchaseYear) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"owned\" data-index=\"" + index + "\" data-field=\"brand\" value=\"" + escapeHtml(item.brand) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"owned\" data-index=\"" + index + "\" data-field=\"spec\" value=\"" + escapeHtml(item.spec) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"owned\" data-index=\"" + index + "\" data-field=\"quantity\" value=\"" + escapeHtml(item.quantity) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"owned\" data-index=\"" + index + "\" data-field=\"price\" value=\"" + escapeHtml(item.price) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"owned\" data-index=\"" + index + "\" data-field=\"efficiency\" value=\"" + escapeHtml(item.efficiency) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"owned\" data-index=\"" + index + "\" data-field=\"financingBalance\" value=\"" + escapeHtml(item.financingBalance) + "\"></td>",
                        "<td class=\"action-col\"><button class=\"delete-btn\" type=\"button\" data-delete-owned=\"" + index + "\">&times;</button></td>"
                    ].join("") : [
                        "<td class=\"row-index\">" + item.id + "</td>",
                        "<td>" + escapeHtml(item.purchaseYear) + "</td><td>" + escapeHtml(item.brand) + "</td><td>" + escapeHtml(item.spec) + "</td><td>" + escapeHtml(item.quantity) + "</td><td>" + escapeHtml(item.price) + "</td><td>" + escapeHtml(item.efficiency) + "</td><td>" + escapeHtml(item.financingBalance) + "</td><td class=\"action-col\"></td>"
                    ].join("");
                    ownedTableBody.appendChild(row);
                });
            }

            function enterSectionEdit(sectionName) { if (state[sectionName].editing) return; syncEditing(); state[sectionName].snapshot = clone(state[sectionName].items); state[sectionName].editing = true; renderAll(); }
            function cancelSectionEdit(sectionName) { if (!state[sectionName].editing) return; state[sectionName].items = clone(state[sectionName].snapshot || []); state[sectionName].snapshot = null; state[sectionName].editing = false; renderAll(); }
            function saveSectionEdit(sectionName) { if (!state[sectionName].editing) return; syncSection(sectionName); renumber(state[sectionName].items); state[sectionName].snapshot = null; state[sectionName].editing = false; renderAll(); }
            function addRentalRow() { syncSection("rental"); state.rental.items.push({ id: state.rental.items.length + 1, startYear: "", brand: "", spec: "", quantity: "", price: "", efficiency: "", financingBalance: "" }); renderAll(); }
            function addOwnedRow() { syncSection("owned"); state.owned.items.push({ id: state.owned.items.length + 1, purchaseYear: "", brand: "", spec: "", quantity: "", price: "", efficiency: "", financingBalance: "" }); renderAll(); }
            function deleteRentalRow(index) { syncSection("rental"); state.rental.items.splice(index, 1); renumber(state.rental.items); renderAll(); }
            function deleteOwnedRow(index) { syncSection("owned"); state.owned.items.splice(index, 1); renumber(state.owned.items); renderAll(); }
            function renderAll() { syncEditing(); updateStats(); renderRentalTable(); renderOwnedTable(); }

            renderAll();
        });
    </script>
</body>
</html>
