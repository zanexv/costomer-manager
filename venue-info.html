<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场地信息</title>
    <style>
        :root {
            --page-bg: #f8fafc;
            --card-bg: #ffffff;
            --card-shadow: 0 2px 4px rgba(15, 23, 42, 0.08), 0 10px 24px rgba(15, 23, 42, 0.04);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --border-soft: #edf2f7;
            --purple: #8b5cf6;
            --purple-soft: #f5efff;
            --orange: #f97316;
            --orange-soft: #fff7ed;
            --green: #22c55e;
            --green-soft: #f0fdf4;
            --blue: #60a5fa;
            --blue-soft: #eff6ff;
            --input-bg: #ffffff;
            --table-head: #f8fafc;
            --row-accent: #faf7ff;
            --delete-bg: #9ca3af;
            --delete-text: #ffffff;
            --radius-sm: 6px;
            --radius-md: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-primary);
            background: var(--page-bg);
        }

        .page {
            max-width: 1160px;
            margin: 0 auto;
            padding: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            min-height: 110px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: left;
            gap: 4px;
        }

        .stat-value {
            order: 2;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            font-size: 32px;
            line-height: 1.1;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: #1d1d1f;
            font-variant-numeric: tabular-nums;
        }

        .stat-label {
            order: 1;
            margin-top: 0;
            color: rgba(0, 0, 0, 0.56);
            font-size: 13px;
            font-weight: 500;
        }

        .section-card {
            background: var(--card-bg);
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            padding: 22px;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .section-title {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 600;
            color: #111827;
        }

        .section-title::before {
            content: "";
            width: 4px;
            height: 16px;
            border-radius: 999px;
            background: var(--purple);
        }

        .section-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            appearance: none;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            min-width: 70px;
            height: 38px;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease, border-color 0.16s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--purple);
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.18);
        }

        .btn-secondary {
            background: #ffffff;
            color: var(--purple);
            border-color: #c4b5fd;
        }

        .table-shell {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: #ffffff;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 980px;
            table-layout: fixed; /* 采用固定布局防止列宽跳动 */
        }

        thead th {
            background: var(--table-head);
            color: rgba(0, 0, 0, 0.88);
            font-size: 13px;
            font-weight: 600;
            text-align: left;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        tbody td {
            height: 48px;
            padding: 0 16px;
            border-bottom: 1px solid var(--border-soft);
            color: #111827;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            vertical-align: middle;
            font-variant-numeric: tabular-nums;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr.view-row:hover {
            background: #fcfcff;
        }

        tbody tr.edit-row {
            background: #fff;
        }
        tbody tr.edit-row:focus-within {
            background: var(--row-accent);
        }

        .row-index {
            width: 58px;
            color: #4b5563;
        }

        .input-cell {
            padding: 0 8px !important;
        }

        .input-cell input,
        .input-cell select {
            width: 100%;
            height: 32px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 0 8px;
            background: var(--input-bg);
            color: #111827;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        .input-cell input:focus,
        .input-cell select:focus {
            border-color: #c4b5fd;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
        }

        .input-cell input::placeholder {
            color: #c0c4cc;
        }

        .action-col {
            display: none;
            width: 80px;
            text-align: center;
        }

        .is-editing .action-col {
            display: table-cell;
            position: sticky;
            right: 0;
            background: #ffffff;
            z-index: 11;
            box-shadow: -10px 0 20px rgba(0, 0, 0, 0.03);
            border-left: 1px solid var(--border-soft);
        }

        thead th.action-col {
            background: var(--table-head) !important;
            z-index: 12;
        }

        .delete-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 6px;
            background: #fee2e2;
            color: #ef4444;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #fecaca;
            transform: scale(1.1);
        }

        .add-row-wrap {
            padding: 8px 12px 12px;
            border-top: 1px solid var(--border-soft);
            background: #ffffff;
        }

        .add-row-btn {
            width: 100%;
            height: 32px;
            border: 1px dashed #d5d9e2;
            border-radius: var(--radius-sm);
            background: #ffffff;
            color: #8b8b8b;
            font-size: 13px;
            cursor: pointer;
        }

        .add-row-btn:hover {
            border-color: #c4b5fd;
            color: var(--purple);
            background: #fcfaff;
        }

        .empty-tip {
            padding: 24px 16px;
            text-align: center;
            color: var(--text-muted);
        }

        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .page {
                padding: 16px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .section-actions {
                width: 100%;
                justify-content: flex-end;
            }

            .btn {
                padding: 0 16px;
            }
        }

        /* Apple Style Popconfirm Bubbles */
        .popover-confirm {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            z-index: 2000;
            width: 180px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: popIn 0.24s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            pointer-events: auto;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .popover-title { font-size: 13px; font-weight: 500; color: #1d1d1f; text-align: center; }
        .popover-btns { display: flex; gap: 6px; }
        .popover-btns button { flex: 1; height: 28px; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .pop-btn-cancel { background: rgba(0,0,0,0.05); color: #007aff; }
        .pop-btn-cancel:hover { background: rgba(0,0,0,0.08); }
        .pop-btn-delete { background: #ff3b30; color: #fff; }
        .pop-btn-delete:hover { background: #e0352a; }
        .popover-confirm::after { content: ""; position: absolute; bottom: -6px; left: 50%; margin-left: -6px; border-width: 6px 6px 0; border-style: solid; border-color: rgba(255,255,255,0.9) transparent transparent; }

        /* Apple Style Smart Tooltip */
        .apple-tooltip {
            position: absolute;
            background: rgba(45, 45, 47, 0.94);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.4;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            max-width: 300px;
            white-space: normal;
            word-break: break-all;
        }
        .apple-tooltip.visible { opacity: 1; }

        /* Ant Design Style Table — Auto Column Sizing */
        .table-shell { width: 100%; border-radius: 12px; overflow-x: auto; }
        table { table-layout: auto; width: 100%; border-collapse: collapse; }
        th, td { 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            padding: 10px 14px;
            max-width: 220px;
        }
        .row-index { white-space: nowrap; width: 1%; }
        .action-col { white-space: nowrap; width: 1%; text-align: center; }
    </style>
</head>
<body>
    <div class="page">
        <section class="stats-grid">
            <div class="stat-card purple">
                <div class="stat-value" id="totalVenues">0</div>
                <div class="stat-label">&#22330;&#22320;&#24635;&#25968;&#37327;</div>
            </div>
            <div class="stat-card orange">
                <div class="stat-value" id="totalRent">0.00</div>
                <div class="stat-label">&#24180;&#31199;&#37329;&#24635;&#39069;&#65288;&#19975;&#20803;&#65289;</div>
            </div>
            <div class="stat-card green">
                <div class="stat-value" id="totalValuation">0.00</div>
                <div class="stat-label">&#22330;&#22320;&#20272;&#20540;&#24635;&#39069;&#65288;&#19975;&#20803;&#65289;</div>
            </div>
            <div class="stat-card blue">
                <div class="stat-value" id="totalFinancing">0.00</div>
                <div class="stat-label">&#22330;&#22320;&#34701;&#36164;&#24635;&#20313;&#39069;&#65288;&#19975;&#20803;&#65289;</div>
            </div>
        </section>

        <section class="section-card">
            <div class="section-header">
                <h2 class="section-title">&#31199;&#36161;&#22330;&#22320;</h2>
                <div class="section-actions" id="rentalActions"></div>
            </div>
            <div class="table-shell">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th class="row-index">&#24207;&#21495;</th>
                                <th>&#38754;&#31215;&#65288;&#13217;&#65289;</th>
                                <th>&#20351;&#29992;&#24180;&#38480;</th>
                                <th>&#31199;&#26399;&#65288;&#24180;&#65289;</th>
                                <th>&#25903;&#20184;&#26041;&#24335;</th>
                                <th>&#24180;&#31199;&#37329;&#65288;&#19975;&#20803;&#65289;</th>
                                <th>&#36215;&#31199;&#24180;&#20221;</th>
                                <th>&#20184;&#31199;&#26102;&#38388;</th>
                                <th class="action-col">&#25805;&#20316;</th>
                            </tr>
                        </thead>
                        <tbody id="rentalTableBody"></tbody>
                    </table>
                </div>
                <div class="add-row-wrap" id="rentalAddRowWrap" hidden>
                    <button class="add-row-btn" type="button" id="addRentalRowBtn">&#65291; &#28155;&#21152;&#19968;&#34892;&#25968;&#25454;</button>
                </div>
            </div>
        </section>

        <section class="section-card">
            <div class="section-header">
                <h2 class="section-title">&#33258;&#36141;&#22330;&#22320;</h2>
                <div class="section-actions" id="ownedActions"></div>
            </div>
            <div class="table-shell">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th class="row-index">&#24207;&#21495;</th>
                                <th>&#38754;&#31215;&#65288;&#13217;&#65289;</th>
                                <th>&#20351;&#29992;&#24180;&#38480;</th>
                                <th>&#25269;&#25276;&#24773;&#20917;</th>
                                <th>&#36141;&#32622;&#20215;&#26684;&#65288;&#19975;&#20803;&#65289;</th>
                                <th>&#24403;&#21069;&#20272;&#20540;&#65288;&#19975;&#20803;&#65289;</th>
                                <th>&#34701;&#36164;&#20313;&#39069;&#65288;&#19975;&#20803;&#65289;</th>
                                <th>&#36141;&#20080;&#24180;&#20221;</th>
                                <th class="action-col">&#25805;&#20316;</th>
                            </tr>
                        </thead>
                        <tbody id="ownedTableBody"></tbody>
                    </table>
                </div>
                <div class="add-row-wrap" id="ownedAddRowWrap" hidden>
                    <button class="add-row-btn" type="button" id="addOwnedRowBtn">&#65291; &#28155;&#21152;&#19968;&#34892;&#25968;&#25454;</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const text = {
                monthlyByQuarter: "\u6309\u5b63\u4ed8",
                quarterPay: "\u5b63\u4ed8",
                yearlyPay: "\u5e74\u4ed8",
                monthlyPay: "\u6708\u4ed8",
                halfYearPay: "\u534a\u5e74\u4ed8",
                oneOffPay: "\u4e00\u6b21\u6027\u4ed8\u6e05",
                allMortgage: "\u5168\u90e8\u62b5\u62bc",
                partMortgage: "\u90e8\u5206\u62b5\u62bc",
                noMortgage: "\u65e0\u62b5\u62bc",
                monthly10: "\u6bcf\u670810\u65e5",
                yearlyFirst: "\u6bcf\u5e741\u67081\u65e5",
                placeholderPaymentTime: "\u4f8b\uff1a\u6bcf\u670810\u65e5",
                edit: "\u7f16\u8f91",
                save: "\u4fdd\u5b58",
                cancel: "\u53d6\u6d88",
                emptyRental: "\u6682\u65e0\u79df\u8d41\u573a\u5730\u6570\u636e",
                emptyOwned: "\u6682\u65e0\u81ea\u8d2d\u573a\u5730\u6570\u636e"
            };

            const initialRentalData = [
                { id: 1, area: "2018", usageYears: "30", period: "5", paymentMethod: text.monthlyByQuarter, annualFee: "100.00", startYear: "2020", paymentTime: text.monthly10 },
                { id: 2, area: "2018", usageYears: "30", period: "5", paymentMethod: text.quarterPay, annualFee: "100.00", startYear: "2020", paymentTime: text.yearlyFirst },
                { id: 3, area: "2018", usageYears: "30", period: "5", paymentMethod: text.yearlyPay, annualFee: "100.00", startYear: "2020", paymentTime: text.yearlyFirst },
                { id: 4, area: "2018", usageYears: "30", period: "5", paymentMethod: text.yearlyPay, annualFee: "100.00", startYear: "2020", paymentTime: text.yearlyFirst }
            ];

            const initialOwnedData = [
                { id: 1, area: "2018", usageYears: "30", mortgage: text.allMortgage, purchasePrice: "1300.33", currentValue: "1000.00", financingBalance: "300.00", purchaseYear: "2020" },
                { id: 2, area: "2018", usageYears: "30", mortgage: text.partMortgage, purchasePrice: "1300.33", currentValue: "1000.00", financingBalance: "300.00", purchaseYear: "2020" },
                { id: 3, area: "2018", usageYears: "30", mortgage: text.partMortgage, purchasePrice: "1300.33", currentValue: "1000.00", financingBalance: "300.00", purchaseYear: "2020" },
                { id: 4, area: "2018", usageYears: "30", mortgage: text.partMortgage, purchasePrice: "1300.33", currentValue: "1000.00", financingBalance: "300.00", purchaseYear: "2020" }
            ];

            const paymentOptions = [text.monthlyPay, text.monthlyByQuarter, text.quarterPay, text.halfYearPay, text.yearlyPay, text.oneOffPay];
            const mortgageOptions = [text.noMortgage, text.partMortgage, text.allMortgage];
            const state = {
                rental: { items: clone(initialRentalData), editing: false, snapshot: null },
                owned: { items: clone(initialOwnedData), editing: false, snapshot: null }
            };

            const rentalTableBody = document.getElementById("rentalTableBody");
            const ownedTableBody = document.getElementById("ownedTableBody");
            const rentalActions = document.getElementById("rentalActions");
            const ownedActions = document.getElementById("ownedActions");
            const rentalAddRowWrap = document.getElementById("rentalAddRowWrap");
            const ownedAddRowWrap = document.getElementById("ownedAddRowWrap");

            document.getElementById("addRentalRowBtn").addEventListener("click", addRentalRow);
            document.getElementById("addOwnedRowBtn").addEventListener("click", addOwnedRow);

            rentalActions.addEventListener("click", function (event) {
                const action = event.target.dataset.action;
                if (action === "edit") {
                    enterSectionEdit("rental");
                } else if (action === "cancel") {
                    cancelSectionEdit("rental");
                } else if (action === "save") {
                    saveSectionEdit("rental");
                }
            });

            ownedActions.addEventListener("click", function (event) {
                const action = event.target.dataset.action;
                if (action === "edit") {
                    enterSectionEdit("owned");
                } else if (action === "cancel") {
                    cancelSectionEdit("owned");
                } else if (action === "save") {
                    saveSectionEdit("owned");
                }
            });

            function clone(data) {
                return JSON.parse(JSON.stringify(data));
            }

            function escapeHtml(value) {
                return String(value == null ? "" : value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function formatMoney(value) {
                return Number(value || 0).toLocaleString("en-US", {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
            }

            function updateStats() {
                const totalVenues = state.rental.items.length + state.owned.items.length;
                const totalRent = state.rental.items.reduce(function (sum, item) {
                    return sum + Number(item.annualFee || 0);
                }, 0);
                const totalValuation = state.owned.items.reduce(function (sum, item) {
                    return sum + Number(item.currentValue || 0);
                }, 0);
                const totalFinancing = state.owned.items.reduce(function (sum, item) {
                    return sum + Number(item.financingBalance || 0);
                }, 0);

                document.getElementById("totalVenues").textContent = String(totalVenues);
                document.getElementById("totalRent").textContent = formatMoney(totalRent);
                document.getElementById("totalValuation").textContent = formatMoney(totalValuation);
                document.getElementById("totalFinancing").textContent = formatMoney(totalFinancing);
            }

            function syncSectionFromInputs(sectionName) {
                const rows = state[sectionName].items;
                document.querySelectorAll("[data-section=\"" + sectionName + "\"]").forEach(function (element) {
                    const index = Number(element.dataset.index);
                    const field = element.dataset.field;
                    if (rows[index]) {
                        rows[index][field] = element.value.trim();
                    }
                });
            }

            function syncEditingSections() {
                if (state.rental.editing) {
                    syncSectionFromInputs("rental");
                }
                if (state.owned.editing) {
                    syncSectionFromInputs("owned");
                }
            }

            function renumberItems(items) {
                items.forEach(function (item, index) {
                    item.id = index + 1;
                });
            }

            function buildSelect(field, index, sectionName, options, selectedValue) {
                const optionsHtml = options.map(function (option) {
                    const selected = option === selectedValue ? " selected" : "";
                    return "<option value=\"" + escapeHtml(option) + "\"" + selected + ">" + escapeHtml(option) + "</option>";
                }).join("");
                return "<select data-field=\"" + field + "\" data-index=\"" + index + "\" data-section=\"" + sectionName + "\">" + optionsHtml + "</select>";
            }

            function renderActionButtons(sectionName) {
                const target = sectionName === "rental" ? rentalActions : ownedActions;
                if (state[sectionName].editing) {
                    target.innerHTML =
                        "<button class=\"btn btn-secondary\" type=\"button\" data-action=\"cancel\">" + text.cancel + "</button>" +
                        "<button class=\"btn btn-primary\" type=\"button\" data-action=\"save\">" + text.save + "</button>";
                } else {
                    target.innerHTML = "<button class=\"btn btn-primary\" type=\"button\" data-action=\"edit\">" + text.edit + "</button>";
                }
                
                const saveBtn = target.querySelector('[data-action="save"]');
                if (saveBtn) {
                    saveBtn.onclick = function() {
                        saveBtn.disabled = true;
                        saveBtn.innerHTML = '<span class="loading-spinner"></span> 保存中…';
                        setTimeout(() => {
                            saveSectionEdit(sectionName);
                        }, 400);
                    };
                }
            }

            function renderRentalTable() {
                renderActionButtons("rental");
                rentalAddRowWrap.hidden = !state.rental.editing;
                const shell = rentalTableBody.closest(".table-shell");
                if (shell) {
                    shell.classList.toggle("is-editing", state.rental.editing);
                }
                rentalTableBody.innerHTML = "";

                if (!state.rental.items.length) {
                    rentalTableBody.innerHTML = "<tr><td colspan=\"9\" class=\"empty-tip\">" + text.emptyRental + "</td></tr>";
                    return;
                }

                state.rental.items.forEach(function (item, index) {
                    const row = document.createElement("tr");
                    row.className = state.rental.editing ? "edit-row" : "view-row";

                    if (state.rental.editing) {
                        row.innerHTML = [
                            "<td class=\"row-index\">" + item.id + "</td>",
                            "<td class=\"input-cell\"><input type=\"number\" inputmode=\"decimal\" data-field=\"area\" data-index=\"" + index + "\" data-section=\"rental\" value=\"" + escapeHtml(item.area) + "\"></td>",
                            "<td class=\"input-cell\"><input type=\"number\" data-field=\"usageYears\" data-index=\"" + index + "\" data-section=\"rental\" value=\"" + escapeHtml(item.usageYears) + "\"></td>",
                            "<td class=\"input-cell\"><input type=\"text\" data-field=\"period\" data-index=\"" + index + "\" data-section=\"rental\" value=\"" + escapeHtml(item.period) + "\"></td>",
                            "<td class=\"input-cell\">" + buildSelect("paymentMethod", index, "rental", paymentOptions, item.paymentMethod) + "</td>",
                            "<td class=\"input-cell\"><input type=\"number\" inputmode=\"decimal\" data-field=\"annualFee\" data-index=\"" + index + "\" data-section=\"rental\" value=\"" + escapeHtml(item.annualFee) + "\"></td>",
                            "<td class=\"input-cell\"><input type=\"date\" data-field=\"startYear\" data-index=\"" + index + "\" data-section=\"rental\" value=\"" + escapeHtml(item.startYear) + "\"></td>",
                            "<td class=\"input-cell\"><input type=\"text\" data-field=\"paymentTime\" data-index=\"" + index + "\" data-section=\"rental\" placeholder=\"" + escapeHtml(text.placeholderPaymentTime) + "\" value=\"" + escapeHtml(item.paymentTime) + "\"></td>",
                            "<td class=\"action-col\"><button class=\"delete-btn\" type=\"button\" data-delete-rental=\"" + index + "\" aria-label=\"删除租约\">&times;</button></td>"
                        ].join("");
                    } else {
                        row.innerHTML = [
                            "<td class=\"row-index\">" + item.id + "</td>",
                            "<td>" + escapeHtml(item.area) + "</td>",
                            "<td>" + escapeHtml(item.usageYears) + "</td>",
                            "<td>" + escapeHtml(item.period) + "</td>",
                            "<td>" + escapeHtml(item.paymentMethod) + "</td>",
                            "<td>" + escapeHtml(item.annualFee) + "</td>",
                            "<td>" + escapeHtml(item.startYear) + "</td>",
                            "<td>" + escapeHtml(item.paymentTime) + "</td>",
                            "<td class=\"action-col\"></td>"
                        ].join("");
                    }

                    rentalTableBody.appendChild(row);
                });
            }

            function renderOwnedTable() {
                renderActionButtons("owned");
                ownedAddRowWrap.hidden = !state.owned.editing;
                const shell = ownedTableBody.closest(".table-shell");
                if (shell) {
                    shell.classList.toggle("is-editing", state.owned.editing);
                }
                ownedTableBody.innerHTML = "";

                if (!state.owned.items.length) {
                    ownedTableBody.innerHTML = "<tr><td colspan=\"9\" class=\"empty-tip\">" + text.emptyOwned + "</td></tr>";
                    return;
                }

                state.owned.items.forEach(function (item, index) {
                    const row = document.createElement("tr");
                    row.className = state.owned.editing ? "edit-row" : "view-row";

                    if (state.owned.editing) {
                        row.innerHTML = [
                            "<td class=\"row-index\">" + item.id + "</td>",
                            "<td class=\"input-cell\"><input type=\"number\" inputmode=\"decimal\" data-field=\"area\" data-index=\"" + index + "\" data-section=\"owned\" value=\"" + escapeHtml(item.area) + "\"></td>",
                            "<td class=\"input-cell\"><input type=\"number\" data-field=\"usageYears\" data-index=\"" + index + "\" data-section=\"owned\" value=\"" + escapeHtml(item.usageYears) + "\"></td>",
                            "<td class=\"input-cell\">" + buildSelect("mortgage", index, "owned", mortgageOptions, item.mortgage) + "</td>",
                            "<td class=\"input-cell\"><input type=\"number\" inputmode=\"decimal\" data-field=\"purchasePrice\" data-index=\"" + index + "\" data-section=\"owned\" value=\"" + escapeHtml(item.purchasePrice) + "\"></td>",
                            "<td class=\"input-cell\"><input type=\"number\" inputmode=\"decimal\" data-field=\"currentValue\" data-index=\"" + index + "\" data-section=\"owned\" value=\"" + escapeHtml(item.currentValue) + "\"></td>",
                            "<td class=\"input-cell\"><input type=\"number\" inputmode=\"decimal\" data-field=\"financingBalance\" data-index=\"" + index + "\" data-section=\"owned\" value=\"" + escapeHtml(item.financingBalance) + "\"></td>",
                            "<td class=\"input-cell\"><input type=\"date\" data-field=\"purchaseYear\" data-index=\"" + index + "\" data-section=\"owned\" value=\"" + escapeHtml(item.purchaseYear) + "\"></td>",
                            "<td class=\"action-col\"><button class=\"delete-btn\" type=\"button\" data-delete-owned=\"" + index + "\" aria-label=\"删除资产\">&times;</button></td>"
                        ].join("");
                    } else {
                        row.innerHTML = [
                            "<td class=\"row-index\">" + item.id + "</td>",
                            "<td>" + escapeHtml(item.area) + "</td>",
                            "<td>" + escapeHtml(item.usageYears) + "</td>",
                            "<td>" + escapeHtml(item.mortgage) + "</td>",
                            "<td>" + escapeHtml(item.purchasePrice) + "</td>",
                            "<td>" + escapeHtml(item.currentValue) + "</td>",
                            "<td>" + escapeHtml(item.financingBalance) + "</td>",
                            "<td>" + escapeHtml(item.purchaseYear) + "</td>",
                            "<td class=\"action-col\"></td>"
                        ].join("");
                    }

                    ownedTableBody.appendChild(row);
                });
            }

            function enterSectionEdit(sectionName) {
                if (state[sectionName].editing) {
                    return;
                }
                syncEditingSections();
                state[sectionName].snapshot = clone(state[sectionName].items);
                state[sectionName].editing = true;
                renderAll();
            }

            function cancelSectionEdit(sectionName) {
                if (!state[sectionName].editing) {
                    return;
                }
                state[sectionName].items = clone(state[sectionName].snapshot || []);
                state[sectionName].snapshot = null;
                state[sectionName].editing = false;
                renderAll();
            }

            function saveSectionEdit(sectionName) {
                if (!state[sectionName].editing) {
                    return;
                }
                syncSectionFromInputs(sectionName);
                renumberItems(state[sectionName].items);
                state[sectionName].snapshot = null;
                state[sectionName].editing = false;
                renderAll();
            }

            function addRentalRow() {
                syncSectionFromInputs("rental");
                state.rental.items.push({
                    id: state.rental.items.length + 1,
                    area: "",
                    usageYears: "",
                    period: "",
                    paymentMethod: text.quarterPay,
                    annualFee: "",
                    startYear: "",
                    paymentTime: ""
                });
                renderAll();
            }

            function addOwnedRow() {
                syncSectionFromInputs("owned");
                state.owned.items.push({
                    id: state.owned.items.length + 1,
                    area: "",
                    usageYears: "",
                    mortgage: text.partMortgage,
                    purchasePrice: "",
                    currentValue: "",
                    financingBalance: "",
                    purchaseYear: ""
                });
                renderAll();
            }

            function deleteRentalRow(index) {
                syncSectionFromInputs("rental");
                state.rental.items.splice(index, 1);
                renumberItems(state.rental.items);
                renderAll();
            }

            function deleteOwnedRow(index) {
                syncSectionFromInputs("owned");
                state.owned.items.splice(index, 1);
                renumberItems(state.owned.items);
                renderAll();
            }

            function renderAll() {
                syncEditingSections();
                updateStats();
                renderRentalTable();
                renderOwnedTable();
            }

            // Lightweight Popconfirm Flow
            function showPopConfirm(anchor, title, onConfirm) {
                const existing = document.querySelector('.popover-confirm');
                if (existing) existing.remove();
                const pop = document.createElement('div');
                pop.className = 'popover-confirm';
                pop.innerHTML = `
                    <div class="popover-title">${escapeHtml(title)}</div>
                    <div class="popover-btns">
                        <button class="pop-btn-cancel">取消</button>
                        <button class="pop-btn-delete">确认删除</button>
                    </div>
                `;
                document.body.appendChild(pop);
                const rect = anchor.getBoundingClientRect();
                const popWidth = 180;
                pop.style.top = (rect.top + window.scrollY - 70) + 'px';
                pop.style.left = (rect.left + window.scrollX - (popWidth / 2) + (rect.width / 2)) + 'px';
                pop.querySelector('.pop-btn-cancel').onclick = (e) => { e.stopPropagation(); pop.remove(); };
                pop.querySelector('.pop-btn-delete').onclick = (e) => { e.stopPropagation(); onConfirm(); pop.remove(); };
                const closeOnOtherClick = (e) => { if (!pop.contains(e.target) && !anchor.contains(e.target)) { pop.remove(); document.removeEventListener('click', closeOnOtherClick); } };
                setTimeout(() => document.addEventListener('click', closeOnOtherClick), 10);
            }

            rentalTableBody.onclick = function(event) {
                const btn = event.target.closest("[data-delete-rental]");
                if (btn) {
                    const index = Number(btn.dataset.deleteRental);
                    showPopConfirm(btn, "确认删除租赁场地？", () => {
                        deleteRentalRow(index);
                    });
                }
            };
            ownedTableBody.onclick = function(event) {
                const btn = event.target.closest("[data-delete-owned]");
                if (btn) {
                    const index = Number(btn.dataset.deleteOwned);
                    showPopConfirm(btn, "确认删除自有场地？", () => {
                        deleteOwnedRow(index);
                    });
                }
            };
            
            // Remove old Modal logic
            window.showConfirm = null;

            renderAll();

            // Global Apple Tooltip Logic
            (function initAppleTooltip() {
                const tooltip = document.createElement('div');
                tooltip.className = 'apple-tooltip';
                document.body.appendChild(tooltip);
                document.addEventListener('mouseover', (e) => {
                    const el = e.target;
                    if (el.scrollWidth > el.clientWidth) {
                        tooltip.textContent = el.innerText || el.value;
                        tooltip.classList.add('visible');
                        const updatePos = (me) => {
                            tooltip.style.left = (me.pageX + 10) + 'px';
                            tooltip.style.top = (me.pageY + 10) + 'px';
                        };
                        updatePos(e);
                        el.onmousemove = updatePos;
                    }
                });
                document.addEventListener('mouseout', (e) => {
                    tooltip.classList.remove('visible');
                    if (e.target.onmousemove) e.target.onmousemove = null;
                });
            })();
        });
    </script>

</body>
</html>
