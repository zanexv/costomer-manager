<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价格分布图表</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            box-sizing: border-box;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 15px;
            background-color: #fff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            color: #653eb3;
            margin-bottom: 10px;
        }
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .filters, .toggle-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .month-selector, .toggle-btn {
            background-color: #f5f7fa;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .month-selector {
            min-width: 120px;
        }
        .toggle-btn:hover, .month-selector:hover {
            background-color: #e6f1fc;
            border-color: #a0cfff;
            color: #409eff;
        }
        .toggle-btn.active {
            background-color: #409eff;
            border-color: #409eff;
            color: #fff;
        }
        .detail-btn {
            background-color: #f5f7fa;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-left: 10px;
            color: #606266;
            text-decoration: none;
            display: inline-block;
        }
        .detail-btn:hover {
            background-color: #e6f1fc;
            border-color: #a0cfff;
            color: #409eff;
        }
        .header-with-btn {
            display: flex;
            align-items: center;
        }
        .chart-container {
            flex: 1;
            padding: 15px;
            background-color: #fff;
            position: relative;
        }
        .chart-body {
            width: 100%;
            height: 100%;
        }
        
        /* 响应式布局 */
        @media (max-width: 767px) {
            .control-panel {
                flex-direction: column;
                align-items: flex-start;
            }
            .filters, .toggle-buttons {
                width: 100%;
            }
            .month-selector {
                flex-grow: 1;
            }
            .toggle-buttons {
                justify-content: space-between;
            }
            .toggle-btn {
                flex-grow: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-with-btn">
                <div class="title">价格分布（按年利率区间）</div>
                <a href="interest-rate-detail.html" class="detail-btn" target="_parent">详情</a>
            </div>
            <div class="control-panel">
                <div class="filters">
                    <select id="month-selector" class="month-selector">
                        <option value="202401">2024年01月</option>
                        <option value="202402">2024年02月</option>
                        <option value="202403">2024年03月</option>
                        <option value="202404" selected>2024年04月</option>
                        <option value="202405">2024年05月</option>
                        <option value="202406">2024年06月</option>
                        <option value="202407">2024年07月</option>
                        <option value="202408">2024年08月</option>
                        <option value="202409">2024年09月</option>
                        <option value="202410">2024年10月</option>
                        <option value="202411">2024年11月</option>
                        <option value="202412">2024年12月</option>
                        <option value="202501">2025年01月</option>
                        <option value="202502">2025年02月</option>
                        <option value="202503">2025年03月</option>
                        <option value="202504">2025年04月</option>
                        <option value="202505">2025年05月</option>
                        <option value="202506">2025年06月</option>
                    </select>
                </div>
                <div class="toggle-buttons">
                    <button id="normal-btn" class="toggle-btn active">当前数据</button>
                    <button id="mom-btn" class="toggle-btn">环比数据</button>
                </div>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-body" id="price-chart"></div>
        </div>
    </div>
    
    <script>
        // 格式化货币
        function formatCurrency(value) {
            return parseFloat(value).toLocaleString('zh-CN', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
        
        // 格式化百分比
        function formatPercent(value) {
            return parseFloat(value).toFixed(2) + '%';
        }
        
        // 生成随机数据
        function generateRandomData() {
            // 年利率区间
            const rateRanges = ['0-5.5%', '5.5-10%', '10-15%', '15-20%', '20-24%'];
            
            // 月份列表
            const months = [
                '202401', '202402', '202403', '202404', '202405', '202406', 
                '202407', '202408', '202409', '202410', '202411', '202412',
                '202501', '202502', '202503', '202504', '202505', '202506'
            ];
            
            const result = {
                ranges: rateRanges,
                months: {},
            };
            
            // 为每个月生成数据
            months.forEach(month => {
                // 生成当前月份的数据
                const currentData = {
                    count: rateRanges.map(() => Math.floor(Math.random() * 1000) + 100),
                    amount: rateRanges.map(() => (Math.random() * 5000 + 1000).toFixed(2))
                };
                
                // 生成环比数据（-20%到+20%）
                const momData = {
                    count: rateRanges.map(() => ((Math.random() * 40 - 20) / 100).toFixed(4)),
                    amount: rateRanges.map(() => ((Math.random() * 40 - 20) / 100).toFixed(4))
                };
                
                result.months[month] = {
                    normal: currentData,
                    mom: momData
                };
            });
            
            return result;
        }
        
        // 全局变量
        let currentMode = 'normal';  // 当前模式（normal 或 mom）
        let currentMonth = '202404';  // 当前选择的月份
        
        // 生成随机数据
        const dataSource = generateRandomData();
        
        // 颜色配置
        const colors = {
            primary: '#5B8FF9',  // 贷款笔数颜色
            secondary: '#61DDAA',  // 在贷余额颜色
            negativeCount: '#F56C6C',  // 负环比贷款笔数颜色
            negativeAmount: '#E67E22'  // 负环比在贷余额颜色
        };
        
        // 初始化图表
        const priceChart = echarts.init(document.getElementById('price-chart'));
        
        // 更新图表
        function updateChart() {
            const isMonthOverMonth = currentMode === 'mom';
            const monthData = dataSource.months[currentMonth];
            
            let option;
            
            if (isMonthOverMonth) {
                // 环比模式图表配置
                option = {
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: {
                            type: 'shadow'
                        },
                        formatter: function(params) {
                            const range = params[0].axisValue;
                            const countValue = params[0].value;
                            const amountValue = params[1].value;
                            
                            return `${range}<br/>贷款笔数环比: ${formatPercent(countValue)}<br/>在贷余额环比: ${formatPercent(amountValue)}`;
                        }
                    },
                    legend: {
                        data: ['贷款笔数环比', '在贷余额环比'],
                        top: 10
                    },
                    grid: {
                        left: '3%',
                        right: '5%',
                        bottom: '3%',
                        top: 60,
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        data: dataSource.ranges,
                        axisLine: {
                            lineStyle: {
                                color: '#ddd'
                            }
                        },
                        axisLabel: {
                            color: '#666'
                        }
                    },
                    yAxis: {
                        type: 'value',
                        name: '环比(%)',
                        axisLine: {
                            show: true,
                            lineStyle: {
                                color: '#333'
                            }
                        },
                        axisLabel: {
                            formatter: '{value}%'
                        },
                        splitLine: {
                            lineStyle: {
                                color: '#eee'
                            }
                        }
                    },
                    series: [
                        {
                            name: '贷款笔数环比',
                            type: 'bar',
                            data: monthData.mom.count.map(val => (parseFloat(val) * 100).toFixed(2)),
                            label: {
                                show: false
                            },
                            itemStyle: {
                                color: colors.primary,
                                borderRadius: 4
                            },
                            barGap: '30%'
                        },
                        {
                            name: '在贷余额环比',
                            type: 'bar',
                            data: monthData.mom.amount.map(val => (parseFloat(val) * 100).toFixed(2)),
                            label: {
                                show: false
                            },
                            itemStyle: {
                                color: colors.secondary,
                                borderRadius: 4
                            }
                        }
                    ]
                };
            } else {
                // 正常模式图表配置
                option = {
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: {
                            type: 'shadow'
                        },
                        formatter: function(params) {
                            const range = params[0].axisValue;
                            const countValue = params[0].value;
                            const amountValue = params[1].value;
                            
                            return `${range}<br/>贷款笔数: ${countValue}笔<br/>在贷余额: ${formatCurrency(amountValue)}万元`;
                        }
                    },
                    legend: {
                        data: ['贷款笔数', '在贷余额(万元)'],
                        top: 10
                    },
                    grid: {
                        left: '3%',
                        right: '5%',
                        bottom: '3%',
                        top: 60,
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        data: dataSource.ranges,
                        axisLine: {
                            lineStyle: {
                                color: '#ddd'
                            }
                        },
                        axisLabel: {
                            color: '#666'
                        }
                    },
                    yAxis: [
                        {
                            type: 'value',
                            name: '贷款笔数(笔)',
                            position: 'left',
                            axisLine: {
                                show: true,
                                lineStyle: {
                                    color: colors.primary
                                }
                            },
                            axisLabel: {
                                formatter: '{value}'
                            },
                            splitLine: {
                                lineStyle: {
                                    color: '#eee'
                                }
                            },
                            min: 0
                        },
                        {
                            type: 'value',
                            name: '在贷余额(万元)',
                            position: 'right',
                            axisLine: {
                                show: true,
                                lineStyle: {
                                    color: colors.secondary
                                }
                            },
                            axisLabel: {
                                formatter: '{value}'
                            },
                            splitLine: {
                                show: false
                            },
                            min: 0
                        }
                    ],
                    series: [
                        {
                            name: '贷款笔数',
                            type: 'bar',
                            data: monthData.normal.count,
                            label: {
                                show: false
                            },
                            itemStyle: {
                                color: colors.primary,
                                borderRadius: 4
                            }
                        },
                        {
                            name: '在贷余额(万元)',
                            type: 'bar',
                            yAxisIndex: 1,
                            data: monthData.normal.amount,
                            label: {
                                show: false
                            },
                            itemStyle: {
                                color: colors.secondary,
                                borderRadius: 4
                            }
                        }
                    ]
                };
            }
            
            priceChart.setOption(option, true);
        }
        
        // 月份选择器事件
        document.getElementById('month-selector').addEventListener('change', function() {
            currentMonth = this.value;
            updateChart();
        });
        
        // 当前数据按钮事件
        document.getElementById('normal-btn').addEventListener('click', function() {
            if (currentMode !== 'normal') {
                currentMode = 'normal';
                this.classList.add('active');
                document.getElementById('mom-btn').classList.remove('active');
                updateChart();
            }
        });
        
        // 环比数据按钮事件
        document.getElementById('mom-btn').addEventListener('click', function() {
            if (currentMode !== 'mom') {
                currentMode = 'mom';
                this.classList.add('active');
                document.getElementById('normal-btn').classList.remove('active');
                updateChart();
            }
        });
        
        // 窗口调整时重绘图表
        window.addEventListener('resize', function() {
            priceChart.resize();
        });
        
        // 初始化
        window.addEventListener('load', function() {
            updateChart();
        });
    </script>
</body>
</html>
