<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财务期限统计</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #653eb3;
            padding-bottom: 15px;
            flex-wrap: wrap;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #653eb3;
            margin-bottom: 10px;
        }
        .back-link {
            text-decoration: none;
            color: #5B8FF9;
            font-size: 16px;
        }
        .control-panel {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background-color: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);
        }
        .filters {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            flex-grow: 1;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-label {
            font-weight: bold;
            white-space: nowrap;
            color: #666;
            font-size: 14px;
        }
        select {
            background-color: #f5f7fa;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 100px;
        }
        select:hover {
            background-color: #e6f1fc;
            border-color: #a0cfff;
        }
        .toggle-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .month-selector, .toggle-btn {
            background-color: #f5f7fa;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .month-selector {
            min-width: 120px;
        }
        .toggle-btn:hover, .month-selector:hover {
            background-color: #e6f1fc;
            border-color: #a0cfff;
            color: #409eff;
        }
        .toggle-btn.active {
            background-color: #409eff;
            border-color: #409eff;
            color: #fff;
        }
        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #653eb3;
        }
        .chart-container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            overflow: hidden;
            width: 100%;
        }
        .chart-header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chart-title {
            font-size: 18px;
            font-weight: bold;
        }
        .chart-body {
            padding: 20px;
            height: 400px;
            min-height: 300px;
            width: 100%;
        }
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .data-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }
        .data-card:hover {
            box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.1);
            transform: translateY(-3px);
        }
        .data-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .data-card-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
        .data-card-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .data-item {
            display: flex;
            flex-direction: column;
        }
        .data-value {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .count-value {
            color: #5B8FF9;
        }
        .amount-value {
            color: #61DDAA;
        }
        .positive {
            color: #67C23A;
        }
        .negative {
            color: #F56C6C;
        }
        .data-label {
            font-size: 13px;
            color: #999;
        }
        .positive-mom {
            color: #67C23A;
        }
        .negative-mom {
            color: #F56C6C;
        }
        .hidden {
            display: none;
        }
        
        /* 响应式布局 */
        @media (max-width: 991px) {
            .control-panel {
                flex-direction: column;
                align-items: flex-start;
            }
            .section-title {
                margin-bottom: 10px;
            }
            .filters {
                width: 100%;
                justify-content: space-between;
            }
            .chart-body {
                height: 350px;
            }
            .data-grid {
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            }
        }
        
        @media (max-width: 767px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .control-panel {
                gap: 10px;
            }
            .filters, .toggle-buttons {
                width: 100%;
            }
            .month-selector {
                flex-grow: 1;
            }
            .toggle-buttons {
                justify-content: space-between;
            }
            .toggle-btn {
                flex-grow: 1;
                text-align: center;
            }
            .chart-body {
                height: 300px;
                padding: 10px;
            }
            .data-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            .title {
                font-size: 20px;
            }
            .section-title {
                font-size: 18px;
            }
            .chart-body {
                height: 250px;
                min-height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">财务期限统计</div>
            <a href="index.html" class="back-link">返回看板</a>
        </div>
        
        <div class="control-panel">
            <div class="filters">
                <div class="filter-group">
                    <label class="filter-label">年份</label>
                    <select id="year-selector">
                        <option value="2024" selected>2024年</option>
                        <option value="2025">2025年</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">月份</label>
                    <select id="month-selector">
                        <option value="01">01月</option>
                        <option value="02">02月</option>
                        <option value="03">03月</option>
                        <option value="04" selected>04月</option>
                        <option value="05">05月</option>
                        <option value="06">06月</option>
                        <option value="07">07月</option>
                        <option value="08">08月</option>
                        <option value="09">09月</option>
                        <option value="10">10月</option>
                        <option value="11">11月</option>
                        <option value="12">12月</option>
                    </select>
                </div>
            </div>
            <div class="toggle-buttons">
                <button id="normal-btn" class="toggle-btn active">当前数据</button>
                <button id="mom-btn" class="toggle-btn">环比数据</button>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-body" id="term-chart"></div>
        </div>
    </div>
    
    <script>
        // 格式化货币
        function formatCurrency(value) {
            return parseFloat(value).toLocaleString('zh-CN', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
        
        // 格式化百分比
        function formatPercent(value) {
            return parseFloat(value).toFixed(2) + '%';
        }
        
        // 生成随机数据
        function generateRandomData() {
            // 期限区间
            const termRanges = ['1个月以内', '1-3月', '3-6月', '6-9月', '9-12月', '12-24月', '24-36月', '36月以上'];
            
            // 月份列表
            const months = [
                '202401', '202402', '202403', '202404', '202405', '202406', 
                '202407', '202408', '202409', '202410', '202411', '202412',
                '202501', '202502', '202503', '202504', '202505', '202506'
            ];
            
            const result = {
                termRanges: termRanges,
                months: {},
            };
            
            // 为每个月生成数据
            months.forEach(month => {
                // 生成当前月份的数据
                const currentData = {
                    count: termRanges.map(() => Math.floor(Math.random() * 1000) + 100),
                    amount: termRanges.map(() => (Math.random() * 5000 + 1000).toFixed(2))
                };
                
                // 生成环比数据（-20%到+20%）
                const momData = {
                    count: termRanges.map(() => ((Math.random() * 40 - 20) / 100).toFixed(4)),
                    amount: termRanges.map(() => ((Math.random() * 40 - 20) / 100).toFixed(4))
                };
                
                result.months[month] = {
                    normal: currentData,
                    mom: momData
                };
            });
            
            return result;
        }
        
        // 全局变量
        let currentMode = 'normal';  // 当前模式（normal 或 mom）
        let currentYear = '2024';   // 当前选择的年份
        let currentMonth = '04';    // 当前选择的月份
        
        // 生成随机数据
        const dataSource = generateRandomData();
        
        // 颜色配置
        const colors = {
            primary: '#5B8FF9',  // 贷款笔数颜色
            secondary: '#61DDAA',  // 在贷余额颜色
            negativeCount: '#F56C6C',  // 负环比贷款笔数颜色
            negativeAmount: '#E67E22'  // 负环比在贷余额颜色
        };
        
        // 初始化图表
        const termChart = echarts.init(document.getElementById('term-chart'));
        
        // 更新期限分布图表
        function updateTermChart() {
            const isMonthOverMonth = currentMode === 'mom';
            const monthKey = currentYear + currentMonth;
            const monthData = dataSource.months[monthKey];
            
            let option;
            
            if (isMonthOverMonth) {
                // 环比模式图表配置
                option = {
                    title: {
                        text: `期限分布统计 - ${currentYear}年${currentMonth}月`,
                        left: 'center',
                        top: 10,
                        textStyle: {
                            fontSize: 16,
                            fontWeight: 'bold',
                            color: '#333'
                        }
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: {
                            type: 'shadow'
                        },
                        formatter: function(params) {
                            const range = params[0].axisValue;
                            const countValue = params[0].value;
                            const amountValue = params[1].value;
                            
                            return `${range}<br/>贷款笔数环比: ${formatPercent(countValue)}<br/>在贷余额环比: ${formatPercent(amountValue)}`;
                        }
                    },
                    legend: {
                        data: ['贷款笔数环比', '在贷余额环比'],
                        top: 40
                    },
                    grid: {
                        left: '3%',
                        right: '5%',
                        bottom: '5%',
                        top: 80,
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        data: dataSource.termRanges,
                        axisLine: {
                            lineStyle: {
                                color: '#ddd'
                            }
                        },
                        axisLabel: {
                            color: '#666',
                            interval: 0,
                            rotate: 30
                        }
                    },
                    yAxis: {
                        type: 'value',
                        name: '环比(%)',
                        axisLine: {
                            show: true,
                            lineStyle: {
                                color: '#333'
                            }
                        },
                        axisLabel: {
                            formatter: '{value}%'
                        },
                        splitLine: {
                            lineStyle: {
                                color: '#eee'
                            }
                        }
                    },
                    series: [
                        {
                            name: '贷款笔数环比',
                            type: 'bar',
                            data: monthData.mom.count.map(val => (parseFloat(val) * 100).toFixed(2)),
                            label: {
                                show: true,
                                position: 'top',
                                formatter: '{c}%'
                            },
                            itemStyle: {
                                color: colors.primary,
                                borderRadius: 4
                            },
                            barGap: '30%'
                        },
                        {
                            name: '在贷余额环比',
                            type: 'bar',
                            data: monthData.mom.amount.map(val => (parseFloat(val) * 100).toFixed(2)),
                            label: {
                                show: true,
                                position: 'top',
                                formatter: '{c}%'
                            },
                            itemStyle: {
                                color: colors.secondary,
                                borderRadius: 4
                            }
                        }
                    ]
                };
            } else {
                // 正常模式图表配置
                option = {
                    title: {
                        text: `期限分布统计 - ${currentYear}年${currentMonth}月`,
                        left: 'center',
                        top: 10,
                        textStyle: {
                            fontSize: 16,
                            fontWeight: 'bold',
                            color: '#333'
                        }
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: {
                            type: 'shadow'
                        },
                        formatter: function(params) {
                            const range = params[0].axisValue;
                            const countValue = params[0].value;
                            const amountValue = params[1].value;
                            
                            return `${range}<br/>贷款笔数: ${countValue}笔<br/>在贷余额: ${formatCurrency(amountValue)}万元`;
                        }
                    },
                    legend: {
                        data: ['贷款笔数', '在贷余额(万元)'],
                        top: 40
                    },
                    grid: {
                        left: '3%',
                        right: '5%',
                        bottom: '5%',
                        top: 80,
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        data: dataSource.termRanges,
                        axisLine: {
                            lineStyle: {
                                color: '#ddd'
                            }
                        },
                        axisLabel: {
                            color: '#666',
                            interval: 0,
                            rotate: 30
                        }
                    },
                    yAxis: [
                        {
                            type: 'value',
                            name: '贷款笔数(笔)',
                            position: 'left',
                            axisLine: {
                                show: true,
                                lineStyle: {
                                    color: colors.primary
                                }
                            },
                            axisLabel: {
                                formatter: '{value}'
                            },
                            splitLine: {
                                lineStyle: {
                                    color: '#eee'
                                }
                            },
                            min: 0
                        },
                        {
                            type: 'value',
                            name: '在贷余额(万元)',
                            position: 'right',
                            axisLine: {
                                show: true,
                                lineStyle: {
                                    color: colors.secondary
                                }
                            },
                            axisLabel: {
                                formatter: '{value}'
                            },
                            splitLine: {
                                show: false
                            },
                            min: 0
                        }
                    ],
                    series: [
                        {
                            name: '贷款笔数',
                            type: 'bar',
                            data: monthData.normal.count,
                            label: {
                                show: true,
                                position: 'top',
                                formatter: '{c}笔'
                            },
                            itemStyle: {
                                color: colors.primary,
                                borderRadius: 4
                            }
                        },
                        {
                            name: '在贷余额(万元)',
                            type: 'bar',
                            yAxisIndex: 1,
                            data: monthData.normal.amount,
                            label: {
                                show: true,
                                position: 'top',
                                formatter: function(params) {
                                    return formatCurrency(params.value);
                                }
                            },
                            itemStyle: {
                                color: colors.secondary,
                                borderRadius: 4
                            }
                        }
                    ]
                };
            }
            
            termChart.setOption(option, true);
        }
        
        // 更新所有内容
        function updateAll() {
            updateTermChart();
        }
        
        // 年份选择器事件
        document.getElementById('year-selector').addEventListener('change', function() {
            currentYear = this.value;
            updateTermChart();
        });
        
        // 月份选择器事件
        document.getElementById('month-selector').addEventListener('change', function() {
            currentMonth = this.value;
            updateTermChart();
        });
        
        // 当前数据按钮事件
        document.getElementById('normal-btn').addEventListener('click', function() {
            if (currentMode !== 'normal') {
                currentMode = 'normal';
                this.classList.add('active');
                document.getElementById('mom-btn').classList.remove('active');
                updateTermChart();
            }
        });
        
        // 环比数据按钮事件
        document.getElementById('mom-btn').addEventListener('click', function() {
            if (currentMode !== 'mom') {
                currentMode = 'mom';
                this.classList.add('active');
                document.getElementById('normal-btn').classList.remove('active');
                updateTermChart();
            }
        });
        
        // 窗口调整时重绘图表
        window.addEventListener('resize', function() {
            termChart.resize();
        });
        
        // 初始化
        window.addEventListener('load', function() {
            updateTermChart();
        });
    </script>
</body>
</html>
