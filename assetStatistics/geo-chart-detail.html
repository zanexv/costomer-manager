<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地理区域分布详情</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/js/china.js"></script>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #653eb3;
            padding-bottom: 15px;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #653eb3;
        }
        .back-link {
            text-decoration: none;
            color: #5B8FF9;
            font-size: 16px;
        }
        .control-panel {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filters, .toggle-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        .product-selector, .month-selector, .toggle-btn {
            background-color: #f5f7fa;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .product-selector, .month-selector {
            min-width: 120px;
        }
        .toggle-btn:hover, .product-selector:hover, .month-selector:hover {
            background-color: #e6f1fc;
            border-color: #a0cfff;
            color: #409eff;
        }
        .toggle-btn.active {
            background-color: #409eff;
            border-color: #409eff;
            color: #fff;
        }
        .filter-label {
            font-weight: bold;
            margin-right: 5px;
        }
        .chart-container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .chart-header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chart-title {
            font-size: 18px;
            font-weight: bold;
        }
        .chart-body {
            padding: 20px;
            height: 500px;
        }
        .comparison-charts {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .comparison-chart {
            flex: 1;
            min-width: 300px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }
        .comparison-chart-body {
            padding: 20px;
            height: 350px;
        }
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        .summary-table th, .summary-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .summary-table th {
            background-color: #f5f7fa;
            font-weight: bold;
        }
        .summary-table tr:last-child td {
            border-bottom: none;
        }
        .positive-mom {
            color: #67C23A;
        }
        .negative-mom {
            color: #F56C6C;
        }
        .hidden {
            display: none;
        }
        
        @media (max-width: 991px) {
            .comparison-charts {
                flex-direction: column;
            }
            .comparison-chart {
                width: 100%;
            }
            .filters, .toggle-buttons {
                flex-wrap: wrap;
            }
        }
        
        @media (max-width: 767px) {
            .control-panel {
                flex-direction: column;
                align-items: flex-start;
            }
            .chart-body {
                height: 300px;
            }
            .comparison-chart-body {
                height: 250px;
            }
            .product-selector, .month-selector {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">地理区域分布详情</div>
            <a href="dashboard.html" class="back-link">返回看板</a>
        </div>
        
        <div class="control-panel">
            <div class="filters">
                <span class="filter-label">产品:</span>
                <select id="product-selector" class="product-selector">
                    <option value="all">全部产品</option>
                    <option value="小微保">小微保</option>
                    <option value="小微保专项">小微保专项</option>
                    <option value="小微保旺季">小微保旺季</option>
                    <option value="发薪贷">发薪贷</option>
                    <option value="秒贷">秒贷</option>
                    <option value="电商贷">电商贷</option>
                </select>
                
                <span class="filter-label">月份:</span>
                <select id="month-selector" class="month-selector">
                    <option value="202312">2023年12月</option>
                    <option value="202401">2024年01月</option>
                    <option value="202402">2024年02月</option>
                    <option value="202403">2024年03月</option>
                    <option value="202404" selected>2024年04月</option>
                    <option value="202405">2024年05月</option>
                </select>
            </div>
            
            <div class="toggle-buttons">
                <button id="normal-btn" class="toggle-btn active">当前数据</button>
                <button id="mom-btn" class="toggle-btn">环比数据</button>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-header">
                <div class="chart-title">地理区域分布（按省份）</div>
            </div>
            <div class="chart-body" id="map-chart"></div>
        </div>
        
        <div class="comparison-charts">
            <div class="comparison-chart">
                <div class="chart-header">
                    <div class="chart-title">贷款笔数 Top 10 省份</div>
                </div>
                <div class="comparison-chart-body" id="count-chart"></div>
            </div>
            
            <div class="comparison-chart">
                <div class="chart-header">
                    <div class="chart-title">在贷余额 Top 10 省份</div>
                </div>
                <div class="comparison-chart-body" id="amount-chart"></div>
            </div>
        </div>
        
        <table class="summary-table" id="summary-table">
            <thead>
                <tr>
                    <th>省份</th>
                    <th>贷款笔数</th>
                    <th>贷款笔数占比</th>
                    <th>贷款笔数环比</th>
                    <th>在贷余额(万元)</th>
                    <th>在贷余额占比</th>
                    <th>在贷余额环比</th>
                </tr>
            </thead>
            <tbody>
                <!-- 数据将通过JavaScript动态填充 -->
            </tbody>
        </table>
    </div>
    
    <script>
        // 格式化货币
        function formatCurrency(value) {
            return parseFloat(value).toLocaleString('zh-CN', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
        
        // 格式化百分比
        function formatPercent(value) {
            return parseFloat(value).toFixed(2) + '%';
        }
        
        // 获取URL参数
        function getUrlParams() {
            const params = {};
            const queryString = window.location.search.substring(1);
            const pairs = queryString.split('&');
            
            for (let i = 0; i < pairs.length; i++) {
                const pair = pairs[i].split('=');
                params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');
            }
            
            return params;
        }
        
        // 省份列表
        const provinces = [
            '北京', '天津', '河北', '山西', '内蒙古', '辽宁', '吉林', '黑龙江', 
            '上海', '江苏', '浙江', '安徽', '福建', '江西', '山东', '河南', 
            '湖北', '湖南', '广东', '广西', '海南', '重庆', '四川', '贵州', 
            '云南', '西藏', '陕西', '甘肃', '青海', '宁夏', '新疆'
        ];
        
        // 生成随机数据
        function generateRandomData() {
            // 产品列表
            const products = ['小微保', '小微保专项', '小微保旺季', '发薪贷', '秒贷', '电商贷'];
            
            // 月份列表
            const months = ['202312', '202401', '202402', '202403', '202404', '202405'];
            
            // 按产品和月份生成随机数据
            const productData = {};
            
            // 为全部产品创建汇总数据
            productData['all'] = {};
            
            months.forEach(month => {
                productData['all'][month] = {
                    normal: {},
                    mom: {}
                };
                
                // 初始化每个省份的数据为0
                provinces.forEach(province => {
                    productData['all'][month].normal[province] = {
                        count: 0,
                        amount: 0
                    };
                    productData['all'][month].mom[province] = {
                        count: 0,
                        amount: 0
                    };
                });
            });
            
            // 为每个产品生成随机数据
            products.forEach(product => {
                productData[product] = {};
                
                months.forEach(month => {
                    productData[product][month] = {
                        normal: {},
                        mom: {}
                    };
                    
                    // 为每个省份生成随机数据
                    provinces.forEach(province => {
                        // 为每个省生成随机贷款笔数和金额
                        const count = Math.floor(Math.random() * 2000) + 100;
                        const amount = (Math.random() * 10000 + 1000).toFixed(2);
                        
                        // 生成环比数据（-20%到+20%）
                        const countMom = ((Math.random() * 40 - 20) / 100).toFixed(4);
                        const amountMom = ((Math.random() * 40 - 20) / 100).toFixed(4);
                        
                        productData[product][month].normal[province] = {
                            count: count,
                            amount: amount
                        };
                        
                        productData[product][month].mom[province] = {
                            count: countMom,
                            amount: amountMom
                        };
                        
                        // 累加到全部产品
                        productData['all'][month].normal[province].count += count;
                        productData['all'][month].normal[province].amount = (
                            parseFloat(productData['all'][month].normal[province].amount) + 
                            parseFloat(amount)
                        ).toFixed(2);
                        
                        // 全部产品的环比是加权平均
                        // 计算会在更新图表时进行，因为需要总量
                    });
                });
            });
            
            return productData;
        }
        
        // 初始化图表
        let mapChart = echarts.init(document.getElementById('map-chart'));
        let countChart = echarts.init(document.getElementById('count-chart'));
        let amountChart = echarts.init(document.getElementById('amount-chart'));
        
        // 生成随机数据
        const data = generateRandomData();
        
        // 获取URL参数
        const urlParams = getUrlParams();
        
        // 当前选择
        let currentProduct = 'all';
        let currentMonth = urlParams.month || '202404'; // 从URL参数获取月份，如果没有则使用默认值
        let currentMode = 'normal'; // normal 或 mom
        
        // 设置月份选择器的默认值
        document.getElementById('month-selector').value = currentMonth;
        
        // 获取排序后的省份数据
        function getSortedProvinces(data, sortBy) {
            const provinceData = [];
            for (const province in data) {
                provinceData.push({
                    name: province,
                    count: data[province].count,
                    amount: parseFloat(data[province].amount)
                });
            }
            
            if (sortBy === 'count') {
                return provinceData.sort((a, b) => b.count - a.count);
            } else {
                return provinceData.sort((a, b) => b.amount - a.amount);
            }
        }
        
        // 更新图表
        function updateCharts() {
            const productName = currentProduct === 'all' ? '全部产品' : currentProduct;
            const chartData = data[currentProduct][currentMonth];
            const isMonthOverMonth = currentMode === 'mom';
            
            // 颜色配置
            const colors = {
                primary: '#5B8FF9',
                secondary: '#61DDAA',
                accent: '#65789B'
            };
            
            // 获取省份数据，用于地图
            const mapData = [];
            const sortedCountData = getSortedProvinces(chartData.normal, 'count');
            const sortedAmountData = getSortedProvinces(chartData.normal, 'amount');
            
            // 环比数据准备
            const momMapData = [];
            
            if (isMonthOverMonth) {
                // 为环比模式准备地图数据
                for (const province in chartData.mom) {
                    momMapData.push({
                        name: province,
                        value: (parseFloat(chartData.mom[province].count) * 100).toFixed(2)
                    });
                }
            } else {
                // 为正常模式准备地图数据
                for (const province in chartData.normal) {
                    mapData.push({
                        name: province,
                        value: chartData.normal[province].count
                    });
                }
            }
            
            // 地图标题
            const mapTitle = isMonthOverMonth ? 
                '贷款笔数环比分布' : 
                '贷款笔数分布';
            
            // 更新地图
            mapChart.setOption({
                title: {
                    text: `${productName} - ${currentMonth.substring(0, 4)}年${currentMonth.substring(4, 6)}月 ${mapTitle}`,
                    left: 'center',
                    textStyle: {
                        fontSize: 18,
                        fontWeight: 'bold'
                    }
                },
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        const province = params.name;
                        
                        if (isMonthOverMonth) {
                            // 环比数据格式
                            const countMom = params.value;
                            const amountMom = (parseFloat(chartData.mom[province].amount) * 100).toFixed(2);
                            
                            return `${province}<br/>贷款笔数环比: ${countMom}%<br/>在贷余额环比: ${amountMom}%`;
                        } else {
                            // 正常数据格式
                            const count = chartData.normal[province].count;
                            const amount = formatCurrency(chartData.normal[province].amount);
                            
                            return `${province}<br/>贷款笔数: ${count}笔<br/>在贷余额: ${amount}万元`;
                        }
                    }
                },
                visualMap: {
                    type: 'continuous',
                    min: 0,
                    max: isMonthOverMonth ? 20 : Math.max(...mapData.map(item => item.value)),
                    left: 'left',
                    top: 'bottom',
                    calculable: true,
                    text: isMonthOverMonth ? ['高', '低'] : ['多', '少'],
                    inRange: {
                        color: ['#e0f3f8', '#abd9e9', '#74add1', '#4575b4', '#313695']
                    }
                },
                series: [
                    {
                        name: isMonthOverMonth ? '贷款笔数环比' : '贷款笔数',
                        type: 'map',
                        map: 'china',
                        roam: true,
                        label: {
                            show: true,
                            fontSize: 10
                        },
                        emphasis: {
                            label: {
                                show: true
                            },
                            itemStyle: {
                                areaColor: '#FDD835'
                            }
                        },
                        data: isMonthOverMonth ? momMapData : mapData
                    }
                ]
            });
            
            // 更新Top 10贷款笔数图表
            const top10Count = sortedCountData.slice(0, 10);
            countChart.setOption({
                title: {
                    text: `贷款笔数 Top 10 省份`,
                    left: 'center',
                    textStyle: {
                        fontSize: 16
                    }
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    },
                    formatter: function(params) {
                        const province = params[0].name;
                        
                        if (isMonthOverMonth) {
                            const countMom = (parseFloat(chartData.mom[province].count) * 100).toFixed(2);
                            return `${province}<br/>贷款笔数环比: ${countMom}%`;
                        } else {
                            const count = chartData.normal[province].count;
                            return `${province}<br/>贷款笔数: ${count}笔`;
                        }
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '10%',
                    top: '60',
                    containLabel: true
                },
                xAxis: {
                    type: 'value',
                    axisLabel: {
                        formatter: isMonthOverMonth ? '{value}%' : '{value}'
                    }
                },
                yAxis: {
                    type: 'category',
                    data: top10Count.map(item => item.name).reverse(),
                    axisLabel: {
                        fontSize: 12
                    }
                },
                series: [
                    {
                        name: isMonthOverMonth ? '环比' : '贷款笔数',
                        type: 'bar',
                        data: top10Count.map(item => {
                            const province = item.name;
                            return isMonthOverMonth 
                                ? (parseFloat(chartData.mom[province].count) * 100).toFixed(2)
                                : item.count;
                        }).reverse(),
                        itemStyle: {
                            color: colors.primary,
                            borderRadius: 4
                        },
                        label: {
                            show: true,
                            position: 'right',
                            formatter: isMonthOverMonth ? '{c}%' : '{c}'
                        }
                    }
                ]
            });
            
            // 更新Top 10在贷余额图表
            const top10Amount = sortedAmountData.slice(0, 10);
            amountChart.setOption({
                title: {
                    text: `在贷余额 Top 10 省份`,
                    left: 'center',
                    textStyle: {
                        fontSize: 16
                    }
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    },
                    formatter: function(params) {
                        const province = params[0].name;
                        
                        if (isMonthOverMonth) {
                            const amountMom = (parseFloat(chartData.mom[province].amount) * 100).toFixed(2);
                            return `${province}<br/>在贷余额环比: ${amountMom}%`;
                        } else {
                            const amount = formatCurrency(chartData.normal[province].amount);
                            return `${province}<br/>在贷余额: ${amount}万元`;
                        }
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '10%',
                    top: '60',
                    containLabel: true
                },
                xAxis: {
                    type: 'value',
                    axisLabel: {
                        formatter: isMonthOverMonth ? '{value}%' : '{value}'
                    }
                },
                yAxis: {
                    type: 'category',
                    data: top10Amount.map(item => item.name).reverse(),
                    axisLabel: {
                        fontSize: 12
                    }
                },
                series: [
                    {
                        name: isMonthOverMonth ? '环比' : '在贷余额',
                        type: 'bar',
                        data: top10Amount.map(item => {
                            const province = item.name;
                            return isMonthOverMonth 
                                ? (parseFloat(chartData.mom[province].amount) * 100).toFixed(2)
                                : item.amount;
                        }).reverse(),
                        itemStyle: {
                            color: colors.secondary,
                            borderRadius: 4
                        },
                        label: {
                            show: true,
                            position: 'right',
                            formatter: isMonthOverMonth ? '{c}%' : '{c}'
                        }
                    }
                ]
            });
            
            // 更新数据表格
            updateTable();
        }
        
        // 更新数据表格
        function updateTable() {
            const tableBody = document.getElementById('summary-table').getElementsByTagName('tbody')[0];
            tableBody.innerHTML = '';
            
            const chartData = data[currentProduct][currentMonth];
            
            // 计算总计
            let totalCount = 0;
            let totalAmount = 0;
            
            for (const province in chartData.normal) {
                totalCount += chartData.normal[province].count;
                totalAmount += parseFloat(chartData.normal[province].amount);
            }
            
            // 排序省份（按贷款笔数从高到低）
            const sortedProvinces = getSortedProvinces(chartData.normal, 'count');
            
            // 填充表格
            sortedProvinces.forEach(provinceData => {
                const province = provinceData.name;
                const row = document.createElement('tr');
                
                // 省份
                const provinceCell = document.createElement('td');
                provinceCell.textContent = province;
                row.appendChild(provinceCell);
                
                // 贷款笔数
                const countCell = document.createElement('td');
                countCell.textContent = chartData.normal[province].count.toLocaleString();
                row.appendChild(countCell);
                
                // 贷款笔数占比
                const countPercentCell = document.createElement('td');
                const countPercent = (chartData.normal[province].count / totalCount * 100).toFixed(2);
                countPercentCell.textContent = countPercent + '%';
                row.appendChild(countPercentCell);
                
                // 贷款笔数环比
                const countMomCell = document.createElement('td');
                const countMom = (parseFloat(chartData.mom[province].count) * 100).toFixed(2);
                countMomCell.textContent = countMom + '%';
                countMomCell.className = parseFloat(countMom) >= 0 ? 'positive-mom' : 'negative-mom';
                row.appendChild(countMomCell);
                
                // 在贷余额
                const amountCell = document.createElement('td');
                amountCell.textContent = formatCurrency(chartData.normal[province].amount);
                row.appendChild(amountCell);
                
                // 在贷余额占比
                const amountPercentCell = document.createElement('td');
                const amountPercent = (parseFloat(chartData.normal[province].amount) / totalAmount * 100).toFixed(2);
                amountPercentCell.textContent = amountPercent + '%';
                row.appendChild(amountPercentCell);
                
                // 在贷余额环比
                const amountMomCell = document.createElement('td');
                const amountMom = (parseFloat(chartData.mom[province].amount) * 100).toFixed(2);
                amountMomCell.textContent = amountMom + '%';
                amountMomCell.className = parseFloat(amountMom) >= 0 ? 'positive-mom' : 'negative-mom';
                row.appendChild(amountMomCell);
                
                tableBody.appendChild(row);
            });
        }
        
        // 产品选择器事件
        document.getElementById('product-selector').addEventListener('change', function() {
            currentProduct = this.value;
            updateCharts();
        });
        
        // 月份选择器事件
        document.getElementById('month-selector').addEventListener('change', function() {
            currentMonth = this.value;
            updateCharts();
        });
        
        // 当前数据按钮事件
        document.getElementById('normal-btn').addEventListener('click', function() {
            if (currentMode !== 'normal') {
                currentMode = 'normal';
                this.classList.add('active');
                document.getElementById('mom-btn').classList.remove('active');
                updateCharts();
            }
        });
        
        // 环比数据按钮事件
        document.getElementById('mom-btn').addEventListener('click', function() {
            if (currentMode !== 'mom') {
                currentMode = 'mom';
                this.classList.add('active');
                document.getElementById('normal-btn').classList.remove('active');
                updateCharts();
            }
        });
        
        // 初始更新图表
        updateCharts();
        
        // 窗口调整时重绘图表
        window.addEventListener('resize', function() {
            mapChart.resize();
            countChart.resize();
            amountChart.resize();
        });
    </script>
</body>
</html>
