<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逾期分布图表</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            box-sizing: border-box;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 15px;
            background-color: #fff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            color: #653eb3;
            margin-bottom: 10px;
        }
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .filters, .toggle-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .month-selector, .toggle-btn, .data-toggle-btn {
            background-color: #f5f7fa;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .month-selector {
            min-width: 120px;
        }
        .toggle-btn:hover, .month-selector:hover, .data-toggle-btn:hover {
            background-color: #e6f1fc;
            border-color: #a0cfff;
            color: #409eff;
        }
        .toggle-btn.active, .data-toggle-btn.active {
            background-color: #409eff;
            border-color: #409eff;
            color: #fff;
        }
        .chart-container {
            flex: 1;
            padding: 15px;
            background-color: #fff;
            position: relative;
            display: flex;
        }
        .chart {
            flex: 1;
            height: 100%;
        }
        .legend-container {
            width: 180px;
            padding: 15px;
            overflow-y: auto;
        }
        
        /* 响应式布局 */
        @media (max-width: 767px) {
            .control-panel {
                flex-direction: column;
                align-items: flex-start;
            }
            .filters, .toggle-buttons {
                width: 100%;
            }
            .month-selector {
                flex-grow: 1;
            }
            .toggle-buttons {
                justify-content: space-between;
            }
            .toggle-btn, .data-toggle-btn {
                flex-grow: 1;
                text-align: center;
            }
            .chart-container {
                flex-direction: column;
            }
            .legend-container {
                width: 100%;
                height: auto;
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">地理区域逾期分布统计</div>
            <div class="control-panel">
                <div class="filters">
                    <select id="month-selector" class="month-selector">
                        <option value="202401">2024年01月</option>
                        <option value="202402">2024年02月</option>
                        <option value="202403">2024年03月</option>
                        <option value="202404" selected>2024年04月</option>
                        <option value="202405">2024年05月</option>
                        <option value="202406">2024年06月</option>
                        <option value="202407">2024年07月</option>
                        <option value="202408">2024年08月</option>
                        <option value="202409">2024年09月</option>
                        <option value="202410">2024年10月</option>
                        <option value="202411">2024年11月</option>
                        <option value="202412">2024年12月</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart" id="overdue-chart"></div>
        </div>
    </div>
    
    <script>
        // 格式化货币
        function formatCurrency(value) {
            return parseFloat(value).toLocaleString('zh-CN', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
        
        // 格式化百分比
        function formatPercent(value) {
            return parseFloat(value).toFixed(2) + '%';
        }
        
        // 生成随机数据
        function generateRandomData() {
            // 地理区域
            const regions = ['华东', '华南', '华中', '华北', '西南', '西北', '东北'];
            
            // 月份列表
            const months = [
                '202401', '202402', '202403', '202404', '202405', '202406', 
                '202407', '202408', '202409', '202410', '202411', '202412'
            ];
            
            const result = {
                regions: regions,
                months: {},
            };
            
            // 为每个月生成数据
            months.forEach(month => {
                // 确保总数为100%
                const countValues = [];
                const amountValues = [];
                
                let countSum = 0;
                let amountSum = 0;
                
                // 生成当前月份的数据
                for(let i = 0; i < regions.length; i++) {
                    // 对贷款笔数，生成随机数
                    const count = Math.floor(Math.random() * 500) + 50;     // 逾期贷款笔数
                    
                    countSum += count;
                    countValues.push(count);
                    
                    // 对在贷余额，生成随机数
                    const amount = (Math.random() * 2000 + 500).toFixed(2); // 逾期贷款金额
                    
                    amountSum += parseFloat(amount);
                    amountValues.push(amount);
                }
                
                result.months[month] = {
                    normal: {
                        count: countValues,
                        amount: amountValues,
                        countSum: countSum,
                        amountSum: amountSum
                    }
                };
            });
            
            return result;
        }
        
        // 全局变量
        let currentMonth = '202404';  // 当前选择的月份
        
        // 生成随机数据
        const dataSource = generateRandomData();
        
        // 颜色配置
        const colorPalette = [
            '#5470c6', '#91cc75', '#fac858', '#ee6666', 
            '#73c0de', '#3ba272', '#fc8452', '#9a60b4'
        ];
        
        // 初始化图表
        const overdueChart = echarts.init(document.getElementById('overdue-chart'));
        
        // 更新图表
        function updateChart() {
            const monthData = dataSource.months[currentMonth];
            
            // 正常模式图表配置
            const seriesData = dataSource.regions.map((region, index) => {
                return {
                    name: region,
                    value: monthData.normal.amount[index],
                    count: monthData.normal.count[index]
                };
            });
            
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        const total = monthData.normal.amountSum;
                        const percentage = ((params.value / total) * 100).toFixed(2) + '%';
                        
                        return `${params.name}<br/>逾期金额: ${formatCurrency(params.value)}万元<br/>占比: ${percentage}<br/>逾期笔数: ${params.data.count}笔`;
                    }
                },
                legend: {
                    show: false
                },
                series: [
                    {
                        name: '逾期金额',
                        type: 'pie',
                        radius: '70%',
                        center: ['50%', '50%'],
                        avoidLabelOverlap: true,
                        itemStyle: {
                            borderRadius: 4,
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        labelLine: {
                            show: true,
                            length: 10,
                            length2: 15
                        },
                        label: {
                            show: true,
                            formatter: function(params) {
                                const total = monthData.normal.amountSum;
                                const percentage = ((params.value / total) * 100).toFixed(2) + '%';
                                return `${params.name}:\n笔数:${params.data.count}笔\n金额:${formatCurrency(params.value)}万\n占比:${percentage}`;
                            },
                            position: 'outside',
                            rich: {
                                b: {
                                    lineHeight: 22,
                                    fontSize: 14
                                }
                            }
                        },
                        emphasis: {
                            label: {
                                show: true,
                                fontSize: '16',
                                fontWeight: 'bold'
                            }
                        },
                        data: seriesData
                    }
                ],
                color: colorPalette
            };
            
            overdueChart.setOption(option, true);
        }
        
        // 月份选择器事件
        document.getElementById('month-selector').addEventListener('change', function() {
            currentMonth = this.value;
            updateChart();
        });
        
        // 窗口调整时重绘图表
        window.addEventListener('resize', function() {
            overdueChart.resize();
        });
        
        // 初始化
        window.addEventListener('load', function() {
            updateChart();
        });
    </script>
</body>
</html>
