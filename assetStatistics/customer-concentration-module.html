<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户集中度分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            box-sizing: border-box;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 15px;
            background-color: #fff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            color: #653eb3;
            margin-bottom: 10px;
        }
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .filters, .toggle-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .month-selector, .product-selector, .toggle-btn {
            background-color: #f5f7fa;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .month-selector, .product-selector {
            min-width: 120px;
        }
        .toggle-btn:hover, .month-selector:hover, .product-selector:hover {
            background-color: #e6f1fc;
            border-color: #a0cfff;
            color: #409eff;
        }
        .toggle-btn.active {
            background-color: #409eff;
            border-color: #409eff;
            color: #fff;
        }
        .content-container {
            flex: 1;
            padding: 15px;
            background-color: #fff;
            overflow: auto;
        }
        .table-container {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            border-spacing: 0;
            background-color: #fff;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ebeef5;
        }
        th {
            font-weight: bold;
            color: #606266;
            background-color: #f5f7fa;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        tr:hover td {
            background-color: #f5f7fa;
        }
        tr:nth-child(even) {
            background-color: #fafafa;
        }
        .customer-rank {
            font-weight: bold;
            text-align: center;
            color: #666;
        }
        .top-3 .customer-rank {
            color: #f56c6c;
        }
        .customer-amount {
            text-align: left;
            font-family: Consolas, monospace;
        }
        
        .header-with-btn {
            display: flex;
            align-items: center;
        }
        .detail-btn {
            display: inline-block;
            margin-left: 10px;
            padding: 4px 8px;
            background-color: #f5f7fa;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: #606266;
            text-decoration: none;
        }
        .detail-btn:hover {
            background-color: #e6f1fc;
            border-color: #a0cfff;
            color: #409eff;
        }
        
        /* 响应式布局 */
        @media (max-width: 767px) {
            .control-panel {
                flex-direction: column;
                align-items: flex-start;
            }
            .filters, .toggle-buttons {
                width: 100%;
            }
            .month-selector, .product-selector {
                flex-grow: 1;
            }
            .toggle-buttons {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-with-btn">
                <div class="title">客户集中度分析</div>
                <a href="customer-concentration-detail.html" class="detail-btn" target="_parent">详情</a>
            </div>
            <div class="control-panel">
                <div class="filters">
                    <select id="month-selector" class="month-selector">
                        <option value="202401">2024年01月</option>
                        <option value="202402">2024年02月</option>
                        <option value="202403">2024年03月</option>
                        <option value="202404" selected>2024年04月</option>
                        <option value="202405">2024年05月</option>
                        <option value="202406">2024年06月</option>
                        <option value="202407">2024年07月</option>
                        <option value="202408">2024年08月</option>
                        <option value="202409">2024年09月</option>
                        <option value="202410">2024年10月</option>
                        <option value="202411">2024年11月</option>
                        <option value="202412">2024年12月</option>
                    </select>
                    <select id="product-selector" class="product-selector">
                        <option value="全部">全部</option>
                        <option value="小微保">小微保</option>
                        <option value="小微保专项">小微保专项</option>
                        <option value="小微保旺季">小微保旺季</option>
                        <option value="发薪贷">发薪贷</option>
                        <option value="秒贷">秒贷</option>
                        <option value="电商贷">电商贷</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="content-container">
            <div class="table-container">
                <table id="customer-table">
                    <thead>
                        <tr>
                            <th width="60">排名</th>
                            <th width="300">客户名称</th>
                            <th width="120">网点代码</th>
                            <th>在贷余额(万元)</th>
                        </tr>
                    </thead>
                    <tbody id="customer-list">
                        <!-- 数据将通过JavaScript填充 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // 格式化货币
        function formatCurrency(value) {
            return parseFloat(value).toLocaleString('zh-CN', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
        
        // 生成随机公司名称
        function generateCompanyName() {
            const prefixes = ['东方', '西部', '南方', '北方', '中国', '国际', '环球', '远洋', '京东', '阿里', '腾讯', '百度', '顺丰', '中通', '圆通', '申通', '韵达', '德邦', '极兔', '快捷'];
            const middles = ['速运', '物流', '快递', '仓储', '供应链', '运输', '配送', '货运', '快运', '通达', '捷达', '达运', '通运', '海运', '陆运', '航运', '冷链', '跨境', '同城', '即时'];
            const suffixes = ['有限公司', '集团', '股份有限公司', '科技有限公司', '物流有限公司', '运输有限公司', '快递服务有限公司', '仓储有限公司', '供应链管理有限公司', '(集团)有限公司'];
            
            const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
            const middle = middles[Math.floor(Math.random() * middles.length)];
            const suffix = suffixes[Math.floor(Math.random() * suffixes.length)];
            
            return prefix + middle + suffix;
        }
        
        // 生成随机网点代码（6位数字）
        function generateBranchCode() {
            return String(Math.floor(100000 + Math.random() * 900000));
        }
        
        // 生成客户数据
        function generateCustomerData() {
            // 贷款产品列表
            const products = ['小微保', '小微保专项', '小微保旺季', '发薪贷', '秒贷', '电商贷'];
            
            // 月份列表
            const months = [
                '202401', '202402', '202403', '202404', '202405', '202406', 
                '202407', '202408', '202409', '202410', '202411', '202412'
            ];
            
            const result = {
                products: products,
                months: {},
            };
            
            // 贷款范围，根据产品不同设置不同的范围
            const loanRanges = {
                '小微保': { min: 600, max: 3000 },
                '小微保专项': { min: 500, max: 2500 },
                '小微保旺季': { min: 700, max: 3500 },
                '发薪贷': { min: 200, max: 1500 },
                '秒贷': { min: 100, max: 800 },
                '电商贷': { min: 300, max: 2000 }
            };
            
            // 为每个月生成数据
            months.forEach(month => {
                result.months[month] = {};
                
                // 为每个产品生成客户数据
                products.forEach(product => {
                    const customers = [];
                    const range = loanRanges[product];
                    
                    // 生成30个客户（取前20个）
                    for (let i = 0; i < 30; i++) {
                        const customer = {
                            name: generateCompanyName(),
                            branchCode: generateBranchCode(),
                            amount: (Math.random() * (range.max - range.min) + range.min).toFixed(2)
                        };
                        customers.push(customer);
                    }
                    
                    // 按照在贷余额降序排序
                    customers.sort((a, b) => parseFloat(b.amount) - parseFloat(a.amount));
                    
                    // 存储前20个客户
                    result.months[month][product] = customers.slice(0, 20);
                });
            });
            
            return result;
        }
        
        // 全局变量
        let currentMonth = '202404';  // 当前选择的月份
        let currentProduct = '小微保';  // 当前选择的产品
        
        // 生成随机数据
        const dataSource = generateCustomerData();
        
        // 更新表格
        function updateTable() {
            const monthData = dataSource.months[currentMonth];
            const productData = monthData[currentProduct];
            
            const tableBody = document.getElementById('customer-list');
            tableBody.innerHTML = '';
            
            productData.forEach((customer, index) => {
                const row = document.createElement('tr');
                if (index < 3) {
                    row.classList.add('top-3');
                }
                
                row.innerHTML = `
                    <td class="customer-rank">${index + 1}</td>
                    <td>${customer.name}</td>
                    <td>${customer.branchCode}</td>
                    <td class="customer-amount">${formatCurrency(customer.amount)}</td>
                `;
                
                tableBody.appendChild(row);
            });
        }
        
        // 月份选择器事件
        document.getElementById('month-selector').addEventListener('change', function() {
            currentMonth = this.value;
            updateTable();
            updateDetailLink();
        });
        
        // 产品选择器事件
        document.getElementById('product-selector').addEventListener('change', function() {
            currentProduct = this.value;
            updateTable();
        });
        
        // 更新详情链接
        function updateDetailLink() {
            const detailBtn = document.querySelector('.detail-btn');
            if (detailBtn) {
                detailBtn.href = `customer-concentration-detail.html?month=${currentMonth}`;
            }
        }
        
        // 初始化
        window.addEventListener('load', function() {
            updateTable();
            updateDetailLink();
        });
    </script>
</body>
</html>
