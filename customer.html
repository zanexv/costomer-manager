<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理 - 互联网小贷公司管理台系统</title>
    <style>
        :root {
            --page-bg: #f5f5f7;
            --card-bg: #ffffff;
            --card-shadow: 0 2px 4px rgba(15, 23, 42, 0.08), 0 10px 24px rgba(15, 23, 42, 0.04);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --border-soft: #edf2f7;
            --purple: #8b5cf6;
            --purple-soft: #f5efff;
            --orange: #f97316;
            --orange-soft: #fff7ed;
            --green: #22c55e;
            --green-soft: #f0fdf4;
            --blue: #60a5fa;
            --blue-soft: #eff6ff;
            --input-bg: #ffffff;
            --table-head: #f8fafc;
            --row-accent: #faf7ff;
            --radius-sm: 6px;
            --radius-md: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-primary);
            background: var(--page-bg);
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            box-shadow: var(--card-shadow);
            padding: 24px;
            margin-bottom: 20px;
        }

        .search-area {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-input-wrap {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-input-wrap input {
            width: 100%;
            height: 38px;
            padding: 0 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input-wrap input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .category-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 0;
            overflow-x: auto;
        }

        .tag {
            padding: 6px 14px;
            border-radius: 20px;
            background: #fff;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tag.active {
            background: var(--purple-soft);
            color: var(--purple);
            border-color: var(--purple);
        }

        .btn {
            appearance: none;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            min-width: 70px;
            height: 38px;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease, border-color 0.16s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--purple);
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.18);
        }

        .table-shell {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: #ffffff;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        thead th {
            background: var(--table-head);
            color: rgba(0, 0, 0, 0.88);
            font-size: 13px;
            font-weight: 600;
            text-align: left;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        tbody td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-soft);
            color: #111827;
            white-space: nowrap;
            vertical-align: middle;
            font-variant-numeric: tabular-nums;
        }

        tbody tr:hover {
            background: #fcfcff;
        }

        .row-index {
            width: 58px;
            color: #4b5563;
        }

        .rating-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 22px;
            padding: 0 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
        }

        .rating-A { background: #ecfdf5; color: #047857; }
        .rating-B { background: #eff6ff; color: #1d4ed8; }
        .rating-C { background: #fef2f2; color: #b91c1c; }

        .op-btn {
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text-secondary);
            margin-right: 4px;
            transition: all 0.2s;
        }

        .op-btn:hover {
            border-color: var(--purple);
            color: var(--purple);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
            gap: 12px;
        }

        .empty-tip {
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
        }

        [hidden] { display: none !important; }

        /* Apple Style Popconfirm Bubbles */
        .popover-confirm {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            z-index: 2000;
            width: 180px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: popIn 0.24s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            pointer-events: auto;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .popover-title { font-size: 13px; font-weight: 500; color: #1d1d1f; text-align: center; }
        .popover-btns { display: flex; gap: 6px; }
        .popover-btns button { flex: 1; height: 28px; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .pop-btn-cancel { background: rgba(0,0,0,0.05); color: #007aff; }
        .pop-btn-cancel:hover { background: rgba(0,0,0,0.08); }
        .pop-btn-delete { background: #ff3b30; color: #fff; }
        .pop-btn-delete:hover { background: #e0352a; }
        .popover-confirm::after { content: ""; position: absolute; bottom: -6px; left: 50%; margin-left: -6px; border-width: 6px 6px 0; border-style: solid; border-color: rgba(255,255,255,0.9) transparent transparent; }

        /* Apple Style Smart Tooltip */
        .apple-tooltip {
            position: absolute;
            background: rgba(45, 45, 47, 0.94);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.4;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            max-width: 300px;
            white-space: normal;
            word-break: break-all;
        }
        .apple-tooltip.visible { opacity: 1; }

        /* Ant Design Style Table — Auto Column Sizing */
        .table-shell { width: 100%; overflow-x: auto; }
        table { table-layout: auto; width: 100%; border-collapse: collapse; }
        th, td { 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            padding: 12px 16px;
            max-width: 220px;
        }
        .row-index { white-space: nowrap; width: 1%; }
        .op-col { white-space: nowrap; width: 1%; text-align: center; }
        
        /* Action buttons layout */
        .action-btns-wrap {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="section-card">
            <div class="search-area">
                <div class="search-input-wrap">
                    <input type="text" id="searchInput" autocomplete="off" placeholder="搜索客户名称、联系人…">
                </div>
                <button type="button" class="btn btn-primary" id="searchBtn">搜索</button>
            </div>

            <div class="category-tags" id="categoryContainer"></div>
        </header>

        <section id="tableContainer">
            <div class="table-shell">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th class="row-index">序号</th>
                                <th>客户名称</th>
                                <th>联系人</th>
                                <th>联系电话</th>
                                <th>评级</th>
                                <th>合作年限</th>
                                <th>授信(万)</th>
                                <th>余额(万)</th>
                                <th class="op-col">操作</th>
                            </tr>
                        </thead>
                        <tbody id="customerTableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <div class="pagination">
            <button type="button" class="btn" style="border: 1px solid var(--border); background: #fff;">上一页</button>
            <button type="button" class="btn btn-primary">1</button>
            <button type="button" class="btn" style="border: 1px solid var(--border); background: #fff; color: var(--text-secondary);">2</button>
            <button type="button" class="btn" style="border: 1px solid var(--border); background: #fff; color: var(--text-secondary);">3</button>
            <button type="button" class="btn" style="border: 1px solid var(--border); background: #fff;">下一页</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const customers = [
                { id: 1, name: '杭州XX物流有限公司', contact: '张三', phone: '13812345678', rating: 'A', years: '5年', limit: '500', balance: '350' },
                { id: 2, name: '宁波YY物流有限公司', contact: '李四', phone: '13923456789', rating: 'B', years: '3年', limit: '300', balance: '200' },
                { id: 3, name: '温州ZZ物流有限公司', contact: '王五', phone: '13734567890', rating: 'A', years: '7年', limit: '800', balance: '550' },
                { id: 4, name: '杭州AA运输有限公司', contact: '赵六', phone: '13845678901', rating: 'C', years: '2年', limit: '200', balance: '150' },
                { id: 5, name: '台州BB物流有限公司', contact: '孙七', phone: '13956789012', rating: 'B', years: '4年', limit: '400', balance: '300' }
            ];

            const categories = ["全部客户", "重点客户", "新增客户", "潜在风险", "长期合作", "战略伙伴"];

            const state = {
                activeCategory: "全部客户",
                searchQuery: ""
            };

            const customerTableBody = document.getElementById("customerTableBody");
            const categoryContainer = document.getElementById("categoryContainer");
            const searchInput = document.getElementById("searchInput");

            // Event Listeners
            document.getElementById("searchBtn").onclick = () => performSearch();

            categoryContainer.onclick = (e) => {
                const tag = e.target.closest('.tag');
                if (tag) {
                    state.activeCategory = tag.textContent;
                    renderAll();
                }
            };

            // Op Buttons Delegation
            const handleOp = (e) => {
                const btn = e.target.closest('.op-btn');
                if (!btn) return;
                const id = btn.dataset.id;
                const action = btn.dataset.action;
                if (action === 'detail') {
                    location.href = `customer-detail.html?id=${id}`;
                } else if (action === 'marketing') {
                    alert('进入市场营销模块…');
                }
            };
            customerTableBody.onclick = handleOp;

            function performSearch() {
                state.searchQuery = searchInput.value.trim();
                renderAll();
            }

            function getFilteredItems() {
                let items = customers;
                if (state.searchQuery) {
                    const q = state.searchQuery.toLowerCase();
                    items = items.filter(it => it.name.toLowerCase().includes(q) || it.contact.toLowerCase().includes(q));
                }
                return items;
            }

            function renderAll() {
                // Category Tags
                categoryContainer.innerHTML = categories.map(cat => `
                    <div class="tag ${state.activeCategory === cat ? 'active' : ''}">${cat}</div>
                `).join('');

                const items = getFilteredItems();

                // Table Items
                customerTableBody.innerHTML = items.length ? items.map(item => `
                    <tr>
                        <td class="row-index">${item.id}</td>
                        <td>${item.name}</td>
                        <td>${item.contact}</td>
                        <td>${item.phone}</td>
                        <td><span class="rating-badge rating-${item.rating}">${item.rating}</span></td>
                        <td>${item.years}</td>
                        <td>${item.limit}</td>
                        <td>${item.balance}</td>
                        <td class="op-col">
                            <div class="action-btns-wrap">
                                <button class="op-btn" data-action="detail" data-id="${item.id}">详情</button>
                                <button class="op-btn" data-action="marketing" data-id="${item.id}">营销</button>
                            </div>
                        </td>
                    </tr>
                `).join('') : `<tr><td colspan="9" class="empty-tip">暂无符合条件的客户</td></tr>`;

            }

            renderAll();
        });
        // Lightweight Popconfirm Flow
        function showPopConfirm(anchor, title, onConfirm) {
            const existing = document.querySelector('.popover-confirm');
            if (existing) existing.remove();
            const pop = document.createElement('div');
            pop.className = 'popover-confirm';
            pop.innerHTML = `
                <div class="popover-title">${title}</div>
                <div class="popover-btns">
                    <button class="pop-btn-cancel">取消</button>
                    <button class="pop-btn-delete">确认删除</button>
                </div>
            `;
            document.body.appendChild(pop);
            const rect = anchor.getBoundingClientRect();
            const popWidth = 180;
            pop.style.top = (rect.top + window.scrollY - 70) + 'px';
            pop.style.left = (rect.left + window.scrollX - (popWidth / 2) + (rect.width / 2)) + 'px';
            pop.querySelector('.pop-btn-cancel').onclick = (e) => { e.stopPropagation(); pop.remove(); };
            pop.querySelector('.pop-btn-delete').onclick = (e) => { e.stopPropagation(); onConfirm(); pop.remove(); };
            const closeOnOtherClick = (e) => { if (!pop.contains(e.target) && !anchor.contains(e.target)) { pop.remove(); document.removeEventListener('click', closeOnOtherClick); } };
            setTimeout(() => document.addEventListener('click', closeOnOtherClick), 10);
        }

        // Apply popconfirm to any button with .delete class
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.op-btn.delete');
            if (btn) {
                e.stopPropagation();
                showPopConfirm(btn, "确认删除该客户？", () => {
                    console.log("Delete action for customer confirmed");
                    // btn.closest('tr').remove();
                });
            }
        });

        // Global Apple Tooltip Logic
        (function initAppleTooltip() {
            const tooltip = document.createElement('div');
            tooltip.className = 'apple-tooltip';
            document.body.appendChild(tooltip);
            document.addEventListener('mouseover', (e) => {
                const el = e.target;
                if (el.scrollWidth > el.clientWidth) {
                    tooltip.textContent = el.innerText || el.value;
                    tooltip.classList.add('visible');
                    const updatePos = (me) => {
                        tooltip.style.left = (me.pageX + 10) + 'px';
                        tooltip.style.top = (me.pageY + 10) + 'px';
                    };
                    updatePos(e);
                    el.onmousemove = updatePos;
                }
            });
            document.addEventListener('mouseout', (e) => {
                tooltip.classList.remove('visible');
                if (e.target.onmousemove) e.target.onmousemove = null;
            });
        })();
    </script>

</body>
</html>
