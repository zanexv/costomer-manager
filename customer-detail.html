<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户详情</title>
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <style>
        /* Design System — Apple-Inspired (DESIGN.md) */
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: rgba(0, 0, 0, 0.56);
            --text-tertiary: rgba(0, 0, 0, 0.36);
            --accent: #7c3aed;
            --border: rgba(0, 0, 0, 0.08);
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.04), 0 4px 12px rgba(0, 0, 0, 0.03);
            --radius: 12px;
            --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-primary);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1160px;
            margin: 0 auto;
            padding: 24px 24px 48px;
        }

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease, color 0.1s ease, border-color 0.1s ease;
            box-shadow: var(--shadow);
        }

        .back-button:hover {
            color: var(--text-primary);
            border-color: rgba(0, 0, 0, 0.16);
        }

        /* Tab Navigation */
        .tab-navigation {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0;
            overflow-x: auto;
            background: var(--surface);
            border-radius: var(--radius) var(--radius) 0 0;
            padding: 0 8px;
            box-shadow: var(--shadow);
        }

        .tab {
            padding: 14px 20px;
            cursor: pointer;
            position: relative;
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
            white-space: nowrap;
            transition: color 0.15s ease, font-weight 0.15s ease;
            letter-spacing: -0.1px;
        }

        .tab:hover:not(.active) {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--text-primary);
            font-weight: 600;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 16px;
            right: 16px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 2px 2px 0 0;
        }

        /* iframe */
        .iframe-container {
            width: 100%;
            height: 800px;
            border: none;
            overflow: hidden;
            background: #f8fafc;
            border-radius: 0 0 var(--radius) var(--radius);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 16px 16px 40px; }
            .tab { padding: 12px 16px; font-size: 13px; }
            .iframe-container { height: 600px; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .page-title { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">客户详情</h1>
            <button class="back-button" onclick="window.history.back()"><i class="ph ph-arrow-left" aria-hidden="true"></i> 返回</button>
        </div>
        
        <div id="customer-detail-content">
            <!-- 内容将通过JavaScript动态加载 -->
        </div>
    </div>
    
    <script>
        /**
         * 页面加载时执行初始化
         */
        document.addEventListener('DOMContentLoaded', function() {
            // 获取URL参数中的客户ID，默认为1
            const urlParams = new URLSearchParams(window.location.search);
            const customerId = urlParams.get('id') || '1';
            
            // 加载客户详情内容
            loadCustomerDetail(customerId);
        });
        
        /**
         * 加载客户详情
         * @param {string} customerId - 客户ID
         */
        function loadCustomerDetail(customerId) {
            const container = document.getElementById('customer-detail-content');
            
            // 创建客户详情内容
            container.innerHTML = createCustomerDetailContent(customerId);
            
            // 初始化标签页
            initCustomerDetailTabs();
            
            // 默认显示企业基本信息页面
            loadIframePage('enterprise-basic-info.html');
        }
        
        /**
         * 创建客户详情内容
         * @param {string} customerId - 客户ID
         * @returns {string} HTML内容
         */
        function createCustomerDetailContent(customerId) {
            return `
                <div class="customer-detail-content">
                    <!-- 客户信息 -->
                    <div class="customer-info">
                        <div class="tab-navigation">
                            <div class="tab active" data-tab="basic-info" data-page="enterprise-basic-info.html">企业基本信息</div>
                            <div class="tab" data-tab="business-info" data-page="business-info.html">经营信息</div>
                            <div class="tab" data-tab="premise-info" data-page="venue-info.html">场地信息</div>
                            <div class="tab" data-tab="equipment-info" data-page="equipment-info.html">设备信息</div>
                            <div class="tab" data-tab="vehicle-info" data-page="vehicle-info.html">车辆信息</div>
                            <div class="tab" data-tab="controller-info" data-page="controller-info.html">实控人信息</div>
                        </div>
                        
                        <!-- iframe 容器 -->
                        <iframe id="content-iframe" class="iframe-container" src="" frameborder="0"></iframe>
                    </div>
                </div>
            `;
        }
        
        /**
         * 初始化客户详情标签页
         */
        function initCustomerDetailTabs() {
            const tabs = document.querySelectorAll('.customer-info .tab');
            
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    // 移除当前激活状态
                    document.querySelector('.customer-info .tab.active').classList.remove('active');
                    
                    // 设置新的激活项
                    this.classList.add('active');
                    
                    // 获取要加载的页面URL
                    const pageUrl = this.getAttribute('data-page');
                    
                    // 加载对应的页面到iframe
                    loadIframePage(pageUrl);
                });
            });
        }
        
        /**
         * 加载页面到iframe
         * @param {string} pageUrl - 页面URL
         */
        function loadIframePage(pageUrl) {
            const iframe = document.getElementById('content-iframe');
            iframe.src = pageUrl;
        }
        
    </script>
</body>
</html>
