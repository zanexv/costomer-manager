<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户详情</title>
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <style>
        /* CSS Variables - Apple/Shadcn Inspired */
        :root {
            --bg: #f5f5f7; /* Apple Classic System Gray */
            --surface: #ffffff;
            --text-primary: #0f172a; 
            --text-secondary: #64748b; 
            --accent: #7c3aed; 
            --border: #e2e8f0; 
            --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
            --radius-md: 12px;
            --radius-lg: 24px; 
            --radius-full: 9999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            color: var(--text-primary);
            /* 替换为通体干净的系统灰，不再使用渐变色 */
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ------------------------------------- */
        /*   Shadcn Nav Header Equivalent        */
        /* ------------------------------------- */
        .nav-header {
            position: sticky;
            top: 0;
            z-index: 50;
            width: 100%;
            border-bottom: 1px solid var(--border);
            /* 导航栏也可以轻微透出底下的系统灰 */
            background-color: rgba(245, 245, 247, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            transition: box-shadow 0.3s ease;
        }

        .nav-header.shadow-md {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .nav-container {
            max-width: 1160px;
            margin: 0 auto;
            height: 64px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            /* 已去除硬性的边框隔断 */
        }

        /* Left: Logo/Brand */
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px; 
            text-decoration: none;
            color: var(--text-primary);
        }

        .sparkle-icon {
            height: 40px; 
            width: 40px; 
            border-radius: var(--radius-full); 
            background-color: var(--accent); 
            display: flex;
            align-items: center;
            justify-content: center;
            color: white; 
            font-size: 20px; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-brand:hover .sparkle-icon {
            transform: rotate(5deg) scale(1.1); 
        }

        .brand-title {
            font-weight: 700;
            font-size: 20px; 
        }

        /* Center: Nav Menu (Replaced 6 tabs) */
        .nav-menu {
            display: none; 
            gap: 24px;
        }

        @media (min-width: 768px) {
            .nav-menu {
                display: flex;
            }
        }

        .nav-link {
            font-size: 14px; 
            font-weight: 500; 
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s ease; 
            cursor: pointer;
            position: relative;
        }

        .nav-link:hover {
            color: var(--accent); 
        }

        /* Active State */
        .nav-link.active {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* Right: Actions */
        .nav-actions {
            display: none; 
            align-items: center;
            gap: 12px;
        }

        @media (min-width: 768px) {
            .nav-actions {
                display: flex;
            }
        }

        .btn-outline {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 36px; 
            padding: 0 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            background-color: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-full); 
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .btn-outline:hover {
            background-color: #e2e8f0; 
        }

        /* Mobile Menu Toggle */
        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            font-size: 24px; 
            color: var(--text-primary);
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .menu-btn {
                display: none;
            }
        }

        /* ------------------------------------- */
        /*   Main Layout (Below Header)          */
        /* ------------------------------------- */
        .main-content {
            flex: 1;
            width: 100%;
            /* 彻底去掉最大宽度和 padding 限位边界，避免在 iframe 模块外部再套一层浅灰色的壳（因为 iframe 内部网页已经自带留白了） */
            padding: 0;
            margin: 0;
        }

        .iframe-container {
            width: 100%;
            min-height: 800px;
            /* 深度解除画中画形态，做到通透无界式容器 */
            border: none; 
            border-radius: 0; 
            background: transparent;
            box-shadow: none; 
            overflow: hidden;
            display: block;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .nav-container { padding: 0 16px; }
            .main-content { padding: 0; }
            .iframe-container { min-height: 600px; }
        }
    </style>
</head>
<body>
    
    <!-- Shadcn Navigation Header (已去除边界矩形框死框架) -->
    <header class="nav-header" id="nav-header">
        <div class="nav-container">
            <!-- Left: Logo & Title -->
            <a href="javascript:void(0)" class="nav-brand">
                <div class="sparkle-icon">
                    <i class="ph ph-sparkle"></i>
                </div>
                <span class="brand-title">客户详情</span>
            </a>
            
            <!-- Center: Navigation Links -->
            <nav class="nav-menu" id="nav-menu">
                <a class="nav-link active" data-page="enterprise-basic-info.html">企业基本信息</a>
                <a class="nav-link" data-page="business-info.html">经营信息</a>
                <a class="nav-link" data-page="venue-info.html">场地信息</a>
                <a class="nav-link" data-page="equipment-info.html">设备信息</a>
                <a class="nav-link" data-page="vehicle-info.html">车辆信息</a>
                <a class="nav-link" data-page="controller-info.html">实控人信息</a>
            </nav>
            
            <!-- Right: Actions -->
            <div class="nav-actions">
                <button class="btn-outline" onclick="window.history.back()">
                    返回上页
                </button>
            </div>

            <!-- Mobile Burger Menu -->
            <button class="menu-btn">
                <i class="ph ph-list"></i>
            </button>
        </div>
    </header>

    <!-- Content Area (彻底去框融合形态) -->
    <main class="main-content">
        <!-- 保持与前端一致的高级自适应防截断双轨交互模式 iframe -->
        <iframe id="content-iframe" class="iframe-container" src="" frameborder="0" onload="onIframeLoad(this)"></iframe>
    </main>

    <script>
        let iframeObserver = null;

        /**
         * 页面初始化
         */
        document.addEventListener('DOMContentLoaded', function() {
            initNavigation();
            initHeaderScroll();
            
            // 默认加载第一个 tab/nav 页面
            loadIframePage('enterprise-basic-info.html');
        });

        /**
         * 初始化导航栏交互 (Shadcn 风格)
         */
        function initNavigation() {
            const links = document.querySelectorAll('.nav-link');
            
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (this.classList.contains('active')) return;
                    
                    document.querySelector('.nav-link.active')?.classList.remove('active');
                    this.classList.add('active');
                    
                    const pageUrl = this.getAttribute('data-page');
                    loadIframePage(pageUrl);
                });
            });
        }

        /**
         * 监听滚动让 NavBar 产生阴影，忠于 Shadcn 样例 {scrollY > 50 ? "shadow-md" : ""}
         */
        function initHeaderScroll() {
            window.addEventListener("scroll", () => {
                const header = document.getElementById("nav-header");
                if (window.scrollY > 50) {
                    header.classList.add("shadow-md");
                } else {
                    header.classList.remove("shadow-md");
                }
            });
        }

        /**
         * 加载子页面
         */
        function loadIframePage(pageUrl) {
            const iframe = document.getElementById('content-iframe');
            // Reset to prevent memory of long height causing flash issues
            iframe.style.height = '800px'; 
            iframe.style.overflow = 'auto';
            iframe.setAttribute('scrolling', 'auto');
            iframe.src = pageUrl;
        }

        // ==========================================
        //         内聚防截断的自适应伸缩系统        
        // ==========================================

        function onIframeLoad(iframe) {
            try {
                const innerDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (!innerDoc || !innerDoc.body) return;
                
                // Live/Web Server 原生直读
                const observer = new ResizeObserver(() => {
                    const scrollHeight = Math.max(innerDoc.body.scrollHeight, innerDoc.documentElement.scrollHeight);
                    iframe.style.height = (scrollHeight + 30) + 'px';
                    iframe.style.overflow = 'hidden';
                    iframe.setAttribute('scrolling', 'no');
                });
                observer.observe(innerDoc.body);
                iframe.style.height = (innerDoc.body.scrollHeight + 30) + 'px';
            } catch (e) {
                // file:// 直读发生 CORS 错误时，依赖之前已写好给各页面的 PostMessage 代码兜底接管！
            }
        }

        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'resizeIframe') {
                const iframe = document.getElementById('content-iframe');
                if (iframe) {
                    iframe.style.height = (event.data.height + 30) + 'px';
                    iframe.style.overflow = 'hidden';
                    iframe.setAttribute('scrolling', 'no');
                }
            }
        });
        
    </script>
</body>
</html>
