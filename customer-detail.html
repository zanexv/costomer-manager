<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户详情</title>
    <style>
        /* 全局样式变量 */
        :root {
            --primary-color: #653EB3;
            --primary-light: #7A5DC7;
            --secondary-color: #5934A1;
            --accent-color: #FF9F43;
            --warning-color: #FF6B6B;
            --danger-color: #FF5252;
            --success-color: #28C76F;
            --info-color: #00CFE8;
            --light-bg: #F8F8F8;
            --white: #FFFFFF;
            --text-color: #555555;
            --gray-color: #8A8A8A;
            --light-gray: #EAEAEA;
            --border-color: #E4E4E4;
            --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.15);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --orange-color: #FF9F43;
        }
        
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-color);
            background-color: var(--light-bg);
        }
        
        /* 页面容器 */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: var(--white);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
        }
        
        /* 页面标题区域 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        
        .page-title {
            color: var(--primary-color);
            font-size: 24px;
            font-weight: 600;
        }
        
        .back-button {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-sm);
            background-color: var(--primary-color);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            background-color: var(--secondary-color);
        }
        
        /* 客户信息区域 */
        .customer-info {
            padding-top: 4px;
        }
        
        /* 标签导航 */
        .tab-navigation {
            display: flex;
            border-bottom: 1px solid var(--light-gray);
            overflow-x: auto;
            margin-bottom: 25px;
            padding-bottom: 2px;
            gap: 5px;
        }
        
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            position: relative;
            color: var(--text-color);
            white-space: nowrap;
            transition: all 0.3s ease;
        }
        
        .tab:hover:not(.active) {
            color: var(--primary-light);
            background-color: rgba(101, 62, 179, 0.05);
        }
        
        .tab.active {
            color: var(--primary-color);
            font-weight: 600;
        }
        
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--primary-color);
        }
        
        /* iframe 容器样式 */
        .iframe-container {
            width: 100%;
            height: 800px;
            border: none;
            overflow: hidden;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
        }
        
        /* 响应式布局 */
        @media (max-width: 768px) {
            .tab-navigation {
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 10px;
                gap: 0;
            }
            
            .tab {
                padding: 10px 15px;
                font-size: 13px;
            }
            
            .iframe-container {
                height: 600px;
            }
            
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .back-button {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">客户详情</h1>
            <button class="back-button" onclick="window.history.back()">返回</button>
        </div>
        
        <div id="customer-detail-content">
            <!-- 内容将通过JavaScript动态加载 -->
        </div>
    </div>
    
    <script>
        /**
         * 页面加载时执行初始化
         */
        document.addEventListener('DOMContentLoaded', function() {
            // 获取URL参数中的客户ID，默认为1
            const urlParams = new URLSearchParams(window.location.search);
            const customerId = urlParams.get('id') || '1';
            
            // 加载客户详情内容
            loadCustomerDetail(customerId);
        });
        
        /**
         * 加载客户详情
         * @param {string} customerId - 客户ID
         */
        function loadCustomerDetail(customerId) {
            const container = document.getElementById('customer-detail-content');
            
            // 创建客户详情内容
            container.innerHTML = createCustomerDetailContent(customerId);
            
            // 初始化标签页
            initCustomerDetailTabs();
            
            // 默认显示企业基本信息页面
            loadIframePage('enterprise-basic-info.html');
        }
        
        /**
         * 创建客户详情内容
         * @param {string} customerId - 客户ID
         * @returns {string} HTML内容
         */
        function createCustomerDetailContent(customerId) {
            return `
                <div class="customer-detail-content">
                    <!-- 客户信息 -->
                    <div class="customer-info">
                        <div class="tab-navigation">
                            <div class="tab active" data-tab="basic-info" data-page="enterprise-basic-info.html">企业基本信息</div>
                            <div class="tab" data-tab="business-info" data-page="business-info.html">经营信息</div>
                            <div class="tab" data-tab="premise-info" data-page="venue-info.html">场地信息</div>
                            <div class="tab" data-tab="equipment-info" data-page="equipment-info.html">设备信息</div>
                            <div class="tab" data-tab="vehicle-info" data-page="vehicle-info.html">车辆信息</div>
                            <div class="tab" data-tab="controller-info" data-page="controller-info.html">实控人信息</div>
                        </div>
                        
                        <!-- iframe 容器 -->
                        <iframe id="content-iframe" class="iframe-container" src="" frameborder="0"></iframe>
                    </div>
                </div>
            `;
        }
        
        /**
         * 初始化客户详情标签页
         */
        function initCustomerDetailTabs() {
            const tabs = document.querySelectorAll('.customer-info .tab');
            
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    // 移除当前激活状态
                    document.querySelector('.customer-info .tab.active').classList.remove('active');
                    
                    // 设置新的激活项
                    this.classList.add('active');
                    
                    // 获取要加载的页面URL
                    const pageUrl = this.getAttribute('data-page');
                    
                    // 加载对应的页面到iframe
                    loadIframePage(pageUrl);
                });
            });
        }
        
        /**
         * 加载页面到iframe
         * @param {string} pageUrl - 页面URL
         */
        function loadIframePage(pageUrl) {
            const iframe = document.getElementById('content-iframe');
            iframe.src = pageUrl;
        }
        
    </script>
</body>
</html>
