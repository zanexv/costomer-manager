<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资产统计</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1920px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #653eb3;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #653eb3;
        }
        .control-panel {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .month-selector {
            background-color: #f5f7fa;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 14px;
            min-width: 150px;
            cursor: pointer;
        }
        .chart-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .chart-container {
            flex: 1;
            min-width: 30%;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        .chart-body {
            height: 400px;
            width: 100%;
        }
        .table-container {
            flex: 1;
            width: 100%;
            max-width: 100%;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        .table-body {
            height: 450px;
            overflow: auto;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
        
        @media (max-width: 1200px) {
            .chart-container, .table-container {
                min-width: 100%;
            }
            .chart-row {
                flex-direction: column;
            }
        }
    
  .hidden { display: none !important; }
  .detail-shell { max-width: 1920px; margin: 0 auto; padding: 20px; }
  .detail-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .detail-title { font-size: 20px; font-weight: 700; color: #653eb3; }
  .detail-back { background: #f5f7fa; border: 1px solid #dcdfe6; border-radius: 4px; padding: 8px 12px; cursor: pointer; color: #333; }
  .detail-back:hover { background-color: #e6f1fc; border-color: #a0cfff; }
  .detail-frame-wrap { background-color: #fff; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.05); overflow: hidden; height: calc(100vh - 140px); }
  #detail-frame { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <div id="dashboard-view">

    <div class="container">
        <div class="header">
            <div class="title">资产统计</div>
            <div class="control-panel">
                <select id="global-month-selector" class="month-selector">
                    <option value="202401">2024年01月</option>
                    <option value="202402">2024年02月</option>
                    <option value="202403">2024年03月</option>
                    <option value="202404" selected>2024年04月</option>
                    <option value="202405">2024年05月</option>
                    <option value="202406">2024年06月</option>
                    <option value="202407">2024年07月</option>
                    <option value="202408">2024年08月</option>
                    <option value="202409">2024年09月</option>
                    <option value="202410">2024年10月</option>
                    <option value="202411">2024年11月</option>
                    <option value="202412">2024年12月</option>
                </select>
            </div>
        </div>
        
        <!-- 价格分布、期限分布、笔均分布 -->
        <div class="chart-row">
            <div class="chart-container">
                <div class="chart-body">
                    <iframe id="price-frame" src="price-chart-module.html"></iframe>
                </div>
            </div>
            <div class="chart-container">
                <div class="chart-body">
                    <iframe id="term-frame" src="term-chart-module.html"></iframe>
                </div>
            </div>
            <div class="chart-container">
                <div class="chart-body">
                    <iframe id="average-amount-frame" src="average-amount-chart-module.html"></iframe>
                </div>
            </div>
        </div>
        
        <!-- 地区分布、逾期分布 -->
        <div class="chart-row">
            <div class="chart-container">
                <div class="chart-body">
                    <iframe id="geo-frame" src="geo-chart-module.html"></iframe>
                </div>
            </div>
            <div class="chart-container">
                <div class="chart-body">
                    <iframe id="overdue-frame" src="overdue-chart-module.html"></iframe>
                </div>
            </div>
        </div>
        
        <!-- 客户集中度分布 -->
        <div class="chart-row">
            <div class="table-container">
                <div class="table-body">
                    <iframe id="customer-frame" src="customer-concentration-module.html"></iframe>
                </div>
            </div>
        </div>
    </div>
    
    
  </div>
  <div id="detail-view" class="hidden">
    <div class="detail-shell">
      <div class="detail-toolbar">
        <div class="detail-title" id="detail-title">详情</div>
        <button class="detail-back" id="detail-back-btn" type="button">返回看板</button>
      </div>
      <div class="detail-frame-wrap"><iframe id="detail-frame"></iframe></div>
    </div>
  </div>

  <script>
    const moduleTemplates = {"price-chart-module.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>价格分布图表</title>\n    <script src=\"https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js\"><\/script>\n    <style>\n        body {\n            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;\n            background-color: #f8f9fa;\n            color: #333;\n            margin: 0;\n            padding: 0;\n        }\n        .container {\n            width: 100%;\n            box-sizing: border-box;\n            height: 100vh;\n            overflow: hidden;\n            display: flex;\n            flex-direction: column;\n        }\n        .header {\n            padding: 15px;\n            background-color: #fff;\n            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);\n            z-index: 10;\n        }\n        .title {\n            font-size: 18px;\n            font-weight: bold;\n            color: #653eb3;\n            margin-bottom: 10px;\n        }\n        .control-panel {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            flex-wrap: wrap;\n            gap: 15px;\n        }\n        .filters, .toggle-buttons {\n            display: flex;\n            align-items: center;\n            gap: 10px;\n            flex-wrap: wrap;\n        }\n        .month-selector, .toggle-btn {\n            background-color: #f5f7fa;\n            border: 1px solid #dcdfe6;\n            border-radius: 4px;\n            padding: 8px 12px;\n            font-size: 14px;\n            cursor: pointer;\n            transition: all 0.3s;\n        }\n        .month-selector {\n            min-width: 120px;\n        }\n        .toggle-btn:hover, .month-selector:hover {\n            background-color: #e6f1fc;\n            border-color: #a0cfff;\n            color: #409eff;\n        }\n        .toggle-btn.active {\n            background-color: #409eff;\n            border-color: #409eff;\n            color: #fff;\n        }\n        .detail-btn {\n            background-color: #f5f7fa;\n            border: 1px solid #dcdfe6;\n            border-radius: 4px;\n            padding: 4px 8px;\n            font-size: 12px;\n            cursor: pointer;\n            transition: all 0.3s;\n            margin-left: 10px;\n            color: #606266;\n            text-decoration: none;\n            display: inline-block;\n        }\n        .detail-btn:hover {\n            background-color: #e6f1fc;\n            border-color: #a0cfff;\n            color: #409eff;\n        }\n        .header-with-btn {\n            display: flex;\n            align-items: center;\n        }\n        .chart-container {\n            flex: 1;\n            padding: 15px;\n            background-color: #fff;\n            position: relative;\n        }\n        .chart-body {\n            width: 100%;\n            height: 100%;\n        }\n        \n        /* 响应式布局 */\n        @media (max-width: 767px) {\n            .control-panel {\n                flex-direction: column;\n                align-items: flex-start;\n            }\n            .filters, .toggle-buttons {\n                width: 100%;\n            }\n            .month-selector {\n                flex-grow: 1;\n            }\n            .toggle-buttons {\n                justify-content: space-between;\n            }\n            .toggle-btn {\n                flex-grow: 1;\n                text-align: center;\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"header\">\n            <div class=\"header-with-btn\">\n                <div class=\"title\">价格分布（按年利率区间）</div>\n                <a href=\"interest-rate-detail.html\" class=\"detail-btn\" target=\"_parent\">详情</a>\n            </div>\n            <div class=\"control-panel\">\n                <div class=\"filters\">\n                    <select id=\"month-selector\" class=\"month-selector\">\n                        <option value=\"202401\">2024年01月</option>\n                        <option value=\"202402\">2024年02月</option>\n                        <option value=\"202403\">2024年03月</option>\n                        <option value=\"202404\" selected>2024年04月</option>\n                        <option value=\"202405\">2024年05月</option>\n                        <option value=\"202406\">2024年06月</option>\n                        <option value=\"202407\">2024年07月</option>\n                        <option value=\"202408\">2024年08月</option>\n                        <option value=\"202409\">2024年09月</option>\n                        <option value=\"202410\">2024年10月</option>\n                        <option value=\"202411\">2024年11月</option>\n                        <option value=\"202412\">2024年12月</option>\n                        <option value=\"202501\">2025年01月</option>\n                        <option value=\"202502\">2025年02月</option>\n                        <option value=\"202503\">2025年03月</option>\n                        <option value=\"202504\">2025年04月</option>\n                        <option value=\"202505\">2025年05月</option>\n                        <option value=\"202506\">2025年06月</option>\n                    </select>\n                </div>\n                <div class=\"toggle-buttons\">\n                    <button id=\"normal-btn\" class=\"toggle-btn active\">当前数据</button>\n                    <button id=\"mom-btn\" class=\"toggle-btn\">环比数据</button>\n                </div>\n            </div>\n        </div>\n        \n        <div class=\"chart-container\">\n            <div class=\"chart-body\" id=\"price-chart\"></div>\n        </div>\n    </div>\n    \n    <script>\n        // 格式化货币\n        function formatCurrency(value) {\n            return parseFloat(value).toLocaleString('zh-CN', {\n                minimumFractionDigits: 2,\n                maximumFractionDigits: 2\n            });\n        }\n        \n        // 格式化百分比\n        function formatPercent(value) {\n            return parseFloat(value).toFixed(2) + '%';\n        }\n        \n        // 生成随机数据\n        function generateRandomData() {\n            // 年利率区间\n            const rateRanges = ['0-5.5%', '5.5-10%', '10-15%', '15-20%', '20-24%'];\n            \n            // 月份列表\n            const months = [\n                '202401', '202402', '202403', '202404', '202405', '202406', \n                '202407', '202408', '202409', '202410', '202411', '202412',\n                '202501', '202502', '202503', '202504', '202505', '202506'\n            ];\n            \n            const result = {\n                ranges: rateRanges,\n                months: {},\n            };\n            \n            // 为每个月生成数据\n            months.forEach(month => {\n                // 生成当前月份的数据\n                const currentData = {\n                    count: rateRanges.map(() => Math.floor(Math.random() * 1000) + 100),\n                    amount: rateRanges.map(() => (Math.random() * 5000 + 1000).toFixed(2))\n                };\n                \n                // 生成环比数据（-20%到+20%）\n                const momData = {\n                    count: rateRanges.map(() => ((Math.random() * 40 - 20) / 100).toFixed(4)),\n                    amount: rateRanges.map(() => ((Math.random() * 40 - 20) / 100).toFixed(4))\n                };\n                \n                result.months[month] = {\n                    normal: currentData,\n                    mom: momData\n                };\n            });\n            \n            return result;\n        }\n        \n        // 全局变量\n        let currentMode = 'normal';  // 当前模式（normal 或 mom）\n        let currentMonth = '202404';  // 当前选择的月份\n        \n        // 生成随机数据\n        const dataSource = generateRandomData();\n        \n        // 颜色配置\n        const colors = {\n            primary: '#5B8FF9',  // 贷款笔数颜色\n            secondary: '#61DDAA',  // 在贷余额颜色\n            negativeCount: '#F56C6C',  // 负环比贷款笔数颜色\n            negativeAmount: '#E67E22'  // 负环比在贷余额颜色\n        };\n        \n        // 初始化图表\n        const priceChart = echarts.init(document.getElementById('price-chart'));\n        \n        // 更新图表\n        function updateChart() {\n            const isMonthOverMonth = currentMode === 'mom';\n            const monthData = dataSource.months[currentMonth];\n            \n            let option;\n            \n            if (isMonthOverMonth) {\n                // 环比模式图表配置\n                option = {\n                    tooltip: {\n                        trigger: 'axis',\n                        axisPointer: {\n                            type: 'shadow'\n                        },\n                        formatter: function(params) {\n                            const range = params[0].axisValue;\n                            const countValue = params[0].value;\n                            const amountValue = params[1].value;\n                            \n                            return `${range}<br/>贷款笔数环比: ${formatPercent(countValue)}<br/>在贷余额环比: ${formatPercent(amountValue)}`;\n                        }\n                    },\n                    legend: {\n                        data: ['贷款笔数环比', '在贷余额环比'],\n                        top: 10\n                    },\n                    grid: {\n                        left: '3%',\n                        right: '5%',\n                        bottom: '3%',\n                        top: 60,\n                        containLabel: true\n                    },\n                    xAxis: {\n                        type: 'category',\n                        data: dataSource.ranges,\n                        axisLine: {\n                            lineStyle: {\n                                color: '#ddd'\n                            }\n                        },\n                        axisLabel: {\n                            color: '#666'\n                        }\n                    },\n                    yAxis: {\n                        type: 'value',\n                        name: '环比(%)',\n                        axisLine: {\n                            show: true,\n                            lineStyle: {\n                                color: '#333'\n                            }\n                        },\n                        axisLabel: {\n                            formatter: '{value}%'\n                        },\n                        splitLine: {\n                            lineStyle: {\n                                color: '#eee'\n                            }\n                        }\n                    },\n                    series: [\n                        {\n                            name: '贷款笔数环比',\n                            type: 'bar',\n                            data: monthData.mom.count.map(val => (parseFloat(val) * 100).toFixed(2)),\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.primary,\n                                borderRadius: 4\n                            },\n                            barGap: '30%'\n                        },\n                        {\n                            name: '在贷余额环比',\n                            type: 'bar',\n                            data: monthData.mom.amount.map(val => (parseFloat(val) * 100).toFixed(2)),\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.secondary,\n                                borderRadius: 4\n                            }\n                        }\n                    ]\n                };\n            } else {\n                // 正常模式图表配置\n                option = {\n                    tooltip: {\n                        trigger: 'axis',\n                        axisPointer: {\n                            type: 'shadow'\n                        },\n                        formatter: function(params) {\n                            const range = params[0].axisValue;\n                            const countValue = params[0].value;\n                            const amountValue = params[1].value;\n                            \n                            return `${range}<br/>贷款笔数: ${countValue}笔<br/>在贷余额: ${formatCurrency(amountValue)}万元`;\n                        }\n                    },\n                    legend: {\n                        data: ['贷款笔数', '在贷余额(万元)'],\n                        top: 10\n                    },\n                    grid: {\n                        left: '3%',\n                        right: '5%',\n                        bottom: '3%',\n                        top: 60,\n                        containLabel: true\n                    },\n                    xAxis: {\n                        type: 'category',\n                        data: dataSource.ranges,\n                        axisLine: {\n                            lineStyle: {\n                                color: '#ddd'\n                            }\n                        },\n                        axisLabel: {\n                            color: '#666'\n                        }\n                    },\n                    yAxis: [\n                        {\n                            type: 'value',\n                            name: '贷款笔数(笔)',\n                            position: 'left',\n                            axisLine: {\n                                show: true,\n                                lineStyle: {\n                                    color: colors.primary\n                                }\n                            },\n                            axisLabel: {\n                                formatter: '{value}'\n                            },\n                            splitLine: {\n                                lineStyle: {\n                                    color: '#eee'\n                                }\n                            },\n                            min: 0\n                        },\n                        {\n                            type: 'value',\n                            name: '在贷余额(万元)',\n                            position: 'right',\n                            axisLine: {\n                                show: true,\n                                lineStyle: {\n                                    color: colors.secondary\n                                }\n                            },\n                            axisLabel: {\n                                formatter: '{value}'\n                            },\n                            splitLine: {\n                                show: false\n                            },\n                            min: 0\n                        }\n                    ],\n                    series: [\n                        {\n                            name: '贷款笔数',\n                            type: 'bar',\n                            data: monthData.normal.count,\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.primary,\n                                borderRadius: 4\n                            }\n                        },\n                        {\n                            name: '在贷余额(万元)',\n                            type: 'bar',\n                            yAxisIndex: 1,\n                            data: monthData.normal.amount,\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.secondary,\n                                borderRadius: 4\n                            }\n                        }\n                    ]\n                };\n            }\n            \n            priceChart.setOption(option, true);\n        }\n        \n        // 月份选择器事件\n        document.getElementById('month-selector').addEventListener('change', function() {\n            currentMonth = this.value;\n            updateChart();\n        });\n        \n        // 当前数据按钮事件\n        document.getElementById('normal-btn').addEventListener('click', function() {\n            if (currentMode !== 'normal') {\n                currentMode = 'normal';\n                this.classList.add('active');\n                document.getElementById('mom-btn').classList.remove('active');\n                updateChart();\n            }\n        });\n        \n        // 环比数据按钮事件\n        document.getElementById('mom-btn').addEventListener('click', function() {\n            if (currentMode !== 'mom') {\n                currentMode = 'mom';\n                this.classList.add('active');\n                document.getElementById('normal-btn').classList.remove('active');\n                updateChart();\n            }\n        });\n        \n        // 窗口调整时重绘图表\n        window.addEventListener('resize', function() {\n            priceChart.resize();\n        });\n        \n        // 初始化\n        window.addEventListener('load', function() {\n            updateChart();\n        });\n    <\/script>\n</body>\n</html> ","term-chart-module.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>期限分布图表</title>\n    <script src=\"https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js\"><\/script>\n    <style>\n        body {\n            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;\n            background-color: #f8f9 ) => Math.floor(Math.random() * 1000) + 100),\n                    amount: termRanges.map(() => (Math.random() * 5000 + 1000).toFixed(2))\n                };\n                \n                // 生成环比数据（-20%到+20%）\n                const momData = {\n                    count: termRanges.map(() => ((Math.random() * 40 - 20) / 100).toFixed(4)),\n                    amount: termRanges.map(() => ((Math.random() * 40 - 20) / 100).toFixed(4))\n                };\n                \n                result.months[month] = {\n                    normal: currentData,\n                    mom: momData\n                };\n            });\n            \n            return result;\n        }\n        \n        // 全局变量\n        let currentMode = 'normal';  // 当前模式（normal 或 mom）\n        let currentMonth = '202404';  // 当前选择的月份\n        \n        // 生成随机数据\n        const dataSource = generateRandomData();\n        \n        // 颜色配置\n        const colors = {\n            primary: '#5B8FF9',  // 贷款笔数颜色\n            secondary: '#61DDAA',  // 在贷余额颜色\n            negativeCount: '#F56C6C',  // 负环比贷款笔数颜色\n            negativeAmount: '#E67E22'  // 负环比在贷余额颜色\n        };\n        \n        // 初始化图表\n        const termChart = echarts.init(document.getElementById('term-chart'));\n        \n        // 更新图表\n        function updateChart() {\n            const isMonthOverMonth = currentMode === 'mom';\n            const monthData = dataSource.months[currentMonth];\n            \n            let option;\n            \n            if (isMonthOverMonth) {\n                // 环比模式图表配置\n                option = {\n                    tooltip: {\n                        trigger: 'axis',\n                        axisPointer: {\n                            type: 'shadow'\n                        },\n                        formatter: function(params) {\n                            const range = params[0].axisValue;\n                            const countValue = params[0].value;\n hData.normal.count,\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.primary,\n                                borderRadius: 4\n                            }\n                        },\n                        {\n                            name: '在贷余额(万元)',\n                            type: 'bar',\n                            yAxisIndex: 1,\n                            data: monthData.normal.amount,\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.secondary,\n                                borderRadius: 4\n                            }\n                        }\n                    ]\n                };\n            }\n            \n            amountChart.setOption(option, true);\n        }\n        \n        // 月份选择器事件\n        document.getElementById('month-selector').addEventListener('change', function() {\n            currentMonth = this.value;\n            updateChart();\n            updateDetailLink();\n        });\n        \n        // 当前数据按钮事件\n        document.getElementById('normal-btn').addEventListener('click', function() {\n            if (currentMode !== 'normal') {\n                currentMode = 'normal';\n                this.classList.add('active');\n                document.getElementById('mom-btn').classList.remove('active');\n                updateChart();\n            }\n        });\n        \n        // 环比数据按钮事件\n        document.getElementById('mom-btn').addEventListener('click', function() {\n            if (currentMode !== 'mom') {\n                currentMode = 'mom';\n                this.classList.add('active');\n                document.getElementById('normal-btn').classList.remove('active');\n                updateChart();\n            }\n        });\n        \n        // 窗口调整时重绘图表\n        window.addEventListener('resize', function() {\n            amountChart.resize();\n        });\n        \n        // 初始化\n        window.addEventListener('load', function() {\n            updateChart();\n            updateDetailLink();\n        });\n        \n        // 更新详情链接\n        function updateDetailLink() {\n            const detailLink = document.querySelector('.detail-btn');\n            detailLink.href = `average-amount-detail.html?month=${currentMonth}`;\n        }\n    <\/script>\n</body>\n</html> ","geo-chart-module.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>地理区域分布图表</title>\n    <script src=\"https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js\"><\/script>\n    <style>\n        body {\n            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;\n            background-color: #f8f9fa;\n            color: #333;\n            margin: 0;\n            padding: 0;\n        }\n        .container {\n            width: 100%;\n            box-sizing: border-box;\n            height: 100vh;\n            overflow: hidden;\n            display: flex;\n            flex-direction: column;\n        }\n        .header {\n            padding: 15px;\n            background-color: #fff;\n            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);\n            z-index: 10;\n        }\n        .title {\n            font-size: 18px;\n            font-weight: bold;\n            color: #653eb3;\n            margin-bottom: 10px;\n        }\n        .control-panel {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            flex-wrap: wrap;\n            gap: 15px;\n        }\n        .filters, .toggle-buttons {\n            display: flex;\n            align-items: center;\n            gap: 10px;\n            flex-wrap: wrap;\n        }\n        .month-selector, .toggle-btn, .data-toggle-btn {\n            background-color: #f5f7fa;\n            border: 1px solid #dcdfe6;\n            border-radius: 4px;\n            padding: 8px 12px;\n            font-size: 14px;\n            cursor: pointer;\n            transition: all 0.3s;\n        }\n        .month-selector {\n            min-width: 120px;\n        }\n        .toggle-btn:hover, .month-selector:hover, .data-toggle-btn:hover {\n            background-color: #e6f1fc;\n            border-color: #a0cfff;\n            color: #409eff;\n        }\n        .toggle-btn.active, .data-toggle-btn.active {\n            background-color: #409eff;\n            border-color: #409eff;\n            color: #fff;\n        }\n        .chart-container {\n            flex: 1;\n            padding: 15px;\n            background-color: #fff;\n            position: relative;\n            display: flex;\n        }\n        .chart {\n            flex: 1;\n            height: 100%;\n        }\n        .legend-container {\n            width: 180px;\n            padding: 15px;\n            overflow-y: auto;\n        }\n        \n        /* 详情按钮样式 */\n        .detail-btn {\n            background-color: #f5f7fa;\n            border: 1px solid #dcdfe6;\n            border-radius: 4px;\n            padding: 4px 8px;\n            font-size: 12px;\n            cursor: pointer;\n            transition: all 0.3s;\n            margin-left: 10px;\n            color: #606266;\n            text-decoration: none;\n            display: inline-block;\n        }\n        .detail-btn:hover {\n            background-color: #e6f1fc;\n            border-color: #a0cfff;\n            color: #409eff;\n        }\n        .header-with-btn {\n            display: flex;\n            align-items: center;\n        }\n        \n        /* 响应式布局 */\n        @media (max-width: 767px) {\n            .control-panel {\n                flex-direction: column;\n                align-items: flex-start;\n            }\n            .filters, .toggle-buttons {\n                width: 100%;\n            }\n            .month-selector {\n                flex-grow: 1;\n            }\n            .toggle-buttons {\n                justify-content: space-between;\n            }\n            .toggle-btn, .data-toggle-btn {\n                flex-grow: 1;\n                text-align: center;\n            }\n            .chart-container {\n                flex-direction: column;\n            }\n            .legend-container {\n                width: 100%;\n                height: auto;\n                padding: 10px 0;\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"header\">\n            <div class=\"header-with-btn\">\n                <div class=\"title\">地理区域分布统计</div>\n                <a href=\"geo-chart-detail.html\" class=\"detail-btn\" target=\"_parent\">详情</a>\n            </div>\n            <div class=\"control-panel\">\n                <div class=\"filters\">\n                    <select id=\"month-selector\" class=\"month-selector\">\n                        <option value=\"202401\">2024年01月</option>\n                        <option value=\"202402\">2024年02月</option>\n                        <option value=\"202403\">2024年03月</option>\n                        <option value=\"202404\" selected>2024年04月</option>\n                        <option value=\"202405\">2024年05月</option>\n                        <option value=\"202406\">2024年06月</option>\n                        <option value=\"202407\">2024年07月</option>\n                        <option value=\"202408\">2024年08月</option>\n                        <option value=\"202409\">2024年09月</option>\n                        <option value=\"202410\">2024年10月</option>\n                        <option value=\"202411\">2024年11月</option>\n                        <option value=\"202412\">2024年12月</option>\n                    </select>\n                </div>\n            </div>\n        </div>\n        \n        <div class=\"chart-container\">\n            <div class=\"chart\" id=\"geo-chart\"></div>\n        </div>\n    </div>\n    \n    <script>\n        // 格式化货币\n        function formatCurrency(value) {\n            return parseFloat(value).toLocaleString('zh-CN', {\n                minimumFractionDigits: 2,\n                maximumFractionDigits: 2\n            });\n        }\n        \n        // 格式化百分比\n        function formatPercent(value) {\n            return parseFloat(value).toFixed(2) + '%';\n        }\n        \n        // 生成随机数据\n        function generateRandomData() {\n            // 地理区域\n            const regions = ['华东', '华南', '华中', '华北', '西南', '西北', '东北'];\n            \n            // 月份列表\n            const months = [\n                '202401', '202402', '202403', '202404', '202405', '202406', \n                '202407', '202408', '202409', '202410', '202411', '202412'\n            ];\n            \n            const result = {\n                regions: regions,\n                months: {},\n            };\n            \n            // 为每个月生成数据\n            months.forEach(month => {\n                // 确保总数为100%\n                const countValues = [];\n                const amountValues = [];\n                \n                let countSum = 0;\n                let amountSum = 0;\n                \n                // 生成当前月份的数据\n                for(let i = 0; i < regions.length; i++) {\n                    // 对贷款笔数，生成100-1000之间的随机数\n                    const count = Math.floor(Math.random() * 900) + 100;\n                    countSum += count;\n                    countValues.push(count);\n                    \n                    // 对在贷余额，生成1000-5000之间的随机数\n                    const amount = (Math.random() * 4000 + 1000).toFixed(2);\n                    amountSum += parseFloat(amount);\n                    amountValues.push(amount);\n                }\n                \n                result.months[month] = {\n                    normal: {\n                        count: countValues,\n                        amount: amountValues,\n                        countSum: countSum,\n                        amountSum: amountSum\n                    }\n                };\n            });\n            \n            return result;\n        }\n        \n        // 全局变量\n        let currentMonth = '202404';  // 当前选择的月份\n        \n        // 生成随机数据\n        const dataSource = generateRandomData();\n        \n        // 颜色配置\n        const colorPalette = [\n            '#5470c6', '#91cc75', '#fac858', '#ee6666', \n            '#73c0de', '#3ba272', '#fc8452', '#9a60b4'\n        ];\n        \n        // 初始化图表\n        const geoChart = echarts.init(document.getElementById('geo-chart'));\n        \n        // 更新图表\n        function updateChart() {\n            const monthData = dataSource.months[currentMonth];\n            \n            // 正常模式图表配置\n            const seriesData = dataSource.regions.map((region, index) => {\n                return {\n                    name: region,\n                    value: monthData.normal.amount[index],\n                    count: monthData.normal.count[index]\n                };\n            });\n            \n            const option = {\n                tooltip: {\n                    trigger: 'item',\n                    formatter: function(params) {\n                        const total = monthData.normal.amountSum;\n                        const percentage = ((params.value / total) * 100).toFixed(2) + '%';\n                        \n                        return `${params.name}<br/>在贷余额: ${formatCurrency(params.value)}万元<br/>占比: ${percentage}<br/>贷款笔数: ${params.data.count}笔`;\n                    }\n                },\n                legend: {\n                    show: false\n                },\n                series: [\n                    {\n                        name: '在贷余额',\n                        type: 'pie',\n                        radius: '70%',\n                        center: ['50%', '50%'],\n                        avoidLabelOverlap: true,\n                        itemStyle: {\n                            borderRadius: 4,\n                            borderColor: '#fff',\n                            borderWidth: 2\n                        },\n                        labelLine: {\n                            show: true,\n                            length: 10,\n                            length2: 15\n                        },\n                        label: {\n                            show: true,\n                            formatter: function(params) {\n                                const total = monthData.normal.amountSum;\n                                const percentage = ((params.value / total) * 100).toFixed(2) + '%';\n                                return `${params.name}:\\n笔数:${params.data.count}笔\\n金额:${formatCurrency(params.value)}万\\n占比:${percentage}`;\n                            },\n                            position: 'outside',\n                            rich: {\n                                b: {\n                                    lineHeight: 22,\n                                    fontSize: 14\n                                }\n                            }\n                        },\n                        emphasis: {\n                            label: {\n                                show: true,\n                                fontSize: '16',\n                                fontWeight: 'bold'\n                            }\n                        },\n                        data: seriesData\n                    }\n                ],\n                color: colorPalette\n            };\n            \n            geoChart.setOption(option, true);\n        }\n        \n        // 窗口调整时重绘图表\n        window.addEventListener('resize', function() {\n            geoChart.resize();\n        });\n        \n        // 初始化\n        window.addEventListener('load', function() {\n            updateChart();\n            updateDetailLink();\n        });\n        \n        // 更新详情链接\n        function updateDetailLink() {\n            const detailLink = document.querySelector('.detail-btn');\n            detailLink.href = `geo-chart-detail.html?month=${currentMonth}`;\n        }\n        \n        // 更新月份时同时更新详情链接\n        document.getElementById('month-selector').addEventListener('change', function() {\n            currentMonth = this.value;\n            updateChart();\n            updateDetailLink();\n        });\n    <\/script>\n</body>\n</html> ","overdue-chart-module.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>逾期分布图表</title>\n    <script src=\"https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js\"><\/script>\n    <style>\n        body {\n            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;\n            background-color: #f8f9fa;\n            color: #333;\n            margin: 0;\n            padding: 0;\n        }\n        .container {\n            width: 100%;\n            box-sizing: border-box;\n            height: 100vh;\n            overflow: hidden;\n            display: flex;\n            flex-direction: column;\n        }\n        .header {\n            padding: 15px;\n            background-color: #fff;\n            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);\n            z-index: 10;\n        }\n        .title {\n            font-size: 18px;\n            font-weight: bold;\n            color: #653eb3;\n            margin-bottom: 10px;\n        }\n        .control-panel {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            flex-wrap: wrap;\n            gap: 15px;\n        }\n        .filters, .toggle-buttons {\n            display: flex;\n            align-ite = echarts.init(document.getElementById('overdue-chart'));\n        \n        // 更新图表\n        function updateChart() {\n            const monthData = dataSource.months[currentMonth];\n            \n            // 正常模式图表配置\n            const seriesData = dataSource.regions.map((region, index) => {\n                return {\n                    name: region,\n                    value: monthData.normal.amount[index],\n                    count: monthData.normal.count[index]\n                };\n            });\n            \n            const option = {\n                tooltip: {\n                    trigger: 'item',\n                    formatter: function(params) {\n                        const total = monthData.normal.amountSum;\n                        const percentage = ((params.value / total) * 100).toFixed(2) + '%';\n                        \n                        return `${params.name}<br/>逾期金额: ${formatCurrency(params.value)}万元<br/>占比: ${percentage}<br/>逾期笔数: ${params.data.count}笔`;\n                    }\n                },\n                legend: {\n                    show: false\n                },\n                series: [\n                    {\n                        name: '逾期金额',\n                        type: 'pie',\n                        radius: '70%',\n                        center: ['50%', '50%'],\n                        avoidLabelOverlap: true,\n                        itemStyle: {\n                            borderRadius: 4,\n                            borderColor: '#fff',\n                            borderWidth: 2\n                        },\n                        labelLine: {\n                            show: true,\n                            length: 10,\n                            length2: 15\n                        },\n                        label: {\n                            show: true,\n                            formatter: function(params) {\n                                const total = monthData.normal.amountSum;\n                                const percentage = ((params.value / total) * 100).toFixed(2) + '%';\n                                return `${params.name}:\\n笔数:${params.data.count}笔\\n金额:${formatCurrency(params.value)}万\\n占比:${percentage}`;\n                            },\n                            position: 'outside',\n                            rich: {\n                                b: {\n                                    lineHeight: 22,\n                                    fontSize: 14\n                                }\n                            }\n                        },\n                        emphasis: {\n                            label: {\n                                show: true,\n                                fontSize: '16',\n                                fontWeight: 'bold'\n                            }\n                        },\n                        data: seriesData\n                    }\n                ],\n                color: colorPalette\n            };\n            \n            overdueChart.setOption(option, true);\n        }\n        \n        // 月份选择器事件\n        document.getElementById('month-selector').addEventListener('change', function() {\n            currentMonth = this.value;\n            updateChart();\n        });\n        \n        // 窗口调整时重绘图表\n        window.addEventListener('resize', function() {\n            overdueChart.resize();\n        });\n        \n        // 初始化\n        window.addEventListener('load', function() {\n            updateChart();\n        });\n    <\/script>\n</body>\n</html> ","customer-concentration-module.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>客户集中度分析</title>\n    <script src=\"https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js\"><\/script>\n    <style>\n        body {\n            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;\n            background-color: #f8f9fa;\n            color: #333;\n            margin: 0;\n            padding: 0;\n        }\n        .container {\n            width: 100%;\n            box-sizing: border-box;\n            height: 100vh;\n            overflow: hidden;\n            display: flex;\n            flex-direction: column;\n        }\n        .header {\n            padding: 15px;\n            background-color: #fff;\n            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);\n            z-index: 10;\n        }\n        .title {\n            font-size: 18px;\n            font-weight: bold;\n            color: #653eb3;\n            margin-bottom: 10px;\n        }\n        .control-panel {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            flex-wrap: wrap;\n            gap: 15px;\n        }\n        .filters, .toggle-buttons {\n            display: flex;\n            align-items: center;\n            gap: 10px;\n            flex-wrap: wrap;\n        }\n        .month-selector, .product-selector, .toggle-btn {\n            background-color: #f5f7fa;\n            border: 1px solid #dcdfe6;\n            border-radius: 4px;\n            padding: 8px 12px;\n            font-size: 14px;\n            cursor: pointer;\n            transition: all 0.3s;\n        }\n        .month-selector, .product-selector {\n            min-width: 120px;\n        }\n        .toggle-btn:hover, .month-selector:hover, .product-selector:hover {\n            background-color: #e6f1fc;\n            border-color: #a0cfff;\n            color: #409eff;\n        }\n        .toggle-btn.active {\n            background-color: #409eff;\n            border-color: #409eff;\n            color: #fff;\n        }\n        .content-container {\n            flex: 1;\n            padding: 15px;\n            background-color: #fff;\n            overflow: auto;\n        }\n        .table-container {\n            width: 100%;\n            overflow-x: auto;\n        }\n        table {\n            width: 100%;\n            border-collapse: collapse;\n            border-spacing: 0;\n            background-color: #fff;\n        }\n        th, td {\n            padding: 12px 15px;\n            text-align: left;\n            border-bottom: 1px solid #ebeef5;\n        }\n        th {\n            font-weight: bold;\n            color: #606266;\n            background-color: #f5f7fa;\n            position: sticky;\n            top: 0;\n            z-index: 1;\n        }\n        tr:hover td {\n            background-color: #f5f7fa;\n        }\n        tr:nth-child(even) {\n            background-color: #fafafa;\n        }\n        .customer-rank {\n            font-weight: bold;\n            text-align: center;\n            color: #666;\n        }\n        .top-3 .customer-rank {\n            color: #f56c6c;\n        }\n        .customer-amount {\n            text-align: left;\n            font-family: Consolas, monospace;\n        }\n        \n        .header-with-btn {\n            display: flex;\n            align-items: center;\n        }\n        .detail-btn {\n            display: inline-block;\n            margin-left: 10px;\n            padding: 4px 8px;\n            background-color: #f5f7fa;\n            border: 1px solid #dcdfe6;\n            border-radius: 4px;\n            font-size: 12px;\n            cursor: pointer;\n            transition: all 0.3s;\n            color: #606266;\n            text-decoration: none;\n        }\n        .detail-btn:hover {\n            background-color: #e6f1fc;\n            border-color: #a0cfff;\n            color: #409eff;\n        }\n        \n        /* 响应式布局 */\n        @media (max-width: 767px) {\n            .control-panel {\n                flex-direction: column;\n                align-items: flex-start;\n            }\n            .filters, .toggle-buttons {\n                width: 100%;\n            }\n            .month-selector, .product-selector {\n                flex-grow: 1;\n            }\n            .toggle-buttons {\n                justify-content: space-between;\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"header\">\n            <div class=\"header-with-btn\">\n                <div class=\"title\">客户集中度分析</div>\n                <a href=\"customer-concentration-detail.html\" class=\"detail-btn\" target=\"_parent\">详情</a>\n            </div>\n            <div class=\"control-panel\">\n                <div class=\"filters\">\n                    <select id=\"month-selector\" class=\"month-selector\">\n                        <option value=\"202401\">2024年01月</option>\n                        <option value=\"202402\">2024年02月</option>\n                        <option value=\"202403\">2024年03月</option>\n                        <option value=\"202404\" selected>2024年04月</option>\n                        <option value=\"202405\">2024年05月</option>\n                        <option value=\"202406\">2024年06月</option>\n                        <option value=\"202407\">2024年07月</option>\n                        <option value=\"202408\">2024年08月</option>\n                        <option value=\"202409\">2024年09月</option>\n                        <option value=\"202410\">2024年10月</option>\n                        <option value=\"202411\">2024年11月</option>\n                        <option value=\"202412\">2024年12月</option>\n                    </select>\n                    <select id=\"product-selector\" class=\"product-selector\">\n                        <option value=\"全部\">全部</option>\n                        <option value=\"小微保\">小微保</option>\n                        <option value=\"小微保专项\">小微保专项</option>\n                        <option value=\"小微保旺季\">小微保旺季</option>\n                        <option value=\"发薪贷\">发薪贷</option>\n                        <option value=\"秒贷\">秒贷</option>\n                        <option value=\"电商贷\">电商贷</option>\n                    </select>\n                </div>\n            </div>\n        </div>\n        \n        <div class=\"content-container\">\n            <div class=\"table-container\">\n                <table id=\"customer-table\">\n                    <thead>\n                        <tr>\n                            <th width=\"60\">排名</th>\n                            <th width=\"300\">客户名称</th>\n                            <th width=\"120\">网点代码</th>\n                            <th>在贷余额(万元)</th>\n                        </tr>\n                    </thead>\n                    <tbody id=\"customer-list\">\n                        <!-- 数据将通过JavaScript填充 -->\n                    </tbody>\n                </table>\n            </div>\n        </div>\n    </div>\n    \n    <script>\n        // 格式化货币\n        function formatCurrency(value) {\n            return parseFloat(value).toLocaleString('zh-CN', {\n                minimumFractionDigits: 2,\n                maximumFractionDigits: 2\n            });\n        }\n        \n        // 生成随机公司名称\n        function generateCompanyName() {\n            const prefixes = ['东方', '西部', '南方', '北方', '中国', '国际', '环球', '远洋', '京东', '阿里', '腾讯', '百度', '顺丰', '中通', '圆通', '申通', '韵达', '德邦', '极兔', '快捷'];\n            const middles = ['速运', '物流', '快递', '仓储', '供应链', '运输', '配送', '货运', '快运', '通达', '捷达', '达运', '通运', '海运', '陆运', '航运', '冷链', '跨境', '同城', '即时'];\n            const suffixes = ['有限公司', '集团', '股份有限公司', '科技有限公司', '物流有限公司', '运输有限公司', '快递服务有限公司', '仓储有限公司', '供应链管理有限公司', '(集团)有限公司'];\n            \n            const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];\n            const middle = middles[Math.floor(Math.random() * middles.length)];\n            const suffix = suffixes[Math.floor(Math.random() * suffixes.length)];\n            \n            return prefix + middle + suffix;\n        }\n        \n        // 生成随机网点代码（6位数字）\n        function generateBranchCode() {\n            return String(Math.floor(100000 + Math.random() * 900000));\n        }\n        \n        // 生成客户数据\n        function generateCustomerData() {\n            // 贷款产品列表\n            const products = ['小微保', '小微保专项', '小微保旺季', '发薪贷', '秒贷', '电商贷'];\n            \n            // 月份列表\n            const months = [\n                '202401', '202402', '202403', '202404', '202405', '202406', \n                '202407', '202408', '202409', '202410', '202411', '202412'\n            ];\n            \n            const result = {\n                products: products,\n                months: {},\n            };\n            \n            // 贷款范围，根据产品不同设置不同的范围\n            const loanRanges = {\n                '小微保': { min: 600, max: 3000 },\n                '小微保专项': { min: 500, max: 2500 },\n                '小微保旺季': { min: 700, max: 3500 },\n                '发薪贷': { min: 200, max: 1500 },\n                '秒贷': { min: 100, max: 800 },\n                '电商贷': { min: 300, max: 2000 }\n            };\n            \n            // 为每个月生成数据\n            months.forEach(month => {\n                result.months[month] = {};\n                \n                // 为每个产品生成客户数据\n                products.forEach(product => {\n                    const customers = [];\n                    const range = loanRanges[product];\n                    \n                    // 生成30个客户（取前20个）\n                    for (let i = 0; i < 30; i++) {\n                        const customer = {\n                            name: generateCompanyName(),\n                            branchCode: generateBranchCode(),\n                            amount: (Math.random() * (range.max - range.min) + range.min).toFixed(2)\n                        };\n                        customers.push(customer);\n                    }\n                    \n                    // 按照在贷余额降序排序\n                    customers.sort((a, b) => parseFloat(b.amount) - parseFloat(a.amount));\n                    \n                    // 存储前20个客户\n                    result.months[month][product] = customers.slice(0, 20);\n                });\n            });\n            \n            return result;\n        }\n        \n        // 全局变量\n        let currentMonth = '202404';  // 当前选择的月份\n        let currentProduct = '小微保';  // 当前选择的产品\n        \n        // 生成随机数据\n        const dataSource = generateCustomerData();\n        \n        // 更新表格\n        function updateTable() {\n            const monthData = dataSource.months[currentMonth];\n            const productData = monthData[currentProduct];\n            \n            const tableBody = document.getElementById('customer-list');\n            tableBody.innerHTML = '';\n            \n            productData.forEach((customer, index) => {\n                const row = document.createElement('tr');\n                if (index < 3) {\n                    row.classList.add('top-3');\n                }\n                \n                row.innerHTML = `\n                    <td class=\"customer-rank\">${index + 1}</td>\n                    <td>${customer.name}</td>\n                    <td>${customer.branchCode}</td>\n                    <td class=\"customer-amount\">${formatCurrency(customer.amount)}</td>\n                `;\n                \n                tableBody.appendChild(row);\n            });\n        }\n        \n        // 月份选择器事件\n        document.getElementById('month-selector').addEventListener('change', function() {\n            currentMonth = this.value;\n            updateTable();\n            updateDetailLink();\n        });\n        \n        // 产品选择器事件\n        document.getElementById('product-selector').addEventListener('change', function() {\n            currentProduct = this.value;\n            updateTable();\n        });\n        \n        // 更新详情链接\n        function updateDetailLink() {\n            const detailBtn = document.querySelector('.detail-btn');\n            if (detailBtn) {\n                detailBtn.href = `customer-concentration-detail.html?month=${currentMonth}`;\n            }\n        }\n        \n        // 初始化\n        window.addEventListener('load', function() {\n            updateTable();\n            updateDetailLink();\n        });\n    <\/script>\n</body>\n</html> "};
    const detailTemplates = {"interest-rate-detail.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>贷款价格分布详情</title>\n    <script src=\"https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js\"><\/script>\n    <style>\n        body {\n            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;\n            background-color: #f8f9fa;\n            color: #333;\n            margin: 0;\n            padding: 0;\n        }\n        .container {\n            max-width: 1800px;\n            margin: 0 auto;\n            padding: 20px;\n        }\n        .header {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            margin-bottom: 20px;\n            border-bottom: 1px solid #653eb3;\n            padding-bottom: 15px;\n        }\n        .title {\n            font-size: 24px;\n            font-weight: bold;\n            color: #653eb3;\n        }\n        .back-link {\n            text-decoration: none;\n            color: #5B8FF9;\n            font-size: 16px;\n        }\n        .control-panel {\n            display: flex;\n            justify-content: space-between;\n            margin-bottom: 20px;\n            align-items: center;\n            flex-wrap: wrap;\n        }\n        .filters, .toggle-buttons {\n            display: flex;\n            align-items: center;\n            gap: 10px;\n            margin: 10px 0;\n        }\n        .product-selector, .month-selector, .toggle-btn {\n            background-color: #f5f7fa;\n            border: 1px solid #dcdfe6;\n            border-radius: 4px;\n            padding: 8px 12px;\n            font-size: 14px;\n            cursor: pointer;\n            transition: all 0.3s;\n        }\n        .product-selector, .month-selector {\n            min-width: 120px;\n        }\n        .toggle-btn:hover, .product-selector:hover, .month-selector:hover {\n            background-color: #e6f1fc;\n            border-color: #a0cfff;\n            color: #409eff;\n        }\n        .toggle-btn.active {\n            background-color: #409eff;\n            border-color: #409eff;\n            color: #fff;\n        }\n        .filter-label {\n            font-weight: bold;\n            margin-right: 5px;\n        }\n        .chart-container {\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            margin-bottom: 20px;\n            overflow: hidden;\n        }\n        .chart-header {\n            padding: 15px 20px;\n            border-bottom: 1px solid #eee;\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n        }\n        .chart-title {\n            font-size: 18px;\n            font-weight: bold;\n        }\n        .chart-body {\n            padding: 20px;\n            height: 400px;\n        }\n        .comparison-charts {\n            display: flex;\n            flex-wrap: wrap;\n            gap: 20px;\n        }\n        .comparison-chart {\n            flex: 1;\n            min-width: 300px;\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            margin-bottom: 20px;\n        }\n        .comparison-chart-body {\n            padding: 20px;\n            height: 300px;\n        }\n        .summary-table {\n            width: 100%;\n            border-collapse: collapse;\n            margin-top: 20px;\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            overflow: hidden;\n        }\n        .summary-table th, .summary-table td {\n            padding: 12px 15px;\n            text-align: left;\n            border-bottom: 1px solid #eee;\n        }\n        .summary-table th {\n            background-color: #f5f7fa;\n            font-weight: bold;\n        }\n        .summary-table tr:last-child td {\n            border-bottom: none;\n        }\n        .positive-mom {\n            color: #67C23A;\n        }\n        .negative-mom {\n            color: #F56C6C;\n        }\n        .hidden {\n            display: none;\n        }\n        \n        @media (max-width: 991px) {\n            .comparison-charts {\n                flex-direction: column;\n            }\n            .comparison-chart {\n                width: 100%;\n            }\n            .filters, .toggle-buttons {\n                flex-wrap: wrap;\n            }\n        }\n        \n        @media (max-width: 767px) {\n            .control-panel {\n                flex-direction: column;\n                align-items: flex-start;\n            }\n            .chart-body {\n                height: 300px;\n            }\n            .comparison-chart-body {\n                height: 250px;\n            }\n            .product-selector, .month-selector {\n                width: 100%;\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"header\">\n            <div class=\"title\">贷款价格分布详情</div>\n            <a href=\"index.html\" class=\"back-link\">返回看板</a>\n        </div>\n        \n        <div class=\"control-panel\">\n            <div class=\"filters\">\n                <span class=\"filter-label\">产品:</span>\n                <select id=\"product-selector\" class=\"product-selector\">\n                    <option value=\"all\">全部产品</option>\n                    <option value=\"小微保\">小微保</option>\n                    <option value=\"小微保专项\">小微保专项</option>\n                    <option value=\"小微保旺季\">小微保旺季</option>\n                    <option value=\"发薪贷\">发薪贷</option>\n                    <option value=\"秒贷\">秒贷</option>\n                    <option value=\"电商贷\">电商贷</option>\n                </select>\n                \n                <span class=\"filter-label\">月份:</span>\n                <select id=\"month-selector\" class=\"month-selector\">\n                    <option value=\"202312\">2023年12月</option>\n                    <option value=\"202401\">2024年01月</option>\n                    <option value=\"202402\">2024年02月</option>\n                    <option value=\"202403\">2024年03月</option>\n                    <option value=\"202404\" selected>2024年04月</option>\n                    <option value=\"202405\">2024年05月</option>\n                </select>\n            </div>\n            \n            <div class=\"toggle-buttons\">\n                <button id=\"normal-btn\" class=\"toggle-btn active\">当前数据</button>\n                <button id=\"mom-btn\" class=\"toggle-btn\">环比数据</button>\n            </div>\n        </div>\n        \n        <div class=\"chart-container\">\n            <div class=\"chart-header\">\n                <div class=\"chart-title\">价格分布（按年利率区间）</div>\n            </div>\n            <div class=\"chart-body\" id=\"main-chart\"></div>\n        </div>\n        \n        <div class=\"comparison-charts\" id=\"comparison-charts\">\n            <div class=\"comparison-chart\">\n                <div class=\"chart-header\">\n                    <div class=\"chart-title\">贷款笔数分布</div>\n                </div>\n                <div class=\"comparison-chart-body\" id=\"count-chart\"></div>\n            </div>\n            \n            <div class=\"comparison-chart\">\n                <div class=\"chart-header\">\n                    <div class=\"chart-title\">在贷余额分布</div>\n                </div>\n                <div class=\"comparison-chart-body\" id=\"amount-chart\"></div>\n            </div>\n        </div>\n        \n        <table class=\"summary-table\" id=\"summary-table\">\n            <thead>\n                <tr>\n                    <th>年利率区间</th>\n                    <th>贷款笔数</th>\n                    <th>贷款笔数占比</th>\n                    <th>贷款笔数环比</th>\n                    <th>在贷余额(万元)</th>\n                    <th>在贷余额占比</th>\n                    <th>在贷余额环比</th>\n                </tr>\n            </thead>\n            <tbody>\n                <!-- 数据将通过JavaScript动态填充 -->\n            </tbody>\n        </table>\n    </div>\n    \n    <script>\n        // 格式化货币\n        function formatCurrency(value) {\n            return parseFloat(value).toLocaleString('zh-CN', {\n                minimumFractionDigits: 2,\n                maximumFractionDigits: 2\n            });\n        }\n        \n        // 格式化百分比\n        function formatPercent(value) {\n            return parseFloat(value).toFixed(2) + '%';\n        }\n        \n        // 生成随机数据\n        function generateRandomData() {\n            // 利率区间\n            const interestRateRanges = ['0-5.5%', '5.5-10%', '10-15%', '15-20%', '20-24%'];\n            \n            // 产品列表\n            const products = ['小微保', '小微保专项', '小微保旺季', '发薪贷', '秒贷', '电商贷'];\n            \n            // 月份列表\n            const months = ['202312', '202401', '202402', '202403', '202404', '202405'];\n            \n            // 按产品和月份生成随机数据\n            const productData = {};\n            \n            // 为全部产品创建汇总数据\n            productData['all'] = {};\n            \n            months.forEach(month => {\n                productData['all'][month] = {\n                    normal: {\n                        count: interestRateRanges.map(() => 0),\n                        amount: interestRateRanges.map(() => 0)\n                    },\n                    mom: {\n                        count: interestRateRanges.map(() => 0),\n                        amount: interestRateRanges.map(() => 0)\n                    }\n                };\n            });\n            \n            // 为每个产品生成随机数据\n            products.forEach(product => {\n                productData[product] = {};\n                \n                months.forEach(month => {\n                    // 为每个月生成随机数据\n                    const counts = interestRateRanges.map(() => Math.floor(Math.random() * 1000) + 100);\n                    const amounts = interestRateRanges.map(() => (Math.random() * 5000 + 1000).toFixed(2));\n                    \n                    // 生成环比数据（-20%到+20%）\n                    const countMoms = interestRateRanges.map(() => ((Math.random() * 40 - 20) / 100).toFixed(4));\n                    const amountMoms = interestRateRanges.map(() => ((Math.random() * 40 - 20) / 100).toFixed(4));\n                    \n                    productData[product][month] = {\n                        normal: {\n                            count: counts,\n                            amount: amounts\n                        },\n                        mom: {\n                            count: countMoms,\n                            amount: amountMoms\n                        }\n                    };\n                    \n                    // 累加到全部产品\n                    for (let i = 0; i < interestRateRanges.length; i++) {\n                        productData['all'][month].normal.count[i] += counts[i];\n                        productData['all'][month].normal.amount[i] = (parseFloat(productData['all'][month].normal.amount[i]) + parseFloat(amounts[i])).toFixed(2);\n                        \n                        // 全部产品的环比是加权平均\n                        const totalCount = productData['all'][month].normal.count.reduce((a, b) => a + b, 0);\n                        const totalAmount = productData['all'][month].normal.amount.reduce((a, b) => parseFloat(a) + parseFloat(b), 0);\n                        \n                        productData['all'][month].mom.count[i] = (counts[i] / totalCount * parseFloat(countMoms[i])).toFixed(4);\n                        productData['all'][month].mom.amount[i] = (parseFloat(amounts[i]) / totalAmount * parseFloat(amountMoms[i])).toFixed(4);\n                    }\n                });\n            });\n            \n            return {\n                interestRateRanges: interestRateRanges,\n                productData: productData\n            };\n        }\n        \n        // 初始化图表\n        let mainChart = echarts.init(document.getElementById('main-chart'));\n        let countChart = echarts.init(document.getElementById('count-chart'));\n        let amountChart = echarts.init(document.getElementById('amount-chart'));\n        \n        // 生成随机数据\n        const data = generateRandomData();\n        \n        // 当前选择\n        let currentProduct = 'all';\n        let currentMonth = '202404';\n        let currentMode = 'normal'; // normal 或 mom\n        \n        // 更新图表\n        function updateCharts() {\n            const productName = currentProduct === 'all' ? '全部产品' : currentProduct;\n            const chartData = data.productData[currentProduct][currentMonth];\n            const isMonthOverMonth = currentMode === 'mom';\n            \n            // 控制饼图显示/隐藏\n            const comparisonChartsElement = document.getElementById('comparison-charts');\n            if (isMonthOverMonth) {\n                comparisonChartsElement.classList.add('hidden');\n            } else {\n                comparisonChartsElement.classList.remove('hidden');\n            }\n            \n            // 颜色配置\n            const colors = {\n                primary: '#5B8FF9',\n                secondary: '#61DDAA',\n                accent: '#65789B'\n            };\n            \n            // 更新主图表\n            let mainChartOption;\n            \n            if (isMonthOverMonth) {\n                // 环比模式图表配置\n                mainChartOption = {\n                    title: {\n                        text: `${productName} - ${currentMonth.substring(0, 4)}年${currentMonth.substring(4, 6)}月`,\n                        left: 'center',\n                        textStyle: {\n                            fontSize: 16\n                        },\n                        subtextStyle: {\n                            fontSize: 12\n                        }\n                    },\n                    tooltip: {\n                        trigger: 'axis',\n                        axisPointer: {\n                            type: 'shadow'\n                        },\n                        formatter: function(params) {\n                            const range = params[0].axisValue;\n                            const countValue = params[0].value;\n                            const amountValue = params[1].value;\n                            \n                            return `${range}<br/>贷款笔数环比: ${formatPercent(countValue)}<br/>在贷余额环比: ${formatPercent(amountValue)}`;\n                        }\n                    },\n                    legend: {\n                        data: ['贷款笔数环比', '在贷余额环比'],\n                        top: 30\n                    },\n                    grid: {\n                        left: '3%',\n                        right: '5%',\n                        bottom: '3%',\n                        top: 80,\n                        containLabel: true\n                    },\n                    xAxis: {\n                        type: 'category',\n                        data: data.interestRateRanges,\n                        axisLine: {\n                            lineStyle: {\n                                color: '#ddd'\n                            }\n                        },\n                        axisLabel: {\n                            color: '#666'\n                        }\n                    },\n                    yAxis: {\n                        type: 'value',\n                        name: '环比(%)',\n                        axisLine: {\n                            show: true,\n                            lineStyle: {\n                                color: '#333'\n                            }\n                        },\n                        axisLabel: {\n                            formatter: '{value}%'\n                        },\n                        splitLine: {\n                            lineStyle: {\n                                color: '#eee'\n                            }\n                        }\n                    },\n                    series: [\n                        {\n                            name: '贷款笔数环比',\n                            type: 'bar',\n                            data: chartData.mom.count.map(val => (parseFloat(val) * 100).toFixed(2)),\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.primary,\n                                borderRadius: 4\n                            },\n                            barGap: '30%'\n                        },\n                        {\n                            name: '在贷余额环比',\n                            type: 'bar',\n                            data: chartData.mom.amount.map(val => (parseFloat(val) * 100).toFixed(2)),\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.secondary,\n                                borderRadius: 4\n                            }\n                        }\n                    ]\n                };\n            } else {\n                // 正常模式图表配置\n                mainChartOption = {\n                    title: {\n                        text: `${productName} - ${currentMonth.substring(0, 4)}年${currentMonth.substring(4, 6)}月`,\n                        left: 'center',\n                        textStyle: {\n                            fontSize: 16\n                        },\n                        subtextStyle: {\n                            fontSize: 12\n                        }\n                    },\n                    tooltip: {\n                        trigger: 'axis',\n                        axisPointer: {\n                            type: 'shadow'\n                        },\n                        formatter: function(params) {\n                            const range = params[0].axisValue;\n                            const countValue = params[0].value;\n                            const amountValue = params[1].value;\n                            \n                            return `${range}<br/>贷款笔数: ${countValue}笔<br/>在贷余额: ${formatCurrency(amountValue)}万元`;\n                        }\n                    },\n                    legend: {\n                        data: ['贷款笔数', '在贷余额(万元)'],\n                        top: 30\n                    },\n                    grid: {\n                        left: '3%',\n                        right: '5%',\n                        bottom: '3%',\n                        top: 80,\n                        containLabel: true\n                    },\n                    xAxis: {\n                        type: 'category',\n                        data: data.interestRateRanges,\n                        axisLine: {\n                            lineStyle: {\n                                color: '#ddd'\n                            }\n                        },\n                        axisLabel: {\n                            color: '#666'\n                        }\n                    },\n                    yAxis: [\n                        {\n                            type: 'value',\n                            name: '贷款笔数(笔)',\n                            position: 'left',\n                            axisLine: {\n                                show: true,\n                                lineStyle: {\n                                    color: colors.primary\n                                }\n                            },\n                            axisLabel: {\n                                formatter: '{value}'\n                            },\n                            splitLine: {\n
