<option value=\"202404\" selected>2024年04月</option>\n                    <option value=\"202405\">2024年05月</option>\n                </select>\n            </div>\n            \n            <div class=\"toggle-buttons\">\n                <button id=\"normal-btn\" class=\"toggle-btn active\">当前数据</button>\n                <button id=\"mom-btn\" class=\"toggle-btn\">环比数据</button>\n            </div>\n        </div>\n        \n        <div class=\"chart-container\">\n            <div class=\"chart-header\">\n                <div class=\"chart-title\">地理区域分布（按省份）</div>\n            </div>\n            <div class=\"chart-body\" id=\"map-chart\"></div>\n        </div>\n        \n        <div class=\"comparison-charts\">\n            <div class=\"comparison-chart\">\n                <div class=\"chart-header\">\n                    <div class=\"chart-title\">贷款笔数 Top 10 省份</div>\n                </div>\n                <div class=\"comparison-chart-body\" id=\"count-chart\"></div>\n            </div>\n            \n            <div class=\"comparison-chart\">\n                <div class=\"chart-header\">\n                    <div class=\"chart-title\">在贷余额 Top 10 省份</div>\n                </div>\n                <div class=\"comparison-chart-body\" id=\"amount-chart\"></div>\n            </div>\n        </div>\n        \n        <table class=\"summary-table\" id=\"summary-table\">\n            <thead>\n                <tr>\n                    <th>省份</th>\n                    <th>贷款笔数</th>\n                    <th>贷款笔数占比</th>\n                    <th>贷款笔数环比</th>\n                    <th>在贷余额(万元)</th>\n                    <th>在贷余额占比</th>\n                    <th>在贷余额环比</th>\n                </tr>\n            </thead>\n            <tbody>\n                <!-- 数据将通过JavaScript动态填充 -->\n            </tbody>\n        </table>\n    </div>\n    \n    <script>\n        // 格式化货币\n        function formatCurrency(value) {\n            return parseFloat(value).toLocaleString('zh-CN', {\n                minimumFractionDigits: 2,\n                maximumFractionDigits: 2\n            });\n        }\n        \n        // 格式化百分比\n        function formatPercent(value) {\n            return parseFloat(value).toFixed(2) + '%';\n        }\n        \n        // 获取URL参数\n        function getUrlParams() {\n            const params = {};\n            const queryString = window.location.search.substring(1);\n            const pairs = queryString.split('&');\n            \n            for (let i = 0; i < pairs.length; i++) {\n                const pair = pairs[i].split('=');\n                params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');\n            }\n            \n            return params;\n        }\n        \n        // 省份列表\n        const provinces = [\n            '北京', '天津', '河北', '山西', '内蒙古', '辽宁', '吉林', '黑龙江', \n            '上海', '江苏', '浙江', '安徽', '福建', '江西', '山东', '河南', \n            '湖北', '湖南', '广东', '广西', '海南', '重庆', '四川', '贵州', \n            '云南', '西藏', '陕西', '甘肃', '青海', '宁夏', '新疆'\n        ];\n        \n        // 生成随机数据\n        function generateRandomData() {\n            // 产品列表\n            const products = ['小微保', '小微保专项', '小微保旺季', '发薪贷', '秒贷', '电商贷'];\n            \n            // 月份列表\n            const months = ['202312', '202401', '202402', '202403', '202404', '202405'];\n            \n            // 按产品和月份生成随机数据\n            const productData = {};\n            \n            // 为全部产品创建汇总数据\n            productData['all'] = {};\n            \n            months.forEach(month => {\n                productData['all'][month] = {\n                    normal: {},\n                    mom: {}\n                };\n                \n                // 初始化每个省份的数据为0\n                provinces.forEach(province => {\n                    productData['all'][month].normal[province] = {\n                        count: 0,\n                        amount: 0\n                    };\n                    productData['all'][month].mom[province] = {\n                        count: 0,\n                        amount: 0\n                    };\n                });\n            });\n            \n            // 为每个产品生成随机数据\n            products.forEach(product => {\n                productData[product] = {};\n                \n                months.forEach(month => {\n                    productData[product][month] = {\n                        normal: {},\n                        mom: {}\n                    };\n                    \n                    // 为每个省份生成随机数据\n                    provinces.forEach(province => {\n                        // 为每个省生成随机贷款笔数和金额\n                        const count = Math.floor(Math.random() * 2000) + 100;\n                        const amount = (Math.random() * 10000 + 1000).toFixed(2);\n                        \n                        // 生成环比数据（-20%到+20%）\n                        const countMom = ((Math.random() * 40 - 20) / 100).toFixed(4);\n                        const amountMom = ((Math.random() * 40 - 20) / 100).toFixed(4);\n                        \n                        productData[product][month].normal[province] = {\n                            count: count,\n                            amount: amount\n                        };\n                        \n                        productData[product][month].mom[province] = {\n                            count: countMom,\n                            amount: amountMom\n                        };\n                        \n                        // 累加到全部产品\n                        productData['all'][month].normal[province].count += count;\n                        productData['all'][month].normal[province].amount = (\n                            parseFloat(productData['all'][month].normal[province].amount) + \n                            parseFloat(amount)\n                        ).toFixed(2);\n                        \n                        // 全部产品的环比是加权平均\n                        // 计算会在更新图表时进行，因为需要总量\n                    });\n                });\n            });\n            \n            return productData;\n        }\n        \n        // 初始化图表\n        let mapChart = echarts.init(document.getElementById('map-chart'));\n        let countChart = echarts.init(document.getElementById('count-chart'));\n        let amountChart = echarts.init(document.getElementById('amount-chart'));\n        \n        // 生成随机数据\n        const data = generateRandomData();\n        \n        // 获取URL参数\n        const urlParams = getUrlParams();\n        \n        // 当前选择\n        let currentProduct = 'all';\n        let currentMonth = urlParams.month || '202404'; // 从URL参数获取月份，如果没有则使用默认值\n        let currentMode = 'normal'; // normal 或 mom\n        \n        // 设置月份选择器的默认值\n        document.getElementById('month-selector').value = currentMonth;\n        \n        // 获取排序后的省份数据\n        function getSortedProvinces(data, sortBy) {\n            const provinceData = [];\n            for (const province in data) {\n                provinceData.push({\n                    name: province,\n                    count: data[province].count,\n                    amount: parseFloat(data[province].amount)\n                });\n            }\n            \n            if (sortBy === 'count') {\n                return provinceData.sort((a, b) => b.count - a.count);\n            } else {\n                return provinceData.sort((a, b) => b.amount - a.amount);\n            }\n        }\n        \n        // 更新图表\n        function updateCharts() {\n            const productName = currentProduct === 'all' ? '全部产品' : currentProduct;\n            const chartData = data[currentProduct][currentMonth];\n            const isMonthOverMonth = currentMode === 'mom';\n            \n            // 颜色配置\n            const colors = {\n                primary: '#5B8FF9',\n                secondary: '#61DDAA',\n                accent: '#65789B'\n            };\n            \n            // 获取省份数据，用于地图\n            const mapData = [];\n            const sortedCountData = getSortedProvinces(chartData.normal, 'count');\n            const sortedAmountData = getSortedProvinces(chartData.normal, 'amount');\n            \n            // 环比数据准备\n            const momMapData = [];\n            \n            if (isMonthOverMonth) {\n                // 为环比模式准备地图数据\n                for (const province in chartData.mom) {\n                    momMapData.push({\n                        name: province,\n                        value: (parseFloat(chartData.mom[province].count) * 100).toFixed(2)\n                    });\n                }\n            } else {\n                // 为正常模式准备地图数据\n                for (const province in chartData.normal) {\n                    mapData.push({\n                        name: province,\n                        value: chartData.normal[province].count\n                    });\n                }\n            }\n            \n            // 地图标题\n            const mapTitle = isMonthOverMonth ? \n                '贷款笔数环比分布' : \n                '贷款笔数分布';\n            \n            // 更新地图\n            mapChart.setOption({\n                title: {\n                    text: `${productName} - ${currentMonth.substring(0, 4)}年${currentMonth.substring(4, 6)}月 ${mapTitle}`,\n                    left: 'center',\n                    textStyle: {\n                        fontSize: 18,\n                        fontWeight: 'bold'\n                    }\n                },\n                tooltip: {\n                    trigger: 'item',\n                    formatter: function(params) {\n                        const province = params.name;\n                        \n                        if (isMonthOverMonth) {\n                            // 环比数据格式\n                            const countMom = params.value;\n                            const amountMom = (parseFloat(chartData.mom[province].amount) * 100).toFixed(2);\n                            \n                            return `${province}<br/>贷款笔数环比: ${countMom}%<br/>在贷余额环比: ${amountMom}%`;\n                        } else {\n                            // 正常数据格式\n                            const count = chartData.normal[province].count;\n                            const amount = formatCurrency(chartData.normal[province].amount);\n                            \n                            return `${province}<br/>贷款笔数: ${count}笔<br/>在贷余额: ${amount}万元`;\n                        }\n                    }\n                },\n                visualMap: {\n                    type: 'continuous',\n                    min: 0,\n                    max: isMonthOverMonth ? 20 : Math.max(...mapData.map(item => item.value)),\n                    left: 'left',\n                    top: 'bottom',\n                    calculable: true,\n                    text: isMonthOverMonth ? ['高', '低'] : ['多', '少'],\n                    inRange: {\n                        color: ['#e0f3f8', '#abd9e9', '#74add1', '#4575b4', '#313695']\n                    }\n                },\n                series: [\n                    {\n                        name: isMonthOverMonth ? '贷款笔数环比' : '贷款笔数',\n                        type: 'map',\n                        map: 'china',\n                        roam: true,\n                        label: {\n                            show: true,\n                            fontSize: 10\n                        },\n                        emphasis: {\n                            label: {\n                                show: true\n                            },\n                            itemStyle: {\n                                areaColor: '#FDD835'\n                            }\n                        },\n                        data: isMonthOverMonth ? momMapData : mapData\n                    }\n                ]\n            });\n            \n            // 更新Top 10贷款笔数图表\n            const top10Count = sortedCountData.slice(0, 10);\n            countChart.setOption({\n                title: {\n                    text: `贷款笔数 Top 10 省份`,\n                    left: 'center',\n                    textStyle: {\n                        fontSize: 16\n                    }\n                },\n                tooltip: {\n                    trigger: 'axis',\n                    axisPointer: {\n                        type: 'shadow'\n                    },\n                    formatter: function(params) {\n                        const province = params[0].name;\n                        \n                        if (isMonthOverMonth) {\n                            const countMom = (parseFloat(chartData.mom[province].count) * 100).toFixed(2);\n                            return `${province}<br/>贷款笔数环比: ${countMom}%`;\n                        } else {\n                            const count = chartData.normal[province].count;\n                            return `${province}<br/>贷款笔数: ${count}笔`;\n                        }\n                    }\n                },\n                grid: {\n                    left: '3%',\n                    right: '4%',\n                    bottom: '10%',\n                    top: '60',\n                    containLabel: true\n                },\n                xAxis: {\n                    type: 'value',\n                    axisLabel: {\n                        formatter: isMonthOverMonth ? '{value}%' : '{value}'\n                    }\n                },\n                yAxis: {\n                    type: 'category',\n                    data: top10Count.map(item => item.name).reverse(),\n                    axisLabel: {\n                        fontSize: 12\n                    }\n                },\n                series: [\n                    {\n                        name: isMonthOverMonth ? '环比' : '贷款笔数',\n                        type: 'bar',\n                        data: top10Count.map(item => {\n                            const province = item.name;\n                            return isMonthOverMonth \n                                ? (parseFloat(chartData.mom[province].count) * 100).toFixed(2)\n                                : item.count;\n                        }).reverse(),\n                        itemStyle: {\n                            color: colors.primary,\n                            borderRadius: 4\n                        },\n                        label: {\n                            show: true,\n                            position: 'right',\n                            formatter: isMonthOverMonth ? '{c}%' : '{c}'\n                        }\n                    }\n                ]\n            });\n            \n            // 更新Top 10在贷余额图表\n            const top10Amount = sortedAmountData.slice(0, 10);\n            amountChart.setOption({\n                title: {\n                    text: `在贷余额 Top 10 省份`,\n                    left: 'center',\n                    textStyle: {\n                        fontSize: 16\n                    }\n                },\n                tooltip: {\n                    trigger: 'axis',\n                    axisPointer: {\n                        type: 'shadow'\n                    },\n                    formatter: function(params) {\n                        const province = params[0].name;\n                        \n                        if (isMonthOverMonth) {\n                            const amountMom = (parseFloat(chartData.mom[province].amount) * 100).toFixed(2);\n                            return `${province}<br/>在贷余额环比: ${amountMom}%`;\n                        } else {\n                            const amount = formatCurrency(chartData.normal[province].amount);\n                            return `${province}<br/>在贷余额: ${amount}万元`;\n                        }\n                    }\n                },\n                grid: {\n                    left: '3%',\n                    right: '4%',\n                    bottom: '10%',\n                    top: '60',\n                    containLabel: true\n                },\n                xAxis: {\n                    type: 'value',\n                    axisLabel: {\n                        formatter: isMonthOverMonth ? '{value}%' : '{value}'\n                    }\n                },\n                yAxis: {\n                    type: 'category',\n                    data: top10Amount.map(item => item.name).reverse(),\n                    axisLabel: {\n                        fontSize: 12\n                    }\n                },\n                series: [\n                    {\n                        name: isMonthOverMonth ? '环比' : '在贷余额',\n                        type: 'bar',\n                        data: top10Amount.map(item => {\n                            const province = item.name;\n                            return isMonthOverMonth \n                                ? (parseFloat(chartData.mom[province].amount) * 100).toFixed(2)\n                                : item.amount;\n                        }).reverse(),\n                        itemStyle: {\n                            color: colors.secondary,\n                            borderRadius: 4\n                        },\n                        label: {\n                            show: true,\n                            position: 'right',\n                            formatter: isMonthOverMonth ? '{c}%' : '{c}'\n                        }\n                    }\n                ]\n            });\n            \n            // 更新数据表格\n            updateTable();\n        }\n        \n        // 更新数据表格\n        function updateTable() {\n            const tableBody = document.getElementById('summary-table').getElementsByTagName('tbody')[0];\n            tableBody.innerHTML = '';\n            \n            const chartData = data[currentProduct][currentMonth];\n            \n            // 计算总计\n            let totalCount = 0;\n            let totalAmount = 0;\n            \n            for (const province in chartData.normal) {\n                totalCount += chartData.normal[province].count;\n                totalAmount += parseFloat(chartData.normal[province].amount);\n            }\n            \n            // 排序省份（按贷款笔数从高到低）\n            const sortedProvinces = getSortedProvinces(chartData.normal, 'count');\n            \n            // 填充表格\n            sortedProvinces.forEach(provinceData => {\n                const province = provinceData.name;\n                const row = document.createElement('tr');\n                \n                // 省份\n                const provinceCell = document.createElement('td');\n                provinceCell.textContent = province;\n                row.appendChild(provinceCell);\n                \n                // 贷款笔数\n                const countCell = document.createElement('td');\n                countCell.textContent = chartData.normal[province].count.toLocaleString();\n                row.appendChild(countCell);\n                \n                // 贷款笔数占比\n                const countPercentCell = document.createElement('td');\n                const countPercent = (chartData.normal[province].count / totalCount * 100).toFixed(2);\n                countPercentCell.textContent = countPercent + '%';\n                row.appendChild(countPercentCell);\n                \n                // 贷款笔数环比\n                const countMomCell = document.createElement('td');\n                const countMom = (parseFloat(chartData.mom[province].count) * 100).toFixed(2);\n                countMomCell.textContent = countMom + '%';\n                countMomCell.className = parseFloat(countMom) >= 0 ? 'positive-mom' : 'negative-mom';\n                row.appendChild(countMomCell);\n                \n                // 在贷余额\n                const amountCell = document.createElement('td');\n                amountCell.textContent = formatCurrency(chartData.normal[province].amount);\n                row.appendChild(amountCell);\n                \n                // 在贷余额占比\n                const amountPercentCell = document.createElement('td');\n                const amountPercent = (parseFloat(chartData.normal[province].amount) / totalAmount * 100).toFixed(2);\n                amountPercentCell.textContent = amountPercent + '%';\n                row.appendChild(amountPercentCell);\n                \n                // 在贷余额环比\n                const amountMomCell = document.createElement('td');\n                const amountMom = (parseFloat(chartData.mom[province].amount) * 100).toFixed(2);\n                amountMomCell.textContent = amountMom + '%';\n                amountMomCell.className = parseFloat(amountMom) >= 0 ? 'positive-mom' : 'negative-mom';\n                row.appendChild(amountMomCell);\n                \n                tableBody.appendChild(row);\n            });\n        }\n        \n        // 产品选择器事件\n        document.getElementById('product-selector').addEventListener('change', function() {\n            currentProduct = this.value;\n            updateCharts();\n        });\n        \n        // 月份选择器事件\n        document.getElementById('month-selector').addEventListener('change', function() {\n            currentMonth = this.value;\n            updateCharts();\n        });\n        \n        // 当前数据按钮事件\n        document.getElementById('normal-btn').addEventListener('click', function() {\n            if (currentMode !== 'normal') {\n                currentMode = 'normal';\n                this.classList.add('active');\n                document.getElementById('mom-btn').classList.remove('active');\n                updateCharts();\n            }\n        });\n        \n        // 环比数据按钮事件\n        document.getElementById('mom-btn').addEventListener('click', function() {\n            if (currentMode !== 'mom') {\n                currentMode = 'mom';\n                this.classList.add('active');\n                document.getElementById('normal-btn').classList.remove('active');\n                updateCharts();\n            }\n        });\n        \n        // 初始更新图表\n        updateCharts();\n        \n        // 窗口调整时重绘图表\n        window.addEventListener('resize', function() {\n            mapChart.resize();\n            countChart.resize();\n            amountChart.resize();\n        });\n    <\/script>\n</body>\n</html> ","customer-concentration-detail.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>客户集中度分析详情</title>\n    <script src=\"https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js\"><\/script>\n    <style>\n        body {\n            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;\n            background-color: #f8f9fa;\n            color: #333;\n            margin: 0;\n            padding: 0;\n        }\n        .container {\n            max-width: 1800px;\n            margin: 0 auto;\n            padding: 20px;\n        }\n        .header {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            margin-bottom: 20px;\n            border-bottom: 1px solid #653eb3;\n            padding-bottom: 15px;\n        }\n        .title {\n            font-size: 24px;\n            font-weight: bold;\n            color: #653eb3;\n        }\n        .back-link {\n            text-decoration: none;\n            color: #5B8FF9;\n            font-size: 16px;\n        }\n        .control-panel {\n            display: flex;\n            justify-content: space-between;\n            margin-bottom: 20px;\n            align-items: center;\n            flex-wrap: wrap;\n        }\n        .filters, .toggle-buttons {\n            display: flex;\n            align-items: center;\n            gap: 10px;\n            margin: 10px 0;\n        }\n        .product-selector, .month-selector, .toggle-btn {\n            background-color: #f5f7fa;\n            border: 1px solid #dcdfe6;\n            border-radius: 4px;\n            padding: 8px 12px;\n            font-size: 14px;\n            cursor: pointer;\n            transition: all 0.3s;\n        }\n        .product-selector, .month-selector {\n            min-width: 120px;\n        }\n        .toggle-btn:hover, .product-selector:hover, .month-selector:hover {\n            background-color: #e6f1fc;\n            border-color: #a0cfff;\n            color: #409eff;\n        }\n        .toggle-btn.active {\n            background-color: #409eff;\n            border-color: #409eff;\n            color: #fff;\n        }\n        .filter-label {\n            font-weight: bold;\n            margin-right: 5px;\n        }\n        .chart-container {\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            margin-bottom: 20px;\n            overflow: hidden;\n        }\n        .chart-header {\n            padding: 15px 20px;\n            border-bottom: 1px solid #eee;\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n        }\n        .chart-title {\n            font-size: 18px;\n            font-weight: bold;\n        }\n        .chart-body {\n            padding: 20px;\n            height: 400px;\n        }\n        .comparison-charts {\n            display: flex;\n            flex-wrap: wrap;\n            gap: 20px;\n        }\n        .comparison-chart {\n            flex: 1;\n            min-width: 300px;\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            margin-bottom: 20px;\n        }\n        .comparison-chart-body {\n            padding: 20px;\n            height: 300px;\n        }\n        .summary-table {\n            width: 100%;\n            border-collapse: collapse;\n            margin-top: 20px;\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            overflow: hidden;\n        }\n        .summary-table th, .summary-table td {\n            padding: 12px 15px;\n            text-align: left;\n            border-bottom: 1px solid #eee;\n        }\n        .summary-table th {\n            background-color: #f5f7fa;\n            font-weight: bold;\n        }\n        .summary-table tr:last-child td {\n            border-bottom: none;\n        }\n        .positive-mom {\n            color: #67C23A;\n        }\n        .negative-mom {\n            color: #F56C6C;\n        }\n        .hidden {\n            display: none;\n        }\n        \n        @media (max-width: 991px) {\n            .comparison-charts {\n                flex-direction: column;\n            }\n            .comparison-chart {\n                width: 100%;\n            }\n            .filters, .toggle-buttons {\n                flex-wrap: wrap;\n            }\n        }\n        \n        @media (max-width: 767px) {\n            .control-panel {\n                flex-direction: column;\n                align-items: flex-start;\n            }\n            .chart-body {\n                height: 300px;\n            }\n            .comparison-chart-body {\n                height: 250px;\n            }\n            .product-selector, .month-selector {\n                width: 100%;\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"header\">\n            <div class=\"title\">客户集中度分析详情</div>\n            <a href=\"dashboard.html\" class=\"back-link\">返回看板</a>\n        </div>\n        \n        <div class=\"control-panel\">\n            <div class=\"filters\">\n                <span class=\"filter-label\">月份:</span>\n                <select id=\"month-selector\" class=\"month-selector\">\n                    <option value=\"202312\">2023年12月</option>\n                    <option value=\"202401\">2024年01月</option>\n                    <option value=\"202402\">2024年02月</option>\n                    <option value=\"202403\">2024年03月</option>\n                    <option value=\"202404\" selected>2024年04月</option>\n                    <option value=\"202405\">2024年05月</option>\n                </select>\n            </div>\n            \n            <div class=\"toggle-buttons\">\n                <button id=\"normal-btn\" class=\"toggle-btn active\">当前数据</button>\n                <button id=\"mom-btn\" class=\"toggle-btn\">环比数据</button>\n            </div>\n        </div>\n        \n        <div class=\"chart-container\">\n            <div class=\"chart-header\">\n                <div class=\"chart-title\">客户集中度分布</div>\n            </div>\n            <div class=\"chart-body\" id=\"main-chart\"></div>\n        </div>\n        \n        <div class=\"comparison-charts\">\n            <div class=\"comparison-chart\">\n                <div class=\"chart-header\">\n                    <div class=\"chart-title\">TOP 10 客户贷款余额占比</div>\n                </div>\n                <div class=\"comparison-chart-body\" id=\"top10-chart\"></div>\n            </div>\n            \n            <div class=\"comparison-chart\">\n                <div class=\"chart-header\">\n                    <div class=\"chart-title\">客户数量分布</div>\n                </div>\n                <div class=\"comparison-chart-body\" id=\"customer-count-chart\"></div>\n            </div>\n        </div>\n        \n        <table class=\"summary-table\" id=\"summary-table\">\n            <thead>\n                <tr>\n                    <th>客户分组</th>\n                    <th>客户数量</th>\n                    <th>客户数量占比</th>\n                    <th>客户数量环比</th>\n                    <th>在贷余额(万元)</th>\n                    <th>在贷余额占比</th>\n                    <th>在贷余额环比</th>\n                </tr>\n            </thead>\n            <tbody>\n                <!-- 数据将通过JavaScript动态填充 -->\n            </tbody>\n        </table>\n    </div>\n    \n    <script>\n        // 获取URL参数\n        function getUrlParam(name) {\n            const queryString = window.location.search;\n            const urlParams = new URLSearchParams(queryString);\n            return urlParams.get(name);\n        }\n\n        // 页面加载时设置月份\n        window.addEventListener('load', function() {\n            const monthParam = getUrlParam('month');\n            if (monthParam) {\n                const monthSelect = document.querySelector('select[name=\"month\"]');\n                if (monthSelect) {\n                    monthSelect.value = monthParam;\n                    // 触发change事件以更新数据\n                    const event = new Event('change');\n                    monthSelect.dispatchEvent(event);\n                }\n            }\n        });\n        \n        // 格式化货币\n        function formatCurrency(value) {\n            return parseFloat(value).toLocaleString('zh-CN', {\n                minimumFractionDigits: 2,\n                maximumFractionDigits: 2\n            });\n        }\n        \n        // 格式化百分比\n        function formatPercent(value) {\n            return parseFloat(value).toFixed(2) + '%';\n        }\n        \n        // 生成随机数据\n        function generateRandomData() {\n            // 客户集中度区间\n            const concentrationGroups = [\n                'TOP 10 客户', 'TOP 11-20 客户', 'TOP 21-50 客户', \n                'TOP 51-100 客户', 'TOP 101-200 客户', '其他客户'\n            ];\n            \n            // 月份列表\n            const months = ['202312', '202401', '202402', '202403', '202404', '202405'];\n            \n            // 按月份生成随机数据\n            const monthlyData = {};\n            \n            months.forEach(month => {\n                const customerData = {\n                    normal: {},\n                    mom: {}\n                };\n                \n                // 生成TOP 10个客户的详细数据\n                const top10Customers = [];\n                let totalAmount = 0;\n                \n                for (let i = 1; i <= 10; i++) {\n                    const amount = Math.floor(Math.random() * 8000) + 2000;\n                    totalAmount += amount;\n                    \n                    top10Customers.push({\n                        name: `客户${i}`,\n                        amount: amount\n                    });\n                }\n                \n                // 按金额排序\n                top10Customers.sort((a, b) => b.amount - a.amount);\n                \n                // 为每个集中度区间生成随机数据\n                let remainingCustomers = 5000; // 总客户数\n                let remainingAmount = totalAmount * 3; // 总贷款额\n                \n                concentrationGroups.forEach((group, index) => {\n                    let customerCount;\n                    let amount;\n                    \n                    if (index === 0) {\n                        // TOP 10 客户\n                        customerCount = 10;\n                        amount = totalAmount;\n                    } else if (index === concentrationGroups.length - 1) {\n                        // 其他客户（剩余的）\n                        customerCount = remainingCustomers;\n                        amount = remainingAmount;\n                    } else {\n                        // 其他分组\n                        let countRatio;\n                        let amountRatio;\n                        \n                        switch (index) {\n                            case 1: // TOP 11-20\n                                countRatio = 10 / remainingCustomers;\n                                amountRatio = 0.15;\n                                break;\n                            case 2: // TOP 21-50\n                                countRatio = 30 / remainingCustomers;\n                                amountRatio = 0.25;\n                                break;\n                            case 3: // TOP 51-100\n                                countRatio = 50 / remainingCustomers;\n                                amountRatio = 0.20;\n                                break;\n                            case 4: // TOP 101-200\n                                countRatio = 100 / remainingCustomers;\n                                amountRatio = 0.15;\n                                break;\n                        }\n                        \n                        customerCount = Math.round(remainingCustomers * countRatio);\n                        amount = Math.round(remainingAmount * amountRatio);\n                        \n                        remainingCustomers -= customerCount;\n                        remainingAmount -= amount;\n                    }\n                    \n                    // 环比变化（-15%到+15%）\n                    const countMom = ((Math.random() * 30 - 15) / 100).toFixed(4);\n                    const amountMom = ((Math.random() * 30 - 15) / 100).toFixed(4);\n                    \n                    customerData.normal[group] = {\n                        count: customerCount,\n                        amount: amount\n                    };\n                    \n                    customerData.mom[group] = {\n                        count: countMom,\n                        amount: amountMom\n                    };\n                });\n                \n                // 将TOP 10客户的详细数据也保存\n                customerData.topCustomers = top10Customers;\n                \n                monthlyData[month] = customerData;\n            });\n            \n            return monthlyData;\n        }\n        \n        // 初始化图表\n        let mainChart = echarts.init(document.getElementById('main-chart'));\n        let top10Chart = echarts.init(document.getElementById('top10-chart'));\n        let customerCountChart = echarts.init(document.getElementById('customer-count-chart'));\n        \n        // 生成随机数据\n        const data = generateRandomData();\n        \n        // 当前选择\n        let currentMonth = '202404';\n        let currentMode = 'normal'; // normal 或 mom\n        \n        // 更新图表\n        function updateCharts() {\n            const chartData = data[currentMonth];\n            const isMonthOverMonth = currentMode === 'mom';\n            \n            // 颜色配置\n            const colors = {\n                primary: ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272'],\n                secondary: ['#5B8FF9', '#61DDAA', '#65789B']\n            };\n            \n            // 数据处理\n            const groups = Object.keys(chartData.normal);\n            let totalCount = 0;\n            let totalAmount = 0;\n            \n            // 计算总客户数和总金额\n            for (const group of groups) {\n                totalCount += chartData.normal[group].count;\n                totalAmount += chartData.normal[group].amount;\n            }\n            \n            // 主图表数据\n            const mainChartData = groups.map(group => {\n                return {\n                    name: group,\n                    value: chartData.normal[group].amount\n                };\n            });\n            \n            // 对于环比模式，我们需要修改数据\n            if (isMonthOverMonth) {\n                // 环比模式下的数据\n                const momData = groups.map(group => {\n                    return {\n                        name: group,\n                        value: (parseFloat(chartData.mom[group].amount) * 100).toFixed(2)\n                    };\n                });\n                \n                // 环比模式的主图表\n                mainChart.setOption({\n                    title: {\n                        text: `${currentMonth.substring(0, 4)}年${currentMonth.substring(4, 6)}月 - 客户集中度环比变化`,\n                        left: 'center',\n                        top: 0\n                    },\n                    tooltip: {\n                        trigger: 'item',\n                        formatter: '{b}: {c}%'\n                    },\n                    series: [\n                        {\n                            name: '环比变化',\n                            type: 'bar',\n                            data: momData,\n                            itemStyle: {\n                                color: function(params) {\n                                    // 正值为绿色，负值为红色\n                                    return parseFloat(params.value) >= 0 ? '#67C23A' : '#F56C6C';\n                                },\n                                borderRadius: 4\n                            },\n                            label: {\n                                show: true,\n                                position: 'top',\n                                formatter: '{c}%'\n                            }\n                        }\n                    ],\n                    xAxis: {\n                        type: 'category',\n                        data: groups\n                    },\n                    yAxis: {\n                        type: 'value',\n                        name: '环比变化(%)',\n                        axisLabel: {\n                            formatter: '{value}%'\n                        }\n                    },\n                    grid: {\n                        left: '3%',\n                        right: '4%',\n                        bottom: '8%',\n                        top: '15%',\n                        containLabel: true\n                    }\n                });\n            } else {\n                // 正常模式下的主图表\n                mainChart.setOption({\n                    title: {\n                        text: `${currentMonth.substring(0, 4)}年${currentMonth.substring(4, 6)}月 - 客户集中度分布`,\n                        left: 'center',\n                        top: 0\n                    },\n                    tooltip: {\n                        trigger: 'item',\n                        formatter: function(params) {\n                            const group = params.name;\n                            const amount = formatCurrency(params.value);\n                            const percentage = formatPercent(params.value / totalAmount * 100);\n                            const count = chartData.normal[group].count;\n                            const countPercentage = formatPercent(count / totalCount * 100);\n                            \n                            return `${group}<br/>在贷余额: ${amount}万元 (${percentage})<br/>客户数: ${count}个 (${countPercentage})`;\n                        }\n                    },\n                    legend: {\n                        orient: 'vertical',\n                        left: 'left',\n                        top: 'center'\n                    },\n                    series: [\n                        {\n                            name: '客户集中度',\n                            type: 'pie',\n                            radius: '65%',\n                            center: ['55%', '50%'],\n                            data: mainChartData,\n                            emphasis: {\n                                itemStyle: {\n                                    shadowBlur: 10,\n                                    shadowOffsetX: 0,\n                                    shadowColor: 'rgba(0, 0, 0, 0.5)'\n                                }\n                            },\n                            label: {\n                                formatter: '{b}: {d}%',\n                                color: '#333'\n                            },\n                            itemStyle: {\n                                borderRadius: 5,\n                                borderColor: '#fff',\n                                borderWidth: 2\n                            }\n                        }\n                    ]\n                });\n            }\n            \n            // TOP 10 客户图表\n            if (isMonthOverMonth) {\n                // 环比模式下不显示TOP 10客户图表\n                top10Chart.setOption({\n                    title: {\n                        text: '环比模式下不显示TOP 10客户详情',\n                        left: 'center',\n                        top: 'center',\n                        textStyle: {\n                            fontSize: 14,\n                            color: '#999'\n                        }\n                    },\n                    series: []\n                });\n            } else {\n                // 计算TOP 10客户的占比\n                const top10Customers = chartData.topCustomers;\n                const top10Amount = top10Customers.reduce((sum, customer) => sum + customer.amount, 0);\n                \n                top10Chart.setOption({\n                    title: {\n                        text: 'TOP 10 客户贷款余额占比',\n                        left: 'center',\n                        top: 0\n                    },\n                    tooltip: {\n                        trigger: 'item',\n                        formatter: function(params) {\n                            const customer = params.name;\n                            const amount = formatCurrency(params.value);\n                            const percentage = formatPercent(params.value / totalAmount * 100);\n                            \n                            return `${customer}<br/>在贷余额: ${amount}万元<br/>占总体比例: ${percentage}`;\n                        }\n                    },\n                    series: [\n                        {\n                            name: 'TOP 10客户',\n                            type: 'pie',\n                            radius: ['40%', '70%'],\n                            center: ['50%', '55%'],\n                            roseType: 'radius',\n                            label: {\n                                formatter: '{b}: {c}万元'\n                            },\n                            data: top10Customers.map(customer => {\n                                return {\n                                    name: customer.name,\n                                    value: customer.amount\n                                };\n                            }),\n                            itemStyle: {\n                                borderRadius: 5,\n                                borderColor: '#fff',\n                                borderWidth: 2\n                            }\n                        }\n                    ]\n                });\n            }\n            \n            // 客户数量分布图表\n            if (isMonthOverMonth) {\n                // 环比模式下显示客户数量环比\n                const customerCountMomData = groups.map(group => {\n                    return {\n                        name: group,\n                        value: (parseFloat(chartData.mom[group].count) * 100).toFixed(2)\n                    };\n                });\n                \n                customerCountChart.setOption({\n                    title: {\n                        text: '客户数量环比变化',\n                        left: 'center',\n                        top: 0\n                    },\n                    tooltip: {\n                        trigger: 'item',\n                        formatter: '{b}: {c}%'\n                    },\n                    series: [\n                        {\n                            name: '环比变化',\n                            type: 'bar',\n                            data: customerCountMomData,\n                            itemStyle: {\n                                color: function(params) {\n                                    return parseFloat(params.value) >= 0 ? '#67C23A' : '#F56C6C';\n                                },\n                                borderRadius: 4\n                            },\n                            label: {\n                                show: true,\n                                position: 'top',\n                                formatter: '{c}%'\n                            }\n                        }\n                    ],\n                    xAxis: {\n                        type: 'category',\n                        data: groups\n                    },\n                    yAxis: {\n                        type: 'value',\n                        name: '环比变化(%)',\n                        axisLabel: {\n                            formatter: '{value}%'\n                        }\n                    },\n                    grid: {\n                        left: '3%',\n                        right: '4%',\n                        bottom: '8%',\n                        top: '15%',\n                        containLabel: true\n                    }\n                });\n            } else {\n                // 正常模式下显示客户数量分布\n                const customerCountData = groups.map(group => {\n                    return {\n                        name: group,\n                        value: chartData.normal[group].count\n                    };\n                });\n                \n                customerCountChart.setOption({\n                    title: {\n                        text: '客户数量分布',\n                        left: 'center',\n                        top: 0\n                    },\n                    tooltip: {\n                        trigger: 'item',\n                        formatter: function(params) {\n                            const count = params.value;\n                            const percentage = formatPercent(params.value / totalCount * 100);\n                            \n                            return `${params.name}<br/>客户数: ${count}个<br/>占比: ${percentage}`;\n                        }\n                    },\n                    series: [\n                        {\n                            name: '客户数量',\n                            type: 'pie',\n                            radius: '65%',\n                            center: ['50%', '55%'],\n                            data: customerCountData,\n                            emphasis: {\n                                itemStyle: {\n                                    shadowBlur: 10,\n                                    shadowOffsetX: 0,\n                                    shadowColor: 'rgba(0, 0, 0, 0.5)'\n                                }\n                            },\n                            label: {\n                                formatter: '{b}: {c}个',\n                                color: '#333'\n                            },\n                            itemStyle: {\n                                borderRadius: 5,\n                                borderColor: '#fff',\n                                borderWidth: 2\n                            }\n                        }\n                    ]\n                });\n            }\n            \n            // 更新表格\n            updateTable();\n        }\n        \n        // 更新数据表格\n        function updateTable() {\n            const tableBody = document.getElementById('summary-table').getElementsByTagName('tbody')[0];\n            tableBody.innerHTML = '';\n            \n            const chartData = data[currentMonth];\n            const groups = Object.keys(chartData.normal);\n            \n            // 计算总客户数和总金额\n            let totalCount = 0;\n            let totalAmount = 0;\n            \n            for (const group of groups) {\n                totalCount += chartData.normal[group].count;\n                totalAmount += chartData.normal[group].amount;\n            }\n            \n            // 填充表格\n            groups.forEach(group => {\n                const row = document.createElement('tr');\n                \n                // 客户分组\n                const groupCell = document.createElement('td');\n                groupCell.textContent = group;\n                row.appendChild(groupCell);\n                \n                // 客户数量\n                const countCell = document.createElement('td');\n                countCell.textContent = chartData.normal[group].count.toLocaleString();\n                row.appendChild(countCell);\n                \n                // 客户数量占比\n                const countPercentCell = document.createElement('td');\n                const countPercent = (chartData.normal[group].count / totalCount * 100).toFixed(2);\n                countPercentCell.textContent = countPercent + '%';\n                row.appendChild(countPercentCell);\n                \n                // 客户数量环比\n                const countMomCell = document.createElement('td');\n                const countMom = (parseFloat(chartData.mom[group].count) * 100).toFixed(2);\n                countMomCell.textContent = countMom + '%';\n                countMomCell.className = parseFloat(countMom) >= 0 ? 'positive-mom' : 'negative-mom';\n                row.appendChild(countMomCell);\n                \n                // 在贷余额\n                const amountCell = document.createElement('td');\n                amountCell.textContent = formatCurrency(chartData.normal[group].amount);\n                row.appendChild(amountCell);\n                \n                // 在贷余额占比\n                const amountPercentCell = document.createElement('td');\n                const amountPercent = (chartData.normal[group].amount / totalAmount * 100).toFixed(2);\n                amountPercentCell.textContent = amountPercent + '%';\n                row.appendChild(amountPercentCell);\n                \n                // 在贷余额环比\n                const amountMomCell = document.createElement('td');\n                const amountMom = (parseFloat(chartData.mom[group].amount) * 100).toFixed(2);\n                amountMomCell.textContent = amountMom + '%';\n                amountMomCell.className = parseFloat(amountMom) >= 0 ? 'positive-mom' : 'negative-mom';\n                row.appendChild(amountMomCell);\n                \n                tableBody.appendChild(row);\n            });\n        }\n        \n        // 月份选择器事件\n        document.getElementById('month-selector').addEventListener('change', function() {\n            currentMonth = this.value;\n            updateCharts();\n        });\n        \n        // 当前数据按钮事件\n        document.getElementById('normal-btn').addEventListener('click', function() {\n            if (currentMode !== 'normal') {\n                currentMode = 'normal';\n                this.classList.add('active');\n                document.getElementById('mom-btn').classList.remove('active');\n                updateCharts();\n            }\n        });\n        \n        // 环比数据按钮事件\n        document.getElementById('mom-btn').addEventListener('click', function() {\n            if (currentMode !== 'mom') {\n                currentMode = 'mom';\n                this.classList.add('active');\n                document.getElementById('normal-btn').classList.remove('active');\n                updateCharts();\n            }\n        });\n        \n        // 窗口调整时重绘图表\n        window.addEventListener('resize', function() {\n            mainChart.resize();\n            top10Chart.resize();\n            customerCountChart.resize();\n        });\n        \n        // 初始更新图表\n        updateCharts();\n    <\/script>\n</body>\n</html>\n"};
    const moduleMap = {"price-frame":"price-chart-module.html","term-frame":"term-chart-module.html","average-amount-frame":"average-amount-chart-module.html","geo-frame":"geo-chart-module.html","overdue-frame":"overdue-chart-module.html","customer-frame":"customer-concentration-module.html"};
    const detailTitleMap = {
      'interest-rate-detail.html': '利率分布详情',
      'term-chart-detail.html': '期限分布详情',
      'average-amount-detail.html': '笔均分布详情',
      'geo-chart-detail.html': '地区分布详情',
      'customer-concentration-detail.html': '客户集中度详情'
    };

    const dashboardView = document.getElementById('dashboard-view');
    const detailView = document.getElementById('detail-view');
    const detailFrame = document.getElementById('detail-frame');
    const detailTitle = document.getElementById('detail-title');
    const globalMonthSelector = document.getElementById('global-month-selector');

    function patchDetailHtml(html, month) {
      let patched = html;
      patched = patched.replace(
        'const queryString = window.location.search.substring(1);',
        'const queryString = (window.__FORCED_MONTH__ ? ("month=" + window.__FORCED_MONTH__) : window.location.search.substring(1));'
      );
      patched = patched.replace(
        'const queryString = window.location.search;',
        'const queryString = (window.__FORCED_MONTH__ ? ("?month=" + window.__FORCED_MONTH__) : window.location.search);'
      );
      const inject = '<script>window.__FORCED_MONTH__ = ' + JSON.stringify(month || '') + ';<\/script></body>';
      return patched.replace('</body>', inject);
    }

    function closeDetail() {
      detailView.classList.add('hidden');
      dashboardView.classList.remove('hidden');
      detailFrame.srcdoc = '';
    }

    function openDetail(fileName, month) {
      const template = detailTemplates[fileName];
      if (!template) return;
      detailTitle.textContent = detailTitleMap[fileName] || '详情';
      detailFrame.srcdoc = patchDetailHtml(template, month || globalMonthSelector.value);
      dashboardView.classList.add('hidden');
      detailView.classList.remove('hidden');
      detailFrame.onload = () => {
        const doc = detailFrame.contentDocument;
        if (!doc) return;
        doc.addEventListener('click', (e) => {
          const back = e.target.closest('.back-link');
          if (!back) return;
          e.preventDefault();
          closeDetail();
        });
      };
    }

    function bindModuleDetailRouting(frame) {
      frame.addEventListener('load', () => {
        const doc = frame.contentDocument;
        if (!doc) return;
        doc.addEventListener('click', (e) => {
          const link = e.target.closest('a.detail-btn');
          if (!link) return;
          e.preventDefault();
          const href = link.getAttribute('href') || '';
          const url = new URL(href, window.location.href);
          const fileName = url.pathname.split('/').pop();
          const month = url.searchParams.get('month') || globalMonthSelector.value;
          openDetail(fileName, month);
        });
      });
    }

    function broadcastMonth(selectedMonth) {
      Object.keys(moduleMap).forEach((frameId) => {
        const frame = document.getElementById(frameId);
        if (frame && frame.contentWindow) {
          frame.contentWindow.postMessage({ type: 'updateMonth', month: selectedMonth }, '*');
        }
      });
    }

    function adjustFrameHeight() {
      const frames = document.querySelectorAll('#dashboard-view iframe');
      frames.forEach((frame) => {
        frame.style.height = frame.parentElement.offsetHeight + 'px';
      });
    }

    Object.entries(moduleMap).forEach(([frameId, fileName]) => {
      const frame = document.getElementById(frameId);
      if (!frame) return;
      frame.srcdoc = moduleTemplates[fileName] || '';
      bindModuleDetailRouting(frame);
    });

    globalMonthSelector.addEventListener('change', function() {
      broadcastMonth(this.value);
    });

    document.getElementById('detail-back-btn').addEventListener('click', closeDetail);
    window.addEventListener('resize', adjustFrameHeight);
    window.addEventListener('load', () => {
      adjustFrameHeight();
      broadcastMonth(globalMonthSelector.value);
    });
  </script>
</body>
</html>
