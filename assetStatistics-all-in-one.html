                         lineStyle: {\n                                    color: '#eee'\n                                }\n                            },\n                            min: 0\n                        },\n                        {\n                            type: 'value',\n                            name: '在贷余额(万元)',\n                            position: 'right',\n                            axisLine: {\n                                show: true,\n                                lineStyle: {\n                                    color: colors.secondary\n                                }\n                            },\n                            axisLabel: {\n                                formatter: '{value}'\n                            },\n                            splitLine: {\n                                show: false\n                            },\n                            min: 0\n                        }\n                    ],\n                    series: [\n                        {\n                            name: '贷款笔数',\n                            type: 'bar',\n                            data: chartData.normal.count,\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.primary,\n                                borderRadius: 4\n                            }\n                        },\n                        {\n                            name: '在贷余额(万元)',\n                            type: 'bar',\n                            yAxisIndex: 1,\n                            data: chartData.normal.amount,\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.secondary,\n                                borderRadius: 4\n                            }\n                        }\n                    ]\n                };\n            }\n            \n            mainChart.setOption(mainChartOption, true);\n            \n            // 更新贷款笔数图表\n            countChart.setOption({\n                title: {\n                    text: '贷款笔数分布',\n                    left: 'center',\n                    textStyle: {\n                        fontSize: 16\n                    }\n                },\n                tooltip: {\n                    trigger: 'item',\n                    formatter: isMonthOverMonth ? \n                        '{b}: {c}%' : \n                        '{b}<br/>贷款笔数: {c}笔<br/>占比: {d}%'\n                },\n                series: [\n                    {\n                        name: '贷款笔数',\n                        type: 'pie',\n                        radius: '65%',\n                        center: ['50%', '55%'],\n                        data: isMonthOverMonth ? \n                            data.interestRateRanges.map((range, index) => ({\n                                name: range, \n                                value: (parseFloat(chartData.mom.count[index]) * 100).toFixed(2)\n                            })) : \n                            data.interestRateRanges.map((range, index) => ({\n                                name: range, \n                                value: chartData.normal.count[index]\n                            })),\n                        emphasis: {\n                            itemStyle: {\n                                shadowBlur: 10,\n                                shadowOffsetX: 0,\n                                shadowColor: 'rgba(0, 0, 0, 0.5)'\n                            }\n                        },\n                        label: {\n                            formatter: isMonthOverMonth ? \n                                '{b}: {c}%' : \n                                '{b}: {d}%\\n{c}笔',\n                            lineHeight: 16\n                        },\n                        itemStyle: {\n                            borderRadius: 5,\n                            borderColor: '#fff',\n                            borderWidth: 2\n                        }\n                    }\n                ]\n            });\n            \n            // 更新在贷余额图表\n            amountChart.setOption({\n                title: {\n                    text: '在贷余额分布',\n                    left: 'center',\n                    textStyle: {\n                        fontSize: 16\n                    }\n                },\n                tooltip: {\n                    trigger: 'item',\n                    formatter: isMonthOverMonth ? \n                        '{b}: {c}%' : \n                        '{b}<br/>在贷余额: {c}万元<br/>占比: {d}%'\n                },\n                series: [\n                    {\n                        name: '在贷余额',\n                        type: 'pie',\n                        radius: '65%',\n                        center: ['50%', '55%'],\n                        data: isMonthOverMonth ? \n                            data.interestRateRanges.map((range, index) => ({\n                                name: range, \n                                value: (parseFloat(chartData.mom.amount[index]) * 100).toFixed(2)\n                            })) : \n                            data.interestRateRanges.map((range, index) => ({\n                                name: range, \n                                value: chartData.normal.amount[index]\n                            })),\n                        emphasis: {\n                            itemStyle: {\n                                shadowBlur: 10,\n                                shadowOffsetX: 0,\n                                shadowColor: 'rgba(0, 0, 0, 0.5)'\n                            }\n                        },\n                        label: {\n                            formatter: isMonthOverMonth ? \n                                '{b}: {c}%' : \n                                '{b}: {d}%\\n{c}万元',\n                            lineHeight: 16\n                        },\n                        itemStyle: {\n                            borderRadius: 5,\n                            borderColor: '#fff',\n                            borderWidth: 2\n                        }\n                    }\n                ]\n            });\n            \n            // 更新数据表格\n            updateTable();\n        }\n        \n        // 更新数据表格\n        function updateTable() {\n            const tableBody = document.getElementById('summary-table').getElementsByTagName('tbody')[0];\n            tableBody.innerHTML = '';\n            \n            const chartData = data.productData[currentProduct][currentMonth];\n            \n            // 计算总计\n            const totalCount = chartData.normal.count.reduce((a, b) => parseInt(a) + parseInt(b), 0);\n            const totalAmount = chartData.normal.amount.reduce((a, b) => parseFloat(a) + parseFloat(b), 0);\n            \n            data.interestRateRanges.forEach((range, index) => {\n                const row = document.createElement('tr');\n                \n                // 利率区间\n                const rangeCell = document.createElement('td');\n                rangeCell.textContent = range;\n                row.appendChild(rangeCell);\n                \n                // 贷款笔数\n                const countCell = document.createElement('td');\n                countCell.textContent = chartData.normal.count[index].toLocaleString();\n                row.appendChild(countCell);\n                \n                // 贷款笔数占比\n                const countPercentCell = document.createElement('td');\n                const countPercent = (chartData.normal.count[index] / totalCount * 100).toFixed(2);\n                countPercentCell.textContent = countPercent + '%';\n                row.appendChild(countPercentCell);\n                \n                // 贷款笔数环比\n                const countMomCell = document.createElement('td');\n                const countMom = (parseFloat(chartData.mom.count[index]) * 100).toFixed(2);\n                countMomCell.textContent = countMom + '%';\n                countMomCell.className = parseFloat(countMom) >= 0 ? 'positive-mom' : 'negative-mom';\n                row.appendChild(countMomCell);\n                \n                // 在贷余额\n                const amountCell = document.createElement('td');\n                amountCell.textContent = formatCurrency(chartData.normal.amount[index]);\n                row.appendChild(amountCell);\n                \n                // 在贷余额占比\n                const amountPercentCell = document.createElement('td');\n                const amountPercent = (parseFloat(chartData.normal.amount[index]) / totalAmount * 100).toFixed(2);\n                amountPercentCell.textContent = amountPercent + '%';\n                row.appendChild(amountPercentCell);\n                \n                // 在贷余额环比\n                const amountMomCell = document.createElement('td');\n                const amountMom = (parseFloat(chartData.mom.amount[index]) * 100).toFixed(2);\n                amountMomCell.textContent = amountMom + '%';\n                amountMomCell.className = parseFloat(amountMom) >= 0 ? 'positive-mom' : 'negative-mom';\n                row.appendChild(amountMomCell);\n                \n                tableBody.appendChild(row);\n            });\n        }\n        \n        // 产品选择器事件\n        document.getElementById('product-selector').addEventListener('change', function() {\n            currentProduct = this.value;\n            updateCharts();\n        });\n        \n        // 月份选择器事件\n        document.getElementById('month-selector').addEventListener('change', function() {\n            currentMonth = this.value;\n            updateCharts();\n        });\n        \n        // 当前数据按钮事件\n        document.getElementById('normal-btn').addEventListener('click', function() {\n            if (currentMode !== 'normal') {\n                currentMode = 'normal';\n                this.classList.add('active');\n                document.getElementById('mom-btn').classList.remove('active');\n                updateCharts();\n            }\n        });\n        \n        // 环比数据按钮事件\n        document.getElementById('mom-btn').addEventListener('click', function() {\n            if (currentMode !== 'mom') {\n                currentMode = 'mom';\n                this.classList.add('active');\n                document.getElementById('normal-btn').classList.remove('active');\n                updateCharts();\n            }\n        });\n        \n        // 初始更新图表\n        updateCharts();\n        \n        // 窗口调整时重绘图表\n        window.addEventListener('resize', function() {\n            mainChart.resize();\n            countChart.resize();\n            amountChart.resize();\n        });\n    <\/script>\n</body>\n</html> ","term-chart-detail.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>期限分布详情</title>\n    <script src=\"https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js\"><\/script>\n    <style>\n        body {\n            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;\n            background-color: #f8f9fa;\n            color: #333;\n            margin: 0;\n            padding: 0;\n        }\n        .container {\n            max-width: 1800px;\n            margin: 0 auto;\n            padding: 20px;\n        }\n        .header {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            margin-bottom: 20px;\n            border-bottom: 1px solid #653eb3;\n            padding-bottom: 15px;\n        }\n        .title {\n            font-size: 24px;\n            font-weight: bold;\n            color: #653eb3;\n        }\n        .back-link {\n            text-decoration: none;\n            color: #5B8FF9;\n            font-size: 16px;\n        }\n        .control-panel {\n            display: flex;\n            justify-content: space-between;\n            margin-bottom: 20px;\n            align-items: center;\n            flex-wrap: wrap;\n        }\n        .filters, .toggle-buttons {\n            display: flex;\n            align-items: center;\n            gap: 10px;\n            margin: 10px 0;\n        }\n        .product-selector, .month-selector, .toggle-btn {\n            background-color: #f5f7fa;\n            border: 1px solid #dcdfe6;\n            border-radius: 4px;\n            padding: 8px 12px;\n            font-size: 14px;\n            cursor: pointer;\n            transition: all 0.3s;\n        }\n        .product-selector, .month-selector {\n            min-width: 120px;\n        }\n        .toggle-btn:hover, .product-selector:hover, .month-selector:hover {\n            background-color: #e6f1fc;\n            border-color: #a0cfff;\n            color: #409eff;\n        }\n        .toggle-btn.active {\n            background-color: #409eff;\n            border-color: #409eff;\n            color: #fff;\n        }\n        .filter-label {\n            font-weight: bold;\n            margin-right: 5px;\n        }\n        .chart-container {\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            margin-bottom: 20px;\n            overflow: hidden;\n        }\n        .chart-header {\n            padding: 15px 20px;\n            border-bottom: 1px solid #eee;\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n        }\n        .chart-title {\n            font-size: 18px;\n            font-weight: bold;\n        }\n        .chart-body {\n            padding: 20px;\n            height: 400px;\n        }\n        .comparison-charts {\n            display: flex;\n            flex-wrap: wrap;\n            gap: 20px;\n        }\n        .comparison-chart {\n            flex: 1;\n            min-width: 300px;\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            margin-bottom: 20px;\n        }\n        .comparison-chart-body {\n            padding: 20px;\n            height: 300px;\n        }\n        .summary-table {\n            width: 100%;\n            border-collapse: collapse;\n            margin-top: 20px;\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            overflow: hidden;\n        }\n        .summary-table th, .summary-table td {\n            padding: 12px 15px;\n            text-align: left;\n            border-bottom: 1px solid #eee;\n        }\n        .summary-table th {\n            background-color: #f5f7fa;\n            font-weight: bold;\n        }\n        .summary-table tr:last-child td {\n            border-bottom: none;\n        }\n        .positive-mom {\n            color: #67C23A;\n        }\n        .negative-mom {\n            color: #F56C6C;\n        }\n        .hidden {\n            display: none;\n        }\n        \n        @media (max-width: 991px) {\n            .comparison-charts {\n                flex-direction: column;\n            }\n            .comparison-chart {\n                width: 100%;\n            }\n            .filters, .toggle-buttons {\n                flex-wrap: wrap;\n            }\n        }\n        \n        @media (max-width: 767px) {\n            .control-panel {\n                flex-direction: column;\n                align-items: flex-start;\n            }\n            .chart-body {\n                height: 300px;\n            }\n            .comparison-chart-body {\n                height: 250px;\n            }\n            .product-selector, .month-selector {\n                width: 100%;\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"header\">\n            <div class=\"title\">期限分布详情</div>\n            <a href=\"dashboard.html\" class=\"back-link\">返回看板</a>\n        </div>\n        \n        <div class=\"control-panel\">\n            <div class=\"filters\">\n                <span class=\"filter-label\">产品:</span>\n                <select id=\"product-selector\" class=\"product-selector\">\n                    <option value=\"all\">全部产品</option>\n                    <option value=\"小微保\">小微保</option>\n                    <option value=\"小微保专项\">小微保专项</option>\n                    <option value=\"小微保旺季\">小微保旺季</option>\n                    <option value=\"发薪贷\">发薪贷</option>\n                    <option value=\"秒贷\">秒贷</option>\n                    <option value=\"电商贷\">电商贷</option>\n                </select>\n                \n                <span class=\"filter-label\">月份:</span>\n                <select id=\"month-selector\" class=\"month-selector\">\n                    <option value=\"202312\">2023年12月</option>\n                    <option value=\"202401\">2024年01月</option>\n                    <option value=\"202402\">2024年02月</option>\n                    <option value=\"202403\">2024年03月</option>\n                    <option value=\"202404\" selected>2024年04月</option>\n                    <option value=\"202405\">2024年05月</option>\n                </select>\n            </div>\n            \n            <div class=\"toggle-buttons\">\n                <button id=\"normal-btn\" class=\"toggle-btn active\">当前数据</button>\n                <button id=\"mom-btn\" class=\"toggle-btn\">环比数据</button>\n            </div>\n        </div>\n        \n        <div class=\"chart-container\">\n            <div class=\"chart-header\">\n                <div class=\"chart-title\">期限分布（按贷款期限区间）</div>\n            </div>\n            <div class=\"chart-body\" id=\"main-chart\"></div>\n        </div>\n        \n        <div class=\"comparison-charts\" id=\"comparison-charts\">\n            <div class=\"comparison-chart\">\n                <div class=\"chart-header\">\n                    <div class=\"chart-title\">贷款笔数分布</div>\n                </div>\n                <div class=\"comparison-chart-body\" id=\"count-chart\"></div>\n            </div>\n            \n            <div class=\"comparison-chart\">\n                <div class=\"chart-header\">\n                    <div class=\"chart-title\">在贷余额分布</div>\n                </div>\n                <div class=\"comparison-chart-body\" id=\"amount-chart\"></div>\n            </div>\n        </div>\n        \n        <table class=\"summary-table\" id=\"summary-table\">\n            <thead>\n                <tr>\n                    <th>期限区间</th>\n                    <th>贷款笔数</th>\n                    <th>贷款笔数占比</th>\n                    <th>贷款笔数环比</th>\n                    <th>在贷余额(万元)</th>\n                    <th>在贷余额占比</th>\n                    <th>在贷余额环比</th>\n                </tr>\n            </thead>\n            <tbody>\n                <!-- 数据将通过JavaScript动态填充 -->\n            </tbody>\n        </table>\n    </div>\n    \n    <script>\n        // 格式化货币\n        function formatCurrency(value) {\n            return parseFloat(value).toLocaleString('zh-CN', {\n                minimumFractionDigits: 2,\n                maximumFractionDigits: 2\n            });\n        }\n        \n        // 格式化百分比\n        function formatPercent(value) {\n            return parseFloat(value).toFixed(2) + '%';\n        }\n        \n        // 获取URL参数\n        function getUrlParams() {\n            const params = {};\n            const queryString = window.location.search.substring(1);\n            const pairs = queryString.split('&');\n            \n            for (let i = 0; i < pairs.length; i++) {\n                const pair = pairs[i].split('=');\n                params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');\n            }\n            \n            return params;\n        }\n        \n        // 生成随机数据\n        function generateRandomData() {\n            // 期限区间\n            const termRanges = ['1个月以内', '1-3月', '3-6月', '6-9月', '9-12月', '12-24月', '24-36月', '36月以上'];\n            \n            // 产品列表\n            const products = ['小微保', '小微保专项', '小微保旺季', '发薪贷', '秒贷', '电商贷'];\n            \n            // 月份列表\n            const months = ['202312', '202401', '202402', '202403', '202404', '202405'];\n            \n            // 按产品和月份生成随机数据\n            const productData = {};\n            \n            // 为全部产品创建汇总数据\n            productData['all'] = {};\n            \n            months.forEach(month => {\n                productData['all'][month] = {\n                    normal: {\n                        count: termRanges.map(() => 0),\n                        amount: termRanges.map(() => 0)\n                    },\n                    mom: {\n                        count: termRanges.map(() => 0),\n                        amount: termRanges.map(() => 0)\n                    }\n                };\n            });\n            \n            // 为每个产品生成随机数据\n            products.forEach(product => {\n                productData[product] = {};\n                \n                months.forEach(month => {\n                    // 为每个月生成随机数据\n                    const counts = termRanges.map(() => Math.floor(Math.random() * 1000) + 100);\n                    const amounts = termRanges.map(() => (Math.random() * 5000 + 1000).toFixed(2));\n                    \n                    // 生成环比数据（-20%到+20%）\n                    const countMoms = termRanges.map(() => ((Math.random() * 40 - 20) / 100).toFixed(4));\n                    const amountMoms = termRanges.map(() => ((Math.random() * 40 - 20) / 100).toFixed(4));\n                    \n                    productData[product][month] = {\n                        normal: {\n                            count: counts,\n                            amount: amounts\n                        },\n                        mom: {\n                            count: countMoms,\n                            amount: amountMoms\n                        }\n                    };\n                    \n                    // 累加到全部产品\n                    for (let i = 0; i < termRanges.length; i++) {\n                        productData['all'][month].normal.count[i] += counts[i];\n                        productData['all'][month].normal.amount[i] = (parseFloat(productData['all'][month].normal.amount[i]) + parseFloat(amounts[i])).toFixed(2);\n                        \n                        // 全部产品的环比是加权平均\n                        const totalCount = productData['all'][month].normal.count.reduce((a, b) => a + b, 0);\n                        const totalAmount = productData['all'][month].normal.amount.reduce((a, b) => parseFloat(a) + parseFloat(b), 0);\n                        \n                        productData['all'][month].mom.count[i] = (counts[i] / totalCount * parseFloat(countMoms[i])).toFixed(4);\n                        productData['all'][month].mom.amount[i] = (parseFloat(amounts[i]) / totalAmount * parseFloat(amountMoms[i])).toFixed(4);\n                    }\n                });\n            });\n            \n            return {\n                termRanges: termRanges,\n                productData: productData\n            };\n        }\n        \n        // 初始化图表\n        let mainChart = echarts.init(document.getElementById('main-chart'));\n        let countChart = echarts.init(document.getElementById('count-chart'));\n        let amountChart = echarts.init(document.getElementById('amount-chart'));\n        \n        // 生成随机数据\n        const data = generateRandomData();\n        \n        // 获取URL参数\n        const urlParams = getUrlParams();\n        \n        // 当前选择\n        let currentProduct = 'all';\n        let currentMonth = urlParams.month || '202404'; // 从URL参数获取月份，如果没有则使用默认值\n        let currentMode = 'normal'; // normal 或 mom\n        \n        // 设置月份选择器的默认值\n        document.getElementById('month-selector').value = currentMonth;\n        \n        // 更新图表\n        function updateCharts() {\n            const productName = currentProduct === 'all' ? '全部产品' : currentProduct;\n            const chartData = data.productData[currentProduct][currentMonth];\n            const isMonthOverMonth = currentMode === 'mom';\n            \n            // 控制饼图显示/隐藏\n            const comparisonChartsElement = document.getElementById('comparison-charts');\n            if (isMonthOverMonth) {\n                comparisonChartsElement.classList.add('hidden');\n            } else {\n                comparisonChartsElement.classList.remove('hidden');\n            }\n            \n            // 颜色配置\n            const colors = {\n                primary: '#5B8FF9',\n                secondary: '#61DDAA',\n                accent: '#65789B'\n            };\n            \n            // 更新主图表\n            let mainChartOption;\n            \n            if (isMonthOverMonth) {\n                // 环比模式图表配置\n                mainChartOption = {\n                    title: {\n                        text: `${productName} - ${currentMonth.substring(0, 4)}年${currentMonth.substring(4, 6)}月`,\n                        left: 'center',\n                        textStyle: {\n                            fontSize: 16\n                        },\n                        subtextStyle: {\n                            fontSize: 12\n                        }\n                    },\n                    tooltip: {\n                        trigger: 'axis',\n                        axisPointer: {\n                            type: 'shadow'\n                        },\n                        formatter: function(params) {\n                            const range = params[0].axisValue;\n                            const countValue = params[0].value;\n                            const amountValue = params[1].value;\n                            \n                            return `${range}<br/>贷款笔数环比: ${formatPercent(countValue)}<br/>在贷余额环比: ${formatPercent(amountValue)}`;\n                        }\n                    },\n                    legend: {\n                        data: ['贷款笔数环比', '在贷余额环比'],\n                        top: 30\n                    },\n                    grid: {\n                        left: '3%',\n                        right: '5%',\n                        bottom: '3%',\n                        top: 80,\n                        containLabel: true\n                    },\n                    xAxis: {\n                        type: 'category',\n                        data: data.termRanges,\n                        axisLine: {\n                            lineStyle: {\n                                color: '#ddd'\n                            }\n                        },\n                        axisLabel: {\n                            color: '#666',\n                            interval: 0,\n                            rotate: 30\n                        }\n                    },\n                    yAxis: {\n                        type: 'value',\n                        name: '环比(%)',\n                        axisLine: {\n                            show: true,\n                            lineStyle: {\n                                color: '#333'\n                            }\n                        },\n                        axisLabel: {\n                            formatter: '{value}%'\n                        },\n                        splitLine: {\n                            lineStyle: {\n                                color: '#eee'\n                            }\n                        }\n                    },\n                    series: [\n                        {\n                            name: '贷款笔数环比',\n                            type: 'bar',\n                            data: chartData.mom.count.map(val => (parseFloat(val) * 100).toFixed(2)),\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.primary,\n                                borderRadius: 4\n                            },\n                            barGap: '30%'\n                        },\n                        {\n                            name: '在贷余额环比',\n                            type: 'bar',\n                            data: chartData.mom.amount.map(val => (parseFloat(val) * 100).toFixed(2)),\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.secondary,\n                                borderRadius: 4\n                            }\n                        }\n                    ]\n                };\n            } else {\n                // 正常模式图表配置\n                mainChartOption = {\n                    title: {\n                        text: `${productName} - ${currentMonth.substring(0, 4)}年${currentMonth.substring(4, 6)}月`,\n                        left: 'center',\n                        textStyle: {\n                            fontSize: 16\n                        },\n                        subtextStyle: {\n                            fontSize: 12\n                        }\n                    },\n                    tooltip: {\n                        trigger: 'axis',\n                        axisPointer: {\n                            type: 'shadow'\n                        },\n                        formatter: function(params) {\n                            const range = params[0].axisValue;\n                            const countValue = params[0].value;\n                            const amountValue = params[1].value;\n                            \n                            return `${range}<br/>贷款笔数: ${countValue}笔<br/>在贷余额: ${formatCurrency(amountValue)}万元`;\n                        }\n                    },\n                    legend: {\n                        data: ['贷款笔数', '在贷余额(万元)'],\n                        top: 30\n                    },\n                    grid: {\n                        left: '3%',\n                        right: '5%',\n                        bottom: '3%',\n                        top: 80,\n                        containLabel: true\n                    },\n                    xAxis: {\n                        type: 'category',\n                        data: data.termRanges,\n                        axisLine: {\n                            lineStyle: {\n                                color: '#ddd'\n                            }\n                        },\n                        axisLabel: {\n                            color: '#666',\n                            interval: 0,\n                            rotate: 30\n                        }\n                    },\n                    yAxis: [\n                        {\n                            type: 'value',\n                            name: '贷款笔数(笔)',\n                            position: 'left',\n                            axisLine: {\n                                show: true,\n                                lineStyle: {\n                                    color: colors.primary\n                                }\n                            },\n                            axisLabel: {\n                                formatter: '{value}'\n                            },\n                            splitLine: {\n                                lineStyle: {\n                                    color: '#eee'\n                                }\n                            },\n                            min: 0\n                        },\n                        {\n                            type: 'value',\n                            name: '在贷余额(万元)',\n                            position: 'right',\n                            axisLine: {\n                                show: true,\n                                lineStyle: {\n                                    color: colors.secondary\n                                }\n                            },\n                            axisLabel: {\n                                formatter: '{value}'\n                            },\n                            splitLine: {\n                                show: false\n                            },\n                            min: 0\n                        }\n                    ],\n                    series: [\n                        {\n                            name: '贷款笔数',\n                            type: 'bar',\n                            data: chartData.normal.count,\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.primary,\n                                borderRadius: 4\n                            }\n                        },\n                        {\n                            name: '在贷余额(万元)',\n                            type: 'bar',\n                            yAxisIndex: 1,\n                            data: chartData.normal.amount,\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.secondary,\n                                borderRadius: 4\n                            }\n                        }\n                    ]\n                };\n            }\n            \n            mainChart.setOption(mainChartOption, true);\n            \n            // 更新贷款笔数图表\n            countChart.setOption({\n                title: {\n                    text: '贷款笔数分布',\n                    left: 'center',\n                    textStyle: {\n                        fontSize: 16\n                    }\n                },\n                tooltip: {\n                    trigger: 'item',\n                    formatter: isMonthOverMonth ? \n                        '{b}: {c}%' : \n                        '{b}<br/>贷款笔数: {c}笔<br/>占比: {d}%'\n                },\n                series: [\n                    {\n                        name: '贷款笔数',\n                        type: 'pie',\n                        radius: '65%',\n                        center: ['50%', '55%'],\n                        data: isMonthOverMonth ? \n                            data.termRanges.map((range, index) => ({\n                                name: range, \n                                value: (parseFloat(chartData.mom.count[index]) * 100).toFixed(2)\n                            })) : \n                            data.termRanges.map((range, index) => ({\n                                name: range, \n                                value: chartData.normal.count[index]\n                            })),\n                        emphasis: {\n                            itemStyle: {\n                                shadowBlur: 10,\n                                shadowOffsetX: 0,\n                                shadowColor: 'rgba(0, 0, 0, 0.5)'\n                            }\n                        },\n                        label: {\n                            formatter: isMonthOverMonth ? \n                                '{b}: {c}%' : \n                                '{b}: {d}%\\n{c}笔',\n                            lineHeight: 16\n                        },\n                        itemStyle: {\n                            borderRadius: 5,\n                            borderColor: '#fff',\n                            borderWidth: 2\n                        }\n                    }\n                ]\n            });\n            \n            // 更新在贷余额图表\n            amountChart.setOption({\n                title: {\n                    text: '在贷余额分布',\n                    left: 'center',\n                    textStyle: {\n                        fontSize: 16\n                    }\n                },\n                tooltip: {\n                    trigger: 'item',\n                    formatter: isMonthOverMonth ? \n                        '{b}: {c}%' : \n                        '{b}<br/>在贷余额: {c}万元<br/>占比: {d}%'\n                },\n                series: [\n                    {\n                        name: '在贷余额',\n                        type: 'pie',\n                        radius: '65%',\n                        center: ['50%', '55%'],\n                        data: isMonthOverMonth ? \n                            data.termRanges.map((range, index) => ({\n                                name: range, \n                                value: (parseFloat(chartData.mom.amount[index]) * 100).toFixed(2)\n                            })) : \n                            data.termRanges.map((range, index) => ({\n                                name: range, \n                                value: chartData.normal.amount[index]\n                            })),\n                        emphasis: {\n                            itemStyle: {\n                                shadowBlur: 10,\n                                shadowOffsetX: 0,\n                                shadowColor: 'rgba(0, 0, 0, 0.5)'\n                            }\n                        },\n                        label: {\n                            formatter: isMonthOverMonth ? \n                                '{b}: {c}%' : \n                                '{b}: {d}%\\n{c}万元',\n                            lineHeight: 16\n                        },\n                        itemStyle: {\n                            borderRadius: 5,\n                            borderColor: '#fff',\n                            borderWidth: 2\n                        }\n                    }\n                ]\n            });\n            \n            // 更新数据表格\n            updateTable();\n        }\n        \n        // 更新数据表格\n        function updateTable() {\n            const tableBody = document.getElementById('summary-table').getElementsByTagName('tbody')[0];\n            tableBody.innerHTML = '';\n            \n            const chartData = data.productData[currentProduct][currentMonth];\n            \n            // 计算总计\n            const totalCount = chartData.normal.count.reduce((a, b) => parseInt(a) + parseInt(b), 0);\n            const totalAmount = chartData.normal.amount.reduce((a, b) => parseFloat(a) + parseFloat(b), 0);\n            \n            data.termRanges.forEach((range, index) => {\n                const row = document.createElement('tr');\n                \n                // 期限区间\n                const rangeCell = document.createElement('td');\n                rangeCell.textContent = range;\n                row.appendChild(rangeCell);\n                \n                // 贷款笔数\n                const countCell = document.createElement('td');\n                countCell.textContent = chartData.normal.count[index].toLocaleString();\n                row.appendChild(countCell);\n                \n                // 贷款笔数占比\n                const countPercentCell = document.createElement('td');\n                const countPercent = (chartData.normal.count[index] / totalCount * 100).toFixed(2);\n                countPercentCell.textContent = countPercent + '%';\n                row.appendChild(countPercentCell);\n                \n                // 贷款笔数环比\n                const countMomCell = document.createElement('td');\n                const countMom = (parseFloat(chartData.mom.count[index]) * 100).toFixed(2);\n                countMomCell.textContent = countMom + '%';\n                countMomCell.className = parseFloat(countMom) >= 0 ? 'positive-mom' : 'negative-mom';\n                row.appendChild(countMomCell);\n                \n                // 在贷余额\n                const amountCell = document.createElement('td');\n                amountCell.textContent = formatCurrency(chartData.normal.amount[index]);\n                row.appendChild(amountCell);\n                \n                // 在贷余额占比\n                const amountPercentCell = document.createElement('td');\n                const amountPercent = (parseFloat(chartData.normal.amount[index]) / totalAmount * 100).toFixed(2);\n                amountPercentCell.textContent = amountPercent + '%';\n                row.appendChild(amountPercentCell);\n                \n                // 在贷余额环比\n                const amountMomCell = document.createElement('td');\n                const amountMom = (parseFloat(chartData.mom.amount[index]) * 100).toFixed(2);\n                amountMomCell.textContent = amountMom + '%';\n                amountMomCell.className = parseFloat(amountMom) >= 0 ? 'positive-mom' : 'negative-mom';\n                row.appendChild(amountMomCell);\n                \n                tableBody.appendChild(row);\n            });\n        }\n        \n        // 产品选择器事件\n        document.getElementById('product-selector').addEventListener('change', function() {\n            currentProduct = this.value;\n            updateCharts();\n        });\n        \n        // 月份选择器事件\n        document.getElementById('month-selector').addEventListener('change', function() {\n            currentMonth = this.value;\n            updateCharts();\n        });\n        \n        // 当前数据按钮事件\n        document.getElementById('normal-btn').addEventListener('click', function() {\n            if (currentMode !== 'normal') {\n                currentMode = 'normal';\n                this.classList.add('active');\n                document.getElementById('mom-btn').classList.remove('active');\n                updateCharts();\n            }\n        });\n        \n        // 环比数据按钮事件\n        document.getElementById('mom-btn').addEventListener('click', function() {\n            if (currentMode !== 'mom') {\n                currentMode = 'mom';\n                this.classList.add('active');\n                document.getElementById('normal-btn').classList.remove('active');\n                updateCharts();\n            }\n        });\n        \n        // 初始更新图表\n        updateCharts();\n        \n        // 窗口调整时重绘图表\n        window.addEventListener('resize', function() {\n            mainChart.resize();\n            countChart.resize();\n            amountChart.resize();\n        });\n    <\/script>\n</body>\n</html> ","average-amount-detail.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>笔均贷款金额分布详情</title>\n    <script src=\"https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js\"><\/script>\n    <style>\n        body {\n            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;\n            background-color: #f8f9fa;\n            color: #333;\n            margin: 0;\n            padding: 0;\n        }\n        .container {\n            max-width: 1800px;\n            margin: 0 auto;\n            padding: 20px;\n        }\n        .header {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            margin-bottom: 20px;\n            border-bottom: 1px solid #653eb3;\n            padding-bottom: 15px;\n        }\n        .title {\n            font-size: 24px;\n            font-weight: bold;\n            color: #653eb3;\n        }\n        .back-link {\n            text-decoration: none;\n            color: #5B8FF9;\n            font-size: 16px;\n        }\n        .control-panel {\n            display: flex;\n            justify-content: space-between;\n            margin-bottom: 20px;\n            align-items: center;\n            flex-wrap: wrap;\n        }\n        .filters, .toggle-buttons {\n            display: flex;\n            align-items: center;\n            gap: 10px;\n            margin: 10px 0;\n        }\n        .product-selector, .month-selector, .toggle-btn {\n            background-color: #f5f7fa;\n            border: 1px solid #dcdfe6;\n            border-radius: 4px;\n            padding: 8px 12px;\n            font-size: 14px;\n            cursor: pointer;\n            transition: all 0.3s;\n        }\n        .product-selector, .month-selector {\n            min-width: 120px;\n        }\n        .toggle-btn:hover, .product-selector:hover, .month-selector:hover {\n            background-color: #e6f1fc;\n            border-color: #a0cfff;\n            color: #409eff;\n        }\n        .toggle-btn.active {\n            background-color: #409eff;\n            border-color: #409eff;\n            color: #fff;\n        }\n        .filter-label {\n            font-weight: bold;\n            margin-right: 5px;\n        }\n        .chart-container {\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            margin-bottom: 20px;\n            overflow: hidden;\n        }\n        .chart-header {\n            padding: 15px 20px;\n            border-bottom: 1px solid #eee;\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n        }\n        .chart-title {\n            font-size: 18px;\n            font-weight: bold;\n        }\n        .chart-body {\n            padding: 20px;\n            height: 400px;\n        }\n        .comparison-charts {\n            display: flex;\n            flex-wrap: wrap;\n            gap: 20px;\n        }\n        .comparison-chart {\n            flex: 1;\n            min-width: 300px;\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            margin-bottom: 20px;\n        }\n        .comparison-chart-body {\n            padding: 20px;\n            height: 300px;\n        }\n        .summary-table {\n            width: 100%;\n            border-collapse: collapse;\n            margin-top: 20px;\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            overflow: hidden;\n        }\n        .summary-table th, .summary-table td {\n            padding: 12px 15px;\n            text-align: left;\n            border-bottom: 1px solid #eee;\n        }\n        .summary-table th {\n            background-color: #f5f7fa;\n            font-weight: bold;\n        }\n        .summary-table tr:last-child td {\n            border-bottom: none;\n        }\n        .positive-mom {\n            color: #67C23A;\n        }\n        .negative-mom {\n            color: #F56C6C;\n        }\n        .hidden {\n            display: none;\n        }\n        \n        @media (max-width: 991px) {\n            .comparison-charts {\n                flex-direction: column;\n            }\n            .comparison-chart {\n                width: 100%;\n            }\n            .filters, .toggle-buttons {\n                flex-wrap: wrap;\n            }\n        }\n        \n        @media (max-width: 767px) {\n            .control-panel {\n                flex-direction: column;\n                align-items: flex-start;\n            }\n            .chart-body {\n                height: 300px;\n            }\n            .comparison-chart-body {\n                height: 250px;\n            }\n            .product-selector, .month-selector {\n                width: 100%;\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"header\">\n            <div class=\"title\">笔均贷款金额分布详情</div>\n            <a href=\"dashboard.html\" class=\"back-link\">返回看板</a>\n        </div>\n        \n        <div class=\"control-panel\">\n            <div class=\"filters\">\n                <span class=\"filter-label\">产品:</span>\n                <select id=\"product-selector\" class=\"product-selector\">\n                    <option value=\"all\">全部产品</option>\n                    <option value=\"小微保\">小微保</option>\n                    <option value=\"小微保专项\">小微保专项</option>\n                    <option value=\"小微保旺季\">小微保旺季</option>\n                    <option value=\"发薪贷\">发薪贷</option>\n                    <option value=\"秒贷\">秒贷</option>\n                    <option value=\"电商贷\">电商贷</option>\n                </select>\n                \n                <span class=\"filter-label\">月份:</span>\n                <select id=\"month-selector\" class=\"month-selector\">\n                    <option value=\"202312\">2023年12月</option>\n                    <option value=\"202401\">2024年01月</option>\n                    <option value=\"202402\">2024年02月</option>\n                    <option value=\"202403\">2024年03月</option>\n                    <option value=\"202404\" selected>2024年04月</option>\n                    <option value=\"202405\">2024年05月</option>\n                </select>\n            </div>\n            \n            <div class=\"toggle-buttons\">\n                <button id=\"normal-btn\" class=\"toggle-btn active\">当前数据</button>\n                <button id=\"mom-btn\" class=\"toggle-btn\">环比数据</button>\n            </div>\n        </div>\n        \n        <div class=\"chart-container\">\n            <div class=\"chart-header\">\n                <div class=\"chart-title\">笔均贷款金额分布（按金额区间）</div>\n            </div>\n            <div class=\"chart-body\" id=\"main-chart\"></div>\n        </div>\n        \n        <div class=\"comparison-charts\" id=\"comparison-charts\">\n            <div class=\"comparison-chart\">\n                <div class=\"chart-header\">\n                    <div class=\"chart-title\">贷款笔数分布</div>\n                </div>\n                <div class=\"comparison-chart-body\" id=\"count-chart\"></div>\n            </div>\n            \n            <div class=\"comparison-chart\">\n                <div class=\"chart-header\">\n                    <div class=\"chart-title\">在贷余额分布</div>\n                </div>\n                <div class=\"comparison-chart-body\" id=\"amount-chart\"></div>\n            </div>\n        </div>\n        \n        <table class=\"summary-table\" id=\"summary-table\">\n            <thead>\n                <tr>\n                    <th>金额区间</th>\n                    <th>贷款笔数</th>\n                    <th>贷款笔数占比</th>\n                    <th>贷款笔数环比</th>\n                    <th>在贷余额(万元)</th>\n                    <th>在贷余额占比</th>\n                    <th>在贷余额环比</th>\n                </tr>\n            </thead>\n            <tbody>\n                <!-- 数据将通过JavaScript动态填充 -->\n            </tbody>\n        </table>\n    </div>\n    \n    <script>\n        // 格式化货币\n        function formatCurrency(value) {\n            return parseFloat(value).toLocaleString('zh-CN', {\n                minimumFractionDigits: 2,\n                maximumFractionDigits: 2\n            });\n        }\n        \n        // 格式化百分比\n        function formatPercent(value) {\n            return parseFloat(value).toFixed(2) + '%';\n        }\n        \n        // 生成随机数据\n        function generateRandomData() {\n            // 金额区间\n            const amountRanges = ['5万以下', '5-10万', '10-20万', '20-50万', '50-100万', '100-200万', '200万以上'];\n            \n            // 产品列表\n            const products = ['小微保', '小微保专项', '小微保旺季', '发薪贷', '秒贷', '电商贷'];\n            \n            // 月份列表\n            const months = ['202312', '202401', '202402', '202403', '202404', '202405'];\n            \n            // 按产品和月份生成随机数据\n            const productData = {};\n            \n            // 为全部产品创建汇总数据\n            productData['all'] = {};\n            \n            months.forEach(month => {\n                productData['all'][month] = {\n                    normal: {\n                        count: amountRanges.map(() => 0),\n                        amount: amountRanges.map(() => 0)\n                    },\n                    mom: {\n                        count: amountRanges.map(() => 0),\n                        amount: amountRanges.map(() => 0)\n                    }\n                };\n            });\n            \n            // 为每个产品生成随机数据\n            products.forEach(product => {\n                productData[product] = {};\n                \n                months.forEach(month => {\n                    // 为每个月生成随机数据\n                    const counts = amountRanges.map(() => Math.floor(Math.random() * 1000) + 100);\n                    const amounts = amountRanges.map(() => (Math.random() * 5000 + 1000).toFixed(2));\n                    \n                    // 生成环比数据（-20%到+20%）\n                    const countMoms = amountRanges.map(() => ((Math.random() * 40 - 20) / 100).toFixed(4));\n                    const amountMoms = amountRanges.map(() => ((Math.random() * 40 - 20) / 100).toFixed(4));\n                    \n                    productData[product][month] = {\n                        normal: {\n                            count: counts,\n                            amount: amounts\n                        },\n                        mom: {\n                            count: countMoms,\n                            amount: amountMoms\n                        }\n                    };\n                    \n                    // 累加到全部产品\n                    for (let i = 0; i < amountRanges.length; i++) {\n                        productData['all'][month].normal.count[i] += counts[i];\n                        productData['all'][month].normal.amount[i] = (parseFloat(productData['all'][month].normal.amount[i]) + parseFloat(amounts[i])).toFixed(2);\n                        \n                        // 全部产品的环比是加权平均\n                        const totalCount = productData['all'][month].normal.count.reduce((a, b) => a + b, 0);\n                        const totalAmount = productData['all'][month].normal.amount.reduce((a, b) => parseFloat(a) + parseFloat(b), 0);\n                        \n                        productData['all'][month].mom.count[i] = (counts[i] / totalCount * parseFloat(countMoms[i])).toFixed(4);\n                        productData['all'][month].mom.amount[i] = (parseFloat(amounts[i]) / totalAmount * parseFloat(amountMoms[i])).toFixed(4);\n                    }\n                });\n            });\n            \n            return {\n                amountRanges: amountRanges,\n                productData: productData\n            };\n        }\n        \n        // 初始化图表\n        let mainChart = echarts.init(document.getElementById('main-chart'));\n        let countChart = echarts.init(document.getElementById('count-chart'));\n        let amountChart = echarts.init(document.getElementById('amount-chart'));\n        \n        // 生成随机数据\n        const data = generateRandomData();\n        \n        // 当前选择\n        let currentProduct = 'all';\n        let currentMonth = '202404';\n        let currentMode = 'normal'; // normal 或 mom\n        \n        // 更新图表\n        function updateCharts() {\n            const productName = currentProduct === 'all' ? '全部产品' : currentProduct;\n            const chartData = data.productData[currentProduct][currentMonth];\n            const isMonthOverMonth = currentMode === 'mom';\n            \n            // 控制饼图显示/隐藏\n            const comparisonChartsElement = document.getElementById('comparison-charts');\n            if (isMonthOverMonth) {\n                comparisonChartsElement.classList.add('hidden');\n            } else {\n                comparisonChartsElement.classList.remove('hidden');\n            }\n            \n            // 颜色配置\n            const colors = {\n                primary: '#5B8FF9',\n                secondary: '#61DDAA',\n                accent: '#65789B'\n            };\n            \n            // 更新主图表\n            let mainChartOption;\n            \n            if (isMonthOverMonth) {\n                // 环比模式图表配置\n                mainChartOption = {\n                    title: {\n                        text: `${productName} - ${currentMonth.substring(0, 4)}年${currentMonth.substring(4, 6)}月`,\n                        left: 'center',\n                        textStyle: {\n                            fontSize: 16\n                        },\n                        subtextStyle: {\n                            fontSize: 12\n                        }\n                    },\n                    tooltip: {\n                        trigger: 'axis',\n                        axisPointer: {\n                            type: 'shadow'\n                        },\n                        formatter: function(params) {\n                            const range = params[0].axisValue;\n                            const countValue = params[0].value;\n                            const amountValue = params[1].value;\n                            \n                            return `${range}<br/>贷款笔数环比: ${formatPercent(countValue)}<br/>在贷余额环比: ${formatPercent(amountValue)}`;\n                        }\n                    },\n                    legend: {\n                        data: ['贷款笔数环比', '在贷余额环比'],\n                        top: 30\n                    },\n                    grid: {\n                        left: '3%',\n                        right: '5%',\n                        bottom: '3%',\n                        top: 80,\n                        containLabel: true\n                    },\n                    xAxis: {\n                        type: 'category',\n                        data: data.amountRanges,\n                        axisLine: {\n                            lineStyle: {\n                                color: '#ddd'\n                            }\n                        },\n                        axisLabel: {\n                            color: '#666'\n                        }\n                    },\n                    yAxis: {\n                        type: 'value',\n                        name: '环比(%)',\n                        axisLine: {\n                            show: true,\n                            lineStyle: {\n                                color: '#333'\n                            }\n                        },\n                        axisLabel: {\n                            formatter: '{value}%'\n                        },\n                        splitLine: {\n                            lineStyle: {\n                                color: '#eee'\n                            }\n                        }\n                    },\n                    series: [\n                        {\n                            name: '贷款笔数环比',\n                            type: 'bar',\n                            data: chartData.mom.count.map(val => (parseFloat(val) * 100).toFixed(2)),\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.primary,\n                                borderRadius: 4\n                            },\n                            barGap: '30%'\n                        },\n                        {\n                            name: '在贷余额环比',\n                            type: 'bar',\n                            data: chartData.mom.amount.map(val => (parseFloat(val) * 100).toFixed(2)),\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.secondary,\n                                borderRadius: 4\n                            }\n                        }\n                    ]\n                };\n            } else {\n                // 正常模式图表配置\n                mainChartOption = {\n                    title: {\n                        text: `${productName} - ${currentMonth.substring(0, 4)}年${currentMonth.substring(4, 6)}月`,\n                        left: 'center',\n                        textStyle: {\n                            fontSize: 16\n                        },\n                        subtextStyle: {\n                            fontSize: 12\n                        }\n                    },\n                    tooltip: {\n                        trigger: 'axis',\n                        axisPointer: {\n                            type: 'shadow'\n                        },\n                        formatter: function(params) {\n                            const range = params[0].axisValue;\n                            const countValue = params[0].value;\n                            const amountValue = params[1].value;\n                            \n                            return `${range}<br/>贷款笔数: ${countValue}笔<br/>在贷余额: ${formatCurrency(amountValue)}万元`;\n                        }\n                    },\n                    legend: {\n                        data: ['贷款笔数', '在贷余额(万元)'],\n                        top: 30\n                    },\n                    grid: {\n                        left: '3%',\n                        right: '5%',\n                        bottom: '3%',\n                        top: 80,\n                        containLabel: true\n                    },\n                    xAxis: {\n                        type: 'category',\n                        data: data.amountRanges,\n                        axisLine: {\n                            lineStyle: {\n                                color: '#ddd'\n                            }\n                        },\n                        axisLabel: {\n                            color: '#666'\n                        }\n                    },\n                    yAxis: [\n                        {\n                            type: 'value',\n                            name: '贷款笔数(笔)',\n                            position: 'left',\n                            axisLine: {\n                                show: true,\n                                lineStyle: {\n                                    color: colors.primary\n                                }\n                            },\n                            axisLabel: {\n                                formatter: '{value}'\n                            },\n                            splitLine: {\n                                lineStyle: {\n                                    color: '#eee'\n                                }\n                            },\n                            min: 0\n                        },\n                        {\n                            type: 'value',\n                            name: '在贷余额(万元)',\n                            position: 'right',\n                            axisLine: {\n                                show: true,\n                                lineStyle: {\n                                    color: colors.secondary\n                                }\n                            },\n                            axisLabel: {\n                                formatter: '{value}'\n                            },\n                            splitLine: {\n                                show: false\n                            },\n                            min: 0\n                        }\n                    ],\n                    series: [\n                        {\n                            name: '贷款笔数',\n                            type: 'bar',\n                            data: chartData.normal.count,\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.primary,\n                                borderRadius: 4\n                            }\n                        },\n                        {\n                            name: '在贷余额(万元)',\n                            type: 'bar',\n                            yAxisIndex: 1,\n                            data: chartData.normal.amount,\n                            label: {\n                                show: false\n                            },\n                            itemStyle: {\n                                color: colors.secondary,\n                                borderRadius: 4\n                            }\n                        }\n                    ]\n                };\n            }\n            \n            mainChart.setOption(mainChartOption, true);\n            \n            // 更新贷款笔数图表\n            countChart.setOption({\n                title: {\n                    text: '贷款笔数分布',\n                    left: 'center',\n                    textStyle: {\n                        fontSize: 16\n                    }\n                },\n                tooltip: {\n                    trigger: 'item',\n                    formatter: isMonthOverMonth ? \n                        '{b}: {c}%' : \n                        '{b}<br/>贷款笔数: {c}笔<br/>占比: {d}%'\n                },\n                series: [\n                    {\n                        name: '贷款笔数',\n                        type: 'pie',\n                        radius: '65%',\n                        center: ['50%', '55%'],\n                        data: isMonthOverMonth ? \n                            data.amountRanges.map((range, index) => ({\n                                name: range, \n                                value: (parseFloat(chartData.mom.count[index]) * 100).toFixed(2)\n                            })) : \n                            data.amountRanges.map((range, index) => ({\n                                name: range, \n                                value: chartData.normal.count[index]\n                            })),\n                        emphasis: {\n                            itemStyle: {\n                                shadowBlur: 10,\n                                shadowOffsetX: 0,\n                                shadowColor: 'rgba(0, 0, 0, 0.5)'\n                            }\n                        },\n                        label: {\n                            formatter: isMonthOverMonth ? \n                                '{b}: {c}%' : \n                                '{b}: {d}%\\n{c}笔',\n                            lineHeight: 16\n                        },\n                        itemStyle: {\n                            borderRadius: 5,\n                            borderColor: '#fff',\n                            borderWidth: 2\n                        }\n                    }\n                ]\n            });\n            \n            // 更新在贷余额图表\n            amountChart.setOption({\n                title: {\n                    text: '在贷余额分布',\n                    left: 'center',\n                    textStyle: {\n                        fontSize: 16\n                    }\n                },\n                tooltip: {\n                    trigger: 'item',\n                    formatter: isMonthOverMonth ? \n                        '{b}: {c}%' : \n                        '{b}<br/>在贷余额: {c}万元<br/>占比: {d}%'\n                },\n                series: [\n                    {\n                        name: '在贷余额',\n                        type: 'pie',\n                        radius: '65%',\n                        center: ['50%', '55%'],\n                        data: isMonthOverMonth ? \n                            data.amountRanges.map((range, index) => ({\n                                name: range, \n                                value: (parseFloat(chartData.mom.amount[index]) * 100).toFixed(2)\n                            })) : \n                            data.amountRanges.map((range, index) => ({\n                                name: range, \n                                value: chartData.normal.amount[index]\n                            })),\n                        emphasis: {\n                            itemStyle: {\n                                shadowBlur: 10,\n                                shadowOffsetX: 0,\n                                shadowColor: 'rgba(0, 0, 0, 0.5)'\n                            }\n                        },\n                        label: {\n                            formatter: isMonthOverMonth ? \n                                '{b}: {c}%' : \n                                '{b}: {d}%\\n{c}万元',\n                            lineHeight: 16\n                        },\n                        itemStyle: {\n                            borderRadius: 5,\n                            borderColor: '#fff',\n                            borderWidth: 2\n                        }\n                    }\n                ]\n            });\n            \n            // 更新数据表格\n            updateTable();\n        }\n        \n        // 更新数据表格\n        function updateTable() {\n            const tableBody = document.getElementById('summary-table').getElementsByTagName('tbody')[0];\n            tableBody.innerHTML = '';\n            \n            const chartData = data.productData[currentProduct][currentMonth];\n            \n            // 计算总计\n            const totalCount = chartData.normal.count.reduce((a, b) => parseInt(a) + parseInt(b), 0);\n            const totalAmount = chartData.normal.amount.reduce((a, b) => parseFloat(a) + parseFloat(b), 0);\n            \n            data.amountRanges.forEach((range, index) => {\n                const row = document.createElement('tr');\n                \n                // 金额区间\n                const rangeCell = document.createElement('td');\n                rangeCell.textContent = range;\n                row.appendChild(rangeCell);\n                \n                // 贷款笔数\n                const countCell = document.createElement('td');\n                countCell.textContent = chartData.normal.count[index].toLocaleString();\n                row.appendChild(countCell);\n                \n                // 贷款笔数占比\n                const countPercentCell = document.createElement('td');\n                const countPercent = (chartData.normal.count[index] / totalCount * 100).toFixed(2);\n                countPercentCell.textContent = countPercent + '%';\n                row.appendChild(countPercentCell);\n                \n                // 贷款笔数环比\n                const countMomCell = document.createElement('td');\n                const countMom = (parseFloat(chartData.mom.count[index]) * 100).toFixed(2);\n                countMomCell.textContent = countMom + '%';\n                countMomCell.className = parseFloat(countMom) >= 0 ? 'positive-mom' : 'negative-mom';\n                row.appendChild(countMomCell);\n                \n                // 在贷余额\n                const amountCell = document.createElement('td');\n                amountCell.textContent = formatCurrency(chartData.normal.amount[index]);\n                row.appendChild(amountCell);\n                \n                // 在贷余额占比\n                const amountPercentCell = document.createElement('td');\n                const amountPercent = (parseFloat(chartData.normal.amount[index]) / totalAmount * 100).toFixed(2);\n                amountPercentCell.textContent = amountPercent + '%';\n                row.appendChild(amountPercentCell);\n                \n                // 在贷余额环比\n                const amountMomCell = document.createElement('td');\n                const amountMom = (parseFloat(chartData.mom.amount[index]) * 100).toFixed(2);\n                amountMomCell.textContent = amountMom + '%';\n                amountMomCell.className = parseFloat(amountMom) >= 0 ? 'positive-mom' : 'negative-mom';\n                row.appendChild(amountMomCell);\n                \n                tableBody.appendChild(row);\n            });\n        }\n        \n        // 产品选择器事件\n        document.getElementById('product-selector').addEventListener('change', function() {\n            currentProduct = this.value;\n            updateCharts();\n        });\n        \n        // 月份选择器事件\n        document.getElementById('month-selector').addEventListener('change', function() {\n            currentMonth = this.value;\n            updateCharts();\n        });\n        \n        // 当前数据按钮事件\n        document.getElementById('normal-btn').addEventListener('click', function() {\n            if (currentMode !== 'normal') {\n                currentMode = 'normal';\n                this.classList.add('active');\n                document.getElementById('mom-btn').classList.remove('active');\n                updateCharts();\n            }\n        });\n        \n        // 环比数据按钮事件\n        document.getElementById('mom-btn').addEventListener('click', function() {\n            if (currentMode !== 'mom') {\n                currentMode = 'mom';\n                this.classList.add('active');\n                document.getElementById('normal-btn').classList.remove('active');\n                updateCharts();\n            }\n        });\n        \n        // 初始更新图表\n        updateCharts();\n        \n        // 窗口调整时重绘图表\n        window.addEventListener('resize', function() {\n            mainChart.resize();\n            countChart.resize();\n            amountChart.resize();\n        });\n    <\/script>\n</body>\n</html> ","geo-chart-detail.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>地理区域分布详情</title>\n    <script src=\"https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js\"><\/script>\n    <script src=\"https://cdn.jsdelivr.net/npm/echarts@5.4.3/map/js/china.js\"><\/script>\n    <style>\n        body {\n            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;\n            background-color: #f8f9fa;\n            color: #333;\n            margin: 0;\n            padding: 0;\n        }\n        .container {\n            max-width: 1800px;\n            margin: 0 auto;\n            padding: 20px;\n        }\n        .header {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            margin-bottom: 20px;\n            border-bottom: 1px solid #653eb3;\n            padding-bottom: 15px;\n        }\n        .title {\n            font-size: 24px;\n            font-weight: bold;\n            color: #653eb3;\n        }\n        .back-link {\n            text-decoration: none;\n            color: #5B8FF9;\n            font-size: 16px;\n        }\n        .control-panel {\n            display: flex;\n            justify-content: space-between;\n            margin-bottom: 20px;\n            align-items: center;\n            flex-wrap: wrap;\n        }\n        .filters, .toggle-buttons {\n            display: flex;\n            align-items: center;\n            gap: 10px;\n            margin: 10px 0;\n        }\n        .product-selector, .month-selector, .toggle-btn {\n            background-color: #f5f7fa;\n            border: 1px solid #dcdfe6;\n            border-radius: 4px;\n            padding: 8px 12px;\n            font-size: 14px;\n            cursor: pointer;\n            transition: all 0.3s;\n        }\n        .product-selector, .month-selector {\n            min-width: 120px;\n        }\n        .toggle-btn:hover, .product-selector:hover, .month-selector:hover {\n            background-color: #e6f1fc;\n            border-color: #a0cfff;\n            color: #409eff;\n        }\n        .toggle-btn.active {\n            background-color: #409eff;\n            border-color: #409eff;\n            color: #fff;\n        }\n        .filter-label {\n            font-weight: bold;\n            margin-right: 5px;\n        }\n        .chart-container {\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            margin-bottom: 20px;\n            overflow: hidden;\n        }\n        .chart-header {\n            padding: 15px 20px;\n            border-bottom: 1px solid #eee;\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n        }\n        .chart-title {\n            font-size: 18px;\n            font-weight: bold;\n        }\n        .chart-body {\n            padding: 20px;\n            height: 500px;\n        }\n        .comparison-charts {\n            display: flex;\n            flex-wrap: wrap;\n            gap: 20px;\n        }\n        .comparison-chart {\n            flex: 1;\n            min-width: 300px;\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            margin-bottom: 20px;\n        }\n        .comparison-chart-body {\n            padding: 20px;\n            height: 350px;\n        }\n        .summary-table {\n            width: 100%;\n            border-collapse: collapse;\n            margin-top: 20px;\n            background-color: #fff;\n            border-radius: 8px;\n            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);\n            overflow: hidden;\n        }\n        .summary-table th, .summary-table td {\n            padding: 12px 15px;\n            text-align: left;\n            border-bottom: 1px solid #eee;\n        }\n        .summary-table th {\n            background-color: #f5f7fa;\n            font-weight: bold;\n        }\n        .summary-table tr:last-child td {\n            border-bottom: none;\n        }\n        .positive-mom {\n            color: #67C23A;\n        }\n        .negative-mom {\n            color: #F56C6C;\n        }\n        .hidden {\n            display: none;\n        }\n        \n        @media (max-width: 991px) {\n            .comparison-charts {\n                flex-direction: column;\n            }\n            .comparison-chart {\n                width: 100%;\n            }\n            .filters, .toggle-buttons {\n                flex-wrap: wrap;\n            }\n        }\n        \n        @media (max-width: 767px) {\n            .control-panel {\n                flex-direction: column;\n                align-items: flex-start;\n            }\n            .chart-body {\n                height: 300px;\n            }\n            .comparison-chart-body {\n                height: 250px;\n            }\n            .product-selector, .month-selector {\n                width: 100%;\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"header\">\n            <div class=\"title\">地理区域分布详情</div>\n            <a href=\"dashboard.html\" class=\"back-link\">返回看板</a>\n        </div>\n        \n        <div class=\"control-panel\">\n            <div class=\"filters\">\n                <span class=\"filter-label\">产品:</span>\n                <select id=\"product-selector\" class=\"product-selector\">\n                    <option value=\"all\">全部产品</option>\n                    <option value=\"小微保\">小微保</option>\n                    <option value=\"小微保专项\">小微保专项</option>\n                    <option value=\"小微保旺季\">小微保旺季</option>\n                    <option value=\"发薪贷\">发薪贷</option>\n                    <option value=\"秒贷\">秒贷</option>\n                    <option value=\"电商贷\">电商贷</option>\n                </select>\n                \n                <span class=\"filter-label\">月份:</span>\n                <select id=\"month-selector\" class=\"month-selector\">\n                    <option value=\"202312\">2023年12月</option>\n                    <option value=\"202401\">2024年01月</option>\n                    <option value=\"202402\">2024年02月</option>\n                    <option value=\"202403\">2024年03月</option>\n
