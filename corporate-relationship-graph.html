/* ── Auto Layout ── */
function autoLayout(nodes,edges){
  var ent=nodes.find(function(n){return n.type==='ENTERPRISE'});
  if(!ent)return nodes;
  var cx=500,cy=320;
  var result=nodes.map(function(n){return Object.assign({},n)});
  var entN=result.find(function(n){return n.id===ent.id});
  entN.x=cx;entN.y=cy;
  /* Group by type */
  var persons=[],relations=[],platforms=[],shops=[],networks=[],others=[];
  result.forEach(function(n){
    if(n.id===ent.id)return;
    if(n.type==='PERSON')persons.push(n);
    else if(n.type==='RELATION')relations.push(n);
    else if(n.type==='PLATFORM')platforms.push(n);
    else if(n.type==='SHOP')shops.push(n);
    else if(n.type==='NETWORK')networks.push(n);
    else others.push(n);
  });
  function spread(arr,y,startX,gap){arr.forEach(function(n,i){n.x=startX+i*gap;n.y=y})}
  var pTotal=persons.length||1;
  spread(persons,cy-180,cx-(pTotal-1)*90,180);
  /* relations: spread under their connected person */
  relations.forEach(function(r,i){
    var linked=edges.find(function(e){return e.source===r.id||e.target===r.id});
    var parent=null;
    if(linked){var pid=linked.source===r.id?linked.target:linked.source;parent=result.find(function(n){return n.id===pid})}
    if(parent){r.x=parent.x+(i%2===0?-120:120);r.y=parent.y+(i%2===0?60:-60)}
    else{r.x=cx-200+i*120;r.y=cy-100}
  });
  spread(platforms,cy+170,cx-(((platforms.length||1)-1)*140)/2,140);
  var sTotal=shops.length||1;
  spread(shops,cy+310,cx-((sTotal-1)*140)/2,140);
  spread(networks,cy,cx+280,0);
  if(networks.length>1){var ns=networks.length;networks.forEach(function(n,i){n.x=cx+280;n.y=cy-60*(ns-1)/2+i*60})}
  spread(others,cy+100,cx+200,80);
  return result;
}

function App(){
  var _e=useState(false),isEdit=_e[0],setEdit=_e[1];
  var _n=useState(initN),nodes=_n[0],setNodes=_n[1];

  var svg=useRef(null);
  var _h=useState([{n:initN,e:initE}]),hist=_h[0],setHist=_h[1];
  var _i=useState(0),hi=_i[0],setHi=_i[1];

  var _tr=useState({x:0,y:0,k:1}),tr=_tr[0],setTr=_tr[1];
  var _bgDrag=useState(false),bgDrag=_bgDrag[0],setBgDrag=_bgDrag[1];

  var sv=useCallback(function(nn,ne){var nh=hist.slice(0,hi+1);nh.push({n:nn,e:ne});setHist(nh);setHi(nh.length-1)},[hist,hi]);
  function undo(){if(hi>0){setHi(hi-1);setNodes(hist[hi-1].n);setEdges(hist[hi-1].e)}}
  function redo(){if(hi<hist.length-1){setHi(hi+1);setNodes(hist[hi+1].n);setEdges(hist[hi+1].e)}}

  function onND(e,node){e.stopPropagation();if(isEdit)setDrag(node.id);setSel({type:'node',data:node})}
  
  function onCanvasDown(e){
    if(e.target.tagName==='svg'||e.target.className.includes('canvas-bg')){
      setBgDrag({x:e.clientX,y:e.clientY,tx:tr.x,ty:tr.y});
      setSel(null);
    }
  }

  function onMM(e){
    if(drag&&svg.current){
      var C=svg.current.getBoundingClientRect();
      setNodes(nodes.map(function(n){return n.id===drag?Object.assign({},n,{x:(e.clientX-C.left-tr.x)/tr.k,y:(e.clientY-C.top-tr.y)/tr.k}):n}));
    } else if(bgDrag){
      setTr(Object.assign({},tr,{x:bgDrag.tx+(e.clientX-bgDrag.x),y:bgDrag.ty+(e.clientY-bgDrag.y)}));
    }
  }
  
  function onMU(){
    if(drag){sv(nodes,edges);setDrag(null)}
    if(bgDrag)setBgDrag(false);
  }

  function onWheel(e){
    if(!svg.current)return;
    var C=svg.current.getBoundingClientRect();
    // Delta Y > 0 means scroll down (zoom out), Delta Y < 0 means scroll up (zoom in)
    var deltaK=e.deltaY>0?-0.1:0.1;
    var currentK=Math.round(tr.k*10)/10;
    var nk=Math.max(0.2,Math.min(2.5,currentK+deltaK));
    if(nk===tr.k)return;
    var ratio=nk/tr.k;
    var nx=e.clientX-C.left, ny=e.clientY-C.top;
    setTr({x:nx-(nx-tr.x)*ratio, y:ny-(ny-tr.y)*ratio, k:nk});
  }

  function onED(e,edge){e.stopPropagation();setSel({type:'edge',data:edge})}

  function addPerson(){
    if(!sel||sel.data.type!=='ENTERPRISE')return;
    var p=sel.data,nid='n_'+Date.now();
    var nn={id:nid,type:'PERSON',label:'新增人员',phone:'',idCard:'',role:'其他',notes:'',x:p.x+90,y:p.y-110};
    var ne={id:'e_'+Date.now(),source:nid,target:p.id,label:'其他',type:'PERSON_ENTERPRISE'};
    var ns=nodes.concat(nn),es=edges.concat(ne);setNodes(ns);setEdges(es);sv(ns,es);setSel({type:'node',data:nn});
  }
  function addRelation(){
    if(!sel||(sel.data.type!=='PERSON'&&sel.data.type!=='RELATION'))return;
    var p=sel.data,nid='n_'+Date.now();
    var nn={id:nid,type:'RELATION',label:'新增关系人',phone:'',idCard:'',role:'朋友',notes:'',x:p.x+100,y:p.y+80};
    var ne={id:'e_'+Date.now(),source:nid,target:p.id,label:'朋友',type:'PERSON_PERSON'};
    var ns=nodes.concat(nn),es=edges.concat(ne);setNodes(ns);setEdges(es);sv(ns,es);setSel({type:'node',data:nn});
  }

  /* 删除节点 (递归/拓扑) */
  function deleteNode(){
    if(!sel||sel.type!=='node')return;
    var nid=sel.data.id;
    if(sel.data.type==='ENTERPRISE')return; /* 企业不可删 */

    /* 1. 临时移除目标节点及其边 */
    var nextN = nodes.filter(function(n){return n.id!==nid});
    var nextE = edges.filter(function(e){return e.source!==nid && e.target!==nid});

    /* 2. 计算从根节点(企业)可达的所有节点 */
    var roots = nextN.filter(function(n){return n.type==='ENTERPRISE'}).map(function(n){return n.id});
    var reachable = [].concat(roots);
    var stack = [].concat(roots);

    while(stack.length > 0){
      var curr = stack.pop();
      nextE.forEach(function(e){
        var other = (e.source === curr) ? e.target : (e.target === curr ? e.source : null);
        if(other && !reachable.includes(other)){
          reachable.push(other);
          stack.push(other);
        }
      });
    }

    /* 3. 仅保留可达节点及其边 */
    var finalN = nextN.filter(function(n){return reachable.includes(n.id)});
    var finalE = nextE.filter(function(e){return reachable.includes(e.source) && reachable.includes(e.target)});

    setNodes(finalN);
    setEdges(finalE);
    sv(finalN, finalE);
    setSel(null);
  }

  /* 翻转边方向 */
  function flipEdge(){
    if(!sel||sel.type!=='edge')return;
    var ne=edges.map(function(e){return e.id===sel.data.id?Object.assign({},e,{source:e.target,target:e.source}):e});
    var flipped=ne.find(function(e){return e.id===sel.data.id});
    setEdges(ne);setSel({type:'edge',data:flipped});sv(nodes,ne);
  }

  function updN(u){
    var nn=nodes.map(function(n){return n.id===sel.data.id?Object.assign({},n,u):n});
    setNodes(nn);setSel({type:'node',data:Object.assign({},sel.data,u)});sv(nn,edges);
    if(u.role!==undefined){var ne2=edges.map(function(e){return e.source===sel.data.id?Object.assign({},e,{label:u.role}):e});setEdges(ne2);sv(nn,ne2)}
  }
  function updE(u){var ne=edges.map(function(e){return e.id===sel.data.id?Object.assign({},e,u):e});setEdges(ne);setSel({type:'edge',data:Object.assign({},sel.data,u)});sv(nodes,ne)}

  function doLayout(){var nn=autoLayout(nodes,edges);setNodes(nn);sv(nn,edges)}

  function eStyle(t){
    switch(t){
      case 'PERSON_PERSON':return{stroke:EC.PERSON_PERSON,dash:''};
      case 'PERSON_ENTERPRISE':return{stroke:EC.PERSON_ENTERPRISE,dash:''};
      case 'ENTERPRISE_NETWORK_NORMAL':return{stroke:EC.ENTERPRISE_NETWORK_NORMAL,dash:''};
      case 'ENTERPRISE_NETWORK_TRANSFER':return{stroke:EC.ENTERPRISE_NETWORK_TRANSFER,dash:'5,5'};
      default:return{stroke:EC.ENTERPRISE_PLATFORM||'#BFBFBF',dash:''};
    }
  }

  var canP=sel&&sel.type==='node'&&sel.data.type==='ENTERPRISE';
  var canR=sel&&sel.type==='node'&&(sel.data.type==='PERSON'||sel.data.type==='RELATION');
  var canDel=sel&&sel.type==='node'&&sel.data.type!=='ENTERPRISE'&&sel.data.type!=='NETWORK'&&sel.data.type!=='PLATFORM'&&sel.data.type!=='SHOP';
  var canSave=sel&&(sel.type==='edge'||(sel.type==='node'&&(sel.data.type==='PERSON'||sel.data.type==='RELATION')));
  var sc='#8A2BE2';
  /* Btn style helper */
  var btnS=function(active){return{display:'flex',alignItems:'center',justifyContent:'center',width:32,height:32,borderRadius:6,cursor:'pointer',border:'1px solid '+(active?'#8A2BE2':'#D9D9D9'),background:active?'#FAF5FF':'#fff'}};

  return h('div',{style:{display:'flex',flexDirection:'column',width:'100%',height:'100vh',backgroundColor:'#F0F2F5',fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",color:'#333',overflow:'hidden'}},

    /* ▸ Header — reference style */
    h('header',{style:{height:56,backgroundColor:'#fff',borderBottom:'1px solid #E8E8E8',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 24px',boxShadow:'0 1px 4px rgba(0,0,0,0.02)',zIndex:10,flexShrink:0}},
      h('div',{style:{display:'flex',alignItems:'center',gap:16}},
        h('div',{style:{fontSize:16,fontWeight:600,color:'#1F1F1F',display:'flex',alignItems:'center',gap:8}},h(IcoShare,{size:20,color:'#8A2BE2',sw:2}),'星辰服饰 — 关联图谱'),
        h('div',{style:{height:16,width:1,background:'#E8E8E8'}}),
        /* toolbar */
        h('div',{style:{display:'flex',alignItems:'center',gap:8}},
