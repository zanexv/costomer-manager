<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#23454;&#25511;&#20154;&#20449;&#24687;</title>
    <style>
        :root { --page-bg:#f8fafc; --card-bg:#fff; --shadow:0 2px 4px rgba(15,23,42,.08),0 10px 24px rgba(15,23,42,.04); --text:#1e293b; --sub:#64748b; --muted:#94a3b8; --border:#e2e8f0; --soft:#edf2f7; --purple:#8b5cf6; --purple-soft:#f5efff; --orange:#f97316; --green:#22c55e; --blue:#60a5fa; --row:#faf7ff; --surface:#f8fafc; --radius:12px; --radius-sm:6px; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:"PingFang SC","Microsoft YaHei",sans-serif; font-size:14px; line-height:1.5; color:var(--text); background:var(--page-bg); }
        .page { max-width:1160px; margin:0 auto; padding:20px; }
        .panel { margin-bottom:20px; padding:20px; border-radius:var(--radius); box-shadow:var(--shadow); background:var(--card-bg); }
        .section-header { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:16px; padding-left:8px; }
        .section-title { display:inline-flex; align-items:center; gap:10px; font-size:18px; font-weight:500; color:#111827; }
        .section-title::before { content:""; width:4px; height:18px; border-radius:999px; background:var(--purple); }
        .section-actions { display:flex; align-items:center; gap:12px; }
        .btn { appearance:none; border:1px solid transparent; min-width:70px; height:38px; padding:0 20px; border-radius:var(--radius-sm); font-size:14px; font-weight:500; cursor:pointer; transition:transform .16s ease, box-shadow .16s ease, background-color .16s ease, border-color .16s ease; }
        .btn:hover { transform:translateY(-1px); }
        .btn-primary { background:var(--purple); color:#fff; box-shadow:0 8px 20px rgba(139,92,246,.18); }
        .btn-secondary { background:#fff; color:var(--purple); border-color:#c4b5fd; }

        .basic-info-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px 16px; }
        .basic-info-item { min-height:82px; padding:14px 16px; border-radius:12px; border:1px solid var(--border); background:#fff; }
        .basic-info-item.editing { background:#fcfaff; border-color:#ddd6fe; box-shadow:0 0 0 1px rgba(196,181,253,.35); }
        .field-label { color:var(--sub); font-size:12px; margin-bottom:8px; }
        .field-value { color:#111827; font-size:14px; font-weight:500; word-break:break-word; }
        .field-control { width:100%; }
        .field-control input, .field-control select { width:100%; height:40px; padding:0 12px; border:1px solid #d8deea; border-radius:10px; background:#fff; }
        .field-control input:focus, .field-control select:focus { border-color:#c4b5fd; box-shadow:0 0 0 3px rgba(139,92,246,.12); }

        .asset-stack { display:grid; gap:20px; }
        .table-shell { border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; background:#fff; }
        .table-scroll { overflow-x:auto; }
        table { width:100%; min-width:1120px; border-collapse:collapse; }
        thead th { padding:14px 16px; background:#f8fafc; border-bottom:1px solid var(--border); text-align:left; white-space:nowrap; font-size:13px; font-weight:600; color:rgba(0,0,0,.88); }
        tbody td { padding:13px 16px; border-bottom:1px solid var(--soft); white-space:nowrap; vertical-align:middle; color:#111827; }
        tbody tr:last-child td { border-bottom:none; }
        tbody tr.view-row:hover { background:#fcfcff; }
        tbody tr.edit-row { background:var(--row); }
        .row-index { width:58px; color:#4b5563; }
        .input-cell input, .input-cell select { width:100%; height:34px; padding:0 10px; border:1px solid #d1d5db; border-radius:4px; outline:none; background:#fff; color:#111827; font-size:13px; }
        .input-cell input:focus, .input-cell select:focus { border-color:#c4b5fd; box-shadow:0 0 0 3px rgba(139,92,246,.12); }
        .action-col { width:84px; }
        .delete-btn { width:18px; height:18px; border:none; border-radius:50%; background:#9ca3af; color:#fff; font-size:12px; line-height:18px; text-align:center; cursor:pointer; }
        .delete-btn:hover { background:#7c8594; }
        .add-row-wrap { padding:8px 12px 12px; border-top:1px solid var(--soft); background:#fff; }
        .add-row-btn { width:100%; height:36px; border:1px dashed #d5d9e2; border-radius:var(--radius-sm); background:#fff; color:#8b8b8b; font-size:13px; cursor:pointer; }
        .add-row-btn:hover { border-color:#c4b5fd; color:var(--purple); background:#fcfaff; }
        .empty-tip { padding:24px 16px; text-align:center; color:var(--muted); }

        @media (max-width:1024px) {
            .basic-info-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
        }
        @media (max-width:640px) {
            .page { padding:16px; }
            .section-header { flex-direction:column; align-items:flex-start; }
            .section-actions { width:100%; justify-content:flex-end; }
            .basic-info-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
    <div class="page">
        <section class="panel">
            <div class="section-header">
                <h2 class="section-title">&#23454;&#25511;&#20154;&#22522;&#26412;&#20449;&#24687;</h2>
                <div class="section-actions" id="basicInfoActions"></div>
            </div>
            <div class="basic-info-grid" id="basicInfoGrid"></div>
        </section>

        <section class="panel">
            <div class="section-header">
                <h2 class="section-title">&#25151;&#20135;&#20449;&#24687;</h2>
                <div class="section-actions" id="propertyActions"></div>
            </div>
            <div class="table-shell">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th class="row-index">&#24207;&#21495;</th>
                                <th>&#36141;&#20080;&#24180;&#20221;</th>
                                <th>&#25151;&#20135;&#31867;&#22411;</th>
                                <th>&#38754;&#31215;&#65288;m&#178;&#65289;</th>
                                <th>&#36141;&#32622;&#20215;&#26684;&#65288;&#19975;&#20803;&#65289;</th>
                                <th>&#22320;&#22336;</th>
                                <th>&#25345;&#26377;&#20154;</th>
                                <th>&#25269;&#25276;&#24773;&#20917;</th>
                                <th>&#34701;&#36164;&#20313;&#39069;&#65288;&#19975;&#20803;&#65289;</th>
                                <th class="action-col">&#25805;&#20316;</th>
                            </tr>
                        </thead>
                        <tbody id="propertyTableBody"></tbody>
                    </table>
                </div>
                <div class="add-row-wrap" id="propertyAddWrap" hidden><button class="add-row-btn" type="button" id="addPropertyRowBtn">&#65291; &#28155;&#21152;&#19968;&#34892;&#25968;&#25454;</button></div>
            </div>
        </section>

        <section class="panel">
            <div class="section-header">
                <h2 class="section-title">&#36710;&#36742;&#20449;&#24687;</h2>
                <div class="section-actions" id="vehicleActions"></div>
            </div>
            <div class="table-shell">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th class="row-index">&#24207;&#21495;</th>
                                <th>&#36141;&#20080;&#26102;&#38388;</th>
                                <th>&#21697;&#29260;</th>
                                <th>&#31995;&#21015;</th>
                                <th>&#36141;&#32622;&#20215;&#26684;&#65288;&#19975;&#20803;/&#36742;&#65289;</th>
                                <th>&#25345;&#26377;&#20154;</th>
                                <th>&#25269;&#25276;&#24773;&#20917;</th>
                                <th>&#34701;&#36164;&#20313;&#39069;&#65288;&#19975;&#20803;&#65289;</th>
                                <th class="action-col">&#25805;&#20316;</th>
                            </tr>
                        </thead>
                        <tbody id="vehicleTableBody"></tbody>
                    </table>
                </div>
                <div class="add-row-wrap" id="vehicleAddWrap" hidden><button class="add-row-btn" type="button" id="addVehicleRowBtn">&#65291; &#28155;&#21152;&#19968;&#34892;&#25968;&#25454;</button></div>
            </div>
        </section>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const text = {
                male: "\u7537", female: "\u5973", yes: "\u662f", no: "\u5426",
                college: "\u5927\u4e13", bachelor: "\u672c\u79d1", master: "\u7855\u58eb", doctor: "\u535a\u58eb",
                noMortgage: "\u65e0\u62b5\u62bc", mortgaged: "\u5df2\u62b5\u62bc",
                land: "\u571f\u5730", factory: "\u5382\u623f", house: "\u623f\u4ea7",
                mixedFund: "\u6df7\u5408\u8d44\u91d1",
                edit: "\u7f16\u8f91", save: "\u4fdd\u5b58", cancel: "\u53d6\u6d88",
                emptyProperty: "\u6682\u65e0\u623f\u4ea7\u4fe1\u606f\u6570\u636e",
                emptyVehicle: "\u6682\u65e0\u8f66\u8f86\u4fe1\u606f\u6570\u636e"
            };

            const readonlyFields = [
                { key: "name", label: "\u5b9e\u63a7\u4eba\u59d3\u540d" },
                { key: "idCard", label: "\u8eab\u4efd\u8bc1\u53f7" },
                { key: "phone", label: "\u8054\u7cfb\u65b9\u5f0f" },
                { key: "age", label: "\u5e74\u9f84" },
                { key: "gender", label: "\u6027\u522b" }
            ];

            const editableFields = [
                { key: "address", label: "\u6237\u7c4d\u5730", type: "text" },
                { key: "education", label: "\u6700\u9ad8\u5b66\u5386", type: "select", options: [text.college, text.bachelor, text.master, text.doctor] },
                { key: "isTonglu", label: "\u662f\u5426\u6850\u5e90\u7cfb", type: "select", options: [text.yes, text.no] },
                { key: "hobby", label: "\u4e2a\u4eba\u7231\u597d", type: "text" },
                { key: "productPreference", label: "\u4ea7\u54c1\u504f\u597d", type: "text" },
                { key: "marketingPreference", label: "\u8425\u9500\u504f\u597d", type: "text" },
                { key: "connections", label: "\u4eba\u8109\u8d44\u6e90", type: "text" },
                { key: "backgroundResource", label: "\u80cc\u666f\u8d44\u6e90", type: "text" },
                { key: "relatedOutletCount", label: "\u5173\u8054\u7f51\u70b9\u6570", type: "text" }
            ];

            const state = {
                basic: {
                    values: {
                        name: "\u5f20\u4e09",
                        idCard: "888888888888888888",
                        phone: "18788888888",
                        age: "33",
                        gender: text.male,
                        address: "\u6e56\u5317\u7701",
                        education: text.college,
                        isTonglu: text.yes,
                        hobby: "\u542c\u7ecf\u4e66",
                        productPreference: "\u5229\u7387\u654f\u611f",
                        marketingPreference: "\u4f4e\u5229\u7387",
                        connections: "\u7701\u603b/\u603b\u90e8\u603b\u76d1\u7ea7",
                        backgroundResource: "\u653f\u5e9c\u5c42\u9762",
                        relatedOutletCount: "3"
                    },
                    editing: false,
                    snapshot: null
                },
                property: {
                    items: [
                        { id: 1, purchaseYear: "2024", propertyType: text.land, area: "300", purchasePrice: "2025", address: "\u5e02\u533a", holder: "\u674e\u56db", mortgage: text.noMortgage, financingBalance: "3" },
                        { id: 2, purchaseYear: "2025", propertyType: text.land, area: "300", purchasePrice: "3333", address: "\u5e02\u533a", holder: "\u674e\u56db", mortgage: text.noMortgage, financingBalance: "3" },
                        { id: 3, purchaseYear: "2025", propertyType: text.factory, area: "300", purchasePrice: "3333", address: "\u5e02\u533a", holder: "\u674e\u56db", mortgage: text.noMortgage, financingBalance: "3" },
                        { id: 4, purchaseYear: "2025", propertyType: text.house, area: "300", purchasePrice: "3333", address: "XX\u5e02XX\u533a", holder: "\u674e\u56db", mortgage: text.mortgaged, financingBalance: "3" }
                    ],
                    editing: false,
                    snapshot: null
                },
                vehicle: {
                    items: [
                        { id: 1, purchaseTime: "2024", brand: "\u672c\u7530", series: "CRV", purchasePrice: "33.33", holder: "\u5f20\u4e09", mortgage: text.noMortgage, financingBalance: "3" },
                        { id: 2, purchaseTime: "2021-2024", brand: "\u5954\u9a70", series: "AMG", purchasePrice: "33.33", holder: "\u5f20\u4e09", mortgage: text.noMortgage, financingBalance: "3" },
                        { id: 3, purchaseTime: "2021-2024", brand: "\u5965\u8fea", series: "RS", purchasePrice: "33.33", holder: "\u5f20\u4e09", mortgage: text.mortgaged, financingBalance: "3" },
                        { id: 4, purchaseTime: "2021-2024", brand: "\u5c0f\u7c73", series: "YU7", purchasePrice: "33.33", holder: "\u5f20\u4e09", mortgage: text.mortgaged, financingBalance: "3" }
                    ],
                    editing: false,
                    snapshot: null
                }
            };

            const basicInfoActions = document.getElementById("basicInfoActions");
            const basicInfoGrid = document.getElementById("basicInfoGrid");
            const propertyActions = document.getElementById("propertyActions");
            const vehicleActions = document.getElementById("vehicleActions");
            const propertyTableBody = document.getElementById("propertyTableBody");
            const vehicleTableBody = document.getElementById("vehicleTableBody");
            const propertyAddWrap = document.getElementById("propertyAddWrap");
            const vehicleAddWrap = document.getElementById("vehicleAddWrap");

            document.getElementById("addPropertyRowBtn").addEventListener("click", addPropertyRow);
            document.getElementById("addVehicleRowBtn").addEventListener("click", addVehicleRow);
            basicInfoActions.addEventListener("click", handleBasicActions);
            propertyActions.addEventListener("click", handleSectionActions("property"));
            vehicleActions.addEventListener("click", handleSectionActions("vehicle"));
            propertyTableBody.addEventListener("click", function (event) { const btn = event.target.closest("[data-delete-property]"); if (btn) deleteRow("property", Number(btn.dataset.deleteProperty)); });
            vehicleTableBody.addEventListener("click", function (event) { const btn = event.target.closest("[data-delete-vehicle]"); if (btn) deleteRow("vehicle", Number(btn.dataset.deleteVehicle)); });

            function clone(data) { return JSON.parse(JSON.stringify(data)); }
            function escapeHtml(value) { return String(value == null ? "" : value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
            function renumber(items) { items.forEach(function (item, index) { item.id = index + 1; }); }
            function buildSelect(field, index, sectionName, options, selected) { return "<select data-field=\"" + field + "\" data-index=\"" + index + "\" data-section=\"" + sectionName + "\">" + options.map(function (option) { return "<option value=\"" + escapeHtml(option) + "\"" + (option === selected ? " selected" : "") + ">" + escapeHtml(option) + "</option>"; }).join("") + "</select>"; }

            function handleBasicActions(event) {
                const action = event.target.dataset.action;
                if (action === "edit") enterBasicEdit();
                if (action === "cancel") cancelBasicEdit();
                if (action === "save") saveBasicEdit();
            }

            function handleSectionActions(sectionName) {
                return function (event) {
                    const action = event.target.dataset.action;
                    if (action === "edit") enterSectionEdit(sectionName);
                    if (action === "cancel") cancelSectionEdit(sectionName);
                    if (action === "save") saveSectionEdit(sectionName);
                };
            }

            function renderBasicActions() {
                basicInfoActions.innerHTML = state.basic.editing
                    ? "<button class=\"btn btn-secondary\" type=\"button\" data-action=\"cancel\">" + text.cancel + "</button><button class=\"btn btn-primary\" type=\"button\" data-action=\"save\">" + text.save + "</button>"
                    : "<button class=\"btn btn-primary\" type=\"button\" data-action=\"edit\">" + text.edit + "</button>";
            }

            function renderBasicGrid() {
                const readonlyMarkup = readonlyFields.map(function (field) {
                    return "<div class=\"basic-info-item\"><div class=\"field-label\">" + field.label + "</div><div class=\"field-value\">" + escapeHtml(state.basic.values[field.key]) + "</div></div>";
                }).join("");
                const editableMarkup = editableFields.map(function (field) {
                    const value = state.basic.values[field.key];
                    const control = state.basic.editing
                        ? (field.type === "select"
                            ? "<div class=\"field-control\"><select data-basic-field=\"" + field.key + "\">" + field.options.map(function (option) { return "<option value=\"" + escapeHtml(option) + "\"" + (option === value ? " selected" : "") + ">" + escapeHtml(option) + "</option>"; }).join("") + "</select></div>"
                            : "<div class=\"field-control\"><input data-basic-field=\"" + field.key + "\" value=\"" + escapeHtml(value) + "\"></div>")
                        : "<div class=\"field-value\">" + escapeHtml(value) + "</div>";
                    return "<div class=\"basic-info-item" + (state.basic.editing ? " editing" : "") + "\"><div class=\"field-label\">" + field.label + "</div>" + control + "</div>";
                }).join("");
                basicInfoGrid.innerHTML = readonlyMarkup + editableMarkup;
            }

            function syncBasicInputs() {
                basicInfoGrid.querySelectorAll("[data-basic-field]").forEach(function (input) {
                    state.basic.values[input.dataset.basicField] = input.value.trim();
                });
            }

            function enterBasicEdit() {
                if (state.basic.editing) return;
                state.basic.snapshot = clone(state.basic.values);
                state.basic.editing = true;
                renderBasicSection();
            }

            function cancelBasicEdit() {
                if (!state.basic.editing) return;
                state.basic.values = clone(state.basic.snapshot || state.basic.values);
                state.basic.snapshot = null;
                state.basic.editing = false;
                renderBasicSection();
            }

            function saveBasicEdit() {
                if (!state.basic.editing) return;
                syncBasicInputs();
                state.basic.snapshot = null;
                state.basic.editing = false;
                renderBasicSection();
            }

            function renderBasicSection() {
                renderBasicActions();
                renderBasicGrid();
            }

            function syncTableSection(sectionName) {
                document.querySelectorAll("[data-section=\"" + sectionName + "\"]").forEach(function (el) {
                    const index = Number(el.dataset.index);
                    const field = el.dataset.field;
                    if (state[sectionName].items[index]) {
                        state[sectionName].items[index][field] = el.value.trim();
                    }
                });
            }

            function syncEditingTables() {
                if (state.property.editing) syncTableSection("property");
                if (state.vehicle.editing) syncTableSection("vehicle");
            }

            function renderSectionActions(sectionName) {
                const target = sectionName === "property" ? propertyActions : vehicleActions;
                target.innerHTML = state[sectionName].editing
                    ? "<button class=\"btn btn-secondary\" type=\"button\" data-action=\"cancel\">" + text.cancel + "</button><button class=\"btn btn-primary\" type=\"button\" data-action=\"save\">" + text.save + "</button>"
                    : "<button class=\"btn btn-primary\" type=\"button\" data-action=\"edit\">" + text.edit + "</button>";
            }

            function renderPropertyTable() {
                renderSectionActions("property");
                propertyAddWrap.hidden = !state.property.editing;
                propertyTableBody.innerHTML = "";
                if (!state.property.items.length) { propertyTableBody.innerHTML = "<tr><td colspan=\"10\" class=\"empty-tip\">" + text.emptyProperty + "</td></tr>"; return; }
                state.property.items.forEach(function (item, index) {
                    const row = document.createElement("tr");
                    row.className = state.property.editing ? "edit-row" : "view-row";
                    row.innerHTML = state.property.editing ? [
                        "<td class=\"row-index\">" + item.id + "</td>",
                        "<td class=\"input-cell\"><input data-section=\"property\" data-index=\"" + index + "\" data-field=\"purchaseYear\" value=\"" + escapeHtml(item.purchaseYear) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"property\" data-index=\"" + index + "\" data-field=\"propertyType\" value=\"" + escapeHtml(item.propertyType) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"property\" data-index=\"" + index + "\" data-field=\"area\" value=\"" + escapeHtml(item.area) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"property\" data-index=\"" + index + "\" data-field=\"purchasePrice\" value=\"" + escapeHtml(item.purchasePrice) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"property\" data-index=\"" + index + "\" data-field=\"address\" value=\"" + escapeHtml(item.address) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"property\" data-index=\"" + index + "\" data-field=\"holder\" value=\"" + escapeHtml(item.holder) + "\"></td>",
                        "<td class=\"input-cell\">" + buildSelect("mortgage", index, "property", [text.noMortgage, text.mortgaged], item.mortgage) + "</td>",
                        "<td class=\"input-cell\"><input data-section=\"property\" data-index=\"" + index + "\" data-field=\"financingBalance\" value=\"" + escapeHtml(item.financingBalance) + "\"></td>",
                        "<td class=\"action-col\"><button class=\"delete-btn\" type=\"button\" data-delete-property=\"" + index + "\">&times;</button></td>"
                    ].join("") : [
                        "<td class=\"row-index\">" + item.id + "</td>",
                        "<td>" + escapeHtml(item.purchaseYear) + "</td><td>" + escapeHtml(item.propertyType) + "</td><td>" + escapeHtml(item.area) + "</td><td>" + escapeHtml(item.purchasePrice) + "</td><td>" + escapeHtml(item.address) + "</td><td>" + escapeHtml(item.holder) + "</td><td>" + escapeHtml(item.mortgage) + "</td><td>" + escapeHtml(item.financingBalance) + "</td><td class=\"action-col\"></td>"
                    ].join("");
                    propertyTableBody.appendChild(row);
                });
            }

            function renderVehicleTable() {
                renderSectionActions("vehicle");
                vehicleAddWrap.hidden = !state.vehicle.editing;
                vehicleTableBody.innerHTML = "";
                if (!state.vehicle.items.length) { vehicleTableBody.innerHTML = "<tr><td colspan=\"9\" class=\"empty-tip\">" + text.emptyVehicle + "</td></tr>"; return; }
                state.vehicle.items.forEach(function (item, index) {
                    const row = document.createElement("tr");
                    row.className = state.vehicle.editing ? "edit-row" : "view-row";
                    row.innerHTML = state.vehicle.editing ? [
                        "<td class=\"row-index\">" + item.id + "</td>",
                        "<td class=\"input-cell\"><input data-section=\"vehicle\" data-index=\"" + index + "\" data-field=\"purchaseTime\" value=\"" + escapeHtml(item.purchaseTime) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"vehicle\" data-index=\"" + index + "\" data-field=\"brand\" value=\"" + escapeHtml(item.brand) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"vehicle\" data-index=\"" + index + "\" data-field=\"series\" value=\"" + escapeHtml(item.series) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"vehicle\" data-index=\"" + index + "\" data-field=\"purchasePrice\" value=\"" + escapeHtml(item.purchasePrice) + "\"></td>",
                        "<td class=\"input-cell\"><input data-section=\"vehicle\" data-index=\"" + index + "\" data-field=\"holder\" value=\"" + escapeHtml(item.holder) + "\"></td>",
                        "<td class=\"input-cell\">" + buildSelect("mortgage", index, "vehicle", [text.noMortgage, text.mortgaged], item.mortgage) + "</td>",
                        "<td class=\"input-cell\"><input data-section=\"vehicle\" data-index=\"" + index + "\" data-field=\"financingBalance\" value=\"" + escapeHtml(item.financingBalance) + "\"></td>",
                        "<td class=\"action-col\"><button class=\"delete-btn\" type=\"button\" data-delete-vehicle=\"" + index + "\">&times;</button></td>"
                    ].join("") : [
                        "<td class=\"row-index\">" + item.id + "</td>",
                        "<td>" + escapeHtml(item.purchaseTime) + "</td><td>" + escapeHtml(item.brand) + "</td><td>" + escapeHtml(item.series) + "</td><td>" + escapeHtml(item.purchasePrice) + "</td><td>" + escapeHtml(item.holder) + "</td><td>" + escapeHtml(item.mortgage) + "</td><td>" + escapeHtml(item.financingBalance) + "</td><td class=\"action-col\"></td>"
                    ].join("");
                    vehicleTableBody.appendChild(row);
                });
            }

            function enterSectionEdit(sectionName) {
                if (state[sectionName].editing) return;
                syncEditingTables();
                state[sectionName].snapshot = clone(state[sectionName].items);
                state[sectionName].editing = true;
                renderTables();
            }

            function cancelSectionEdit(sectionName) {
                if (!state[sectionName].editing) return;
                state[sectionName].items = clone(state[sectionName].snapshot || []);
                state[sectionName].snapshot = null;
                state[sectionName].editing = false;
                renderTables();
            }

            function saveSectionEdit(sectionName) {
                if (!state[sectionName].editing) return;
                syncTableSection(sectionName);
                renumber(state[sectionName].items);
                state[sectionName].snapshot = null;
                state[sectionName].editing = false;
                renderTables();
            }

            function addPropertyRow() {
                syncTableSection("property");
                state.property.items.push({ id: state.property.items.length + 1, purchaseYear: "", propertyType: "", area: "", purchasePrice: "", address: "", holder: "", mortgage: text.noMortgage, financingBalance: "" });
                renderTables();
            }

            function addVehicleRow() {
                syncTableSection("vehicle");
                state.vehicle.items.push({ id: state.vehicle.items.length + 1, purchaseTime: "", brand: "", series: "", purchasePrice: "", holder: "", mortgage: text.noMortgage, financingBalance: "" });
                renderTables();
            }

            function deleteRow(sectionName, index) {
                syncTableSection(sectionName);
                state[sectionName].items.splice(index, 1);
                renumber(state[sectionName].items);
                renderTables();
            }

            function renderTables() {
                syncEditingTables();
                renderPropertyTable();
                renderVehicleTable();
            }

            renderBasicSection();
            renderTables();
        });
    </script>
</body>
</html>
